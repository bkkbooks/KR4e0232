body:
  text: 檀園集卷五明李流芳撰五言絶句凡二十七首為宋比玉題畫歲暮不可留送子山城下别意如寒泉哀聲咽難寫題畫木落秋氣多風髙水痕捲人徑疑有無山容自深淺山色青不已湖光白欲來虛亭正瀟灑一棹撥烟回宿法相為吳伯霖題畫夜半溪閣響不知風雨歇起視暗靄間悠然見微月將别西湖諸君夜雨小飲清暉閣為方回畫扇口占山樓風雨急别意杳無據對酒增渺茫推篷是何處和憨山師菩提菴八詠平野垂四周陡然橫一丘菩提無種子莫向去來求菩提山一灣漾清淺千葉競紛敷試問寶池內花開得似無蓮花灣纍纍千萬顆顆顆說阿彌何煩更采擷百八手中持槵子樹雖無版築功屹然堅可慿兹有真如理故名不壞城翠城漚生大海中生滅海漚共是名窣堵波為有縫無縫漚生塔有情有生死生死長憎愛斗水亦區區施以法無礙放生池今人不如古像設亦如是若云真大士去之乃千里古觀音像古松如古佛落落自隨緣因何號羅漢翻似小乘禪羅漢松為陳維立題畫桃花與流水一往隔千春畏向外人道如何重問津桃源乞食未足恥折腰真可憐若止愛一醉還應戀秫田柴桑醉鄉既可居東臯亦逆旅不能學河汾長當友河渚東臯沉冥竟何意興㑹亦偶然竹林緬髙風繼軌得此賢竹溪郎官名亦好賀監更風流人皆營一曲名可得千秋鑑湖吾愛華子岡輞水流日夕如何舍此去傷心賦凝碧輞川吾怪元道州山水亦吾之峿臺臨浯溪漫浪良可思浯溪樂天作草堂勝絶擬終老出處不自決徒為泉石道廬山繪雪著堂中坡翁署堂義繪堂著雪中安知非坡意雪堂未能無所寄養鶴復栽梅鶴亦太多事髙飛候客來孤山和西生上人山居雜咏次韻一脈同澄湛分流到各家竹爐新火活甌面乳生花引泉雨過才移種風來已滿林庭空還汛掃留著貯清隂種竹到此無俗客何妨欵竹扉山花能作供林月送將歸客至林裏光初出湖中氣欲來好隨松影去且放竹扉開步月檀園集卷五
