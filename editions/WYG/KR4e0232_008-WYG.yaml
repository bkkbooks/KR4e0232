body:
  text: 檀園集巻八明李流芳撰記凡九首留蘅閣記是嵗余客崑山張子崧家所居海日樓三楹與子崧共之四旁居人雜沓笑語甚譁子崧意常不愜思得蕭寥無人之境卜築下帷其間而未能也㑹予以病東歸三月復過子崧則子崧已構高閣於城東之隅軒窻闌楯翼然一新爽塏温涼備有其致隣多喬木美蔭閣跨其上盡撫而得之交柯接葉掩映几案其陰則逺眺玉山紅樓翠嶂突兀於萬瓦鱗次之上朝曦夕暾薄陰殘雪其變態可挹也張子曰予以所居湫囂不足以留賢者閣成將與子從容嘯咏其中而嵗且暮矣子尚能為十日留乎請遂以留蘅名閣李子曰有是哉張子之意則厚矣顧予何足以當之今嵗方大祲道莩相望萬突不煙張子之為是舉也母乃有非時之譏是固張子之所不敢居也予何徳而居張子之所不敢居者無已請遂成張子之名可乎吾聞張子先後相師友如予所識瞿星卿顧朗仲王弱生平仲其人皆賢者也而予之來獨與兹閣㑹夫予之名固無能為兹閣重也而張子留賢之名則可以不朽矣昔人謂齊雲落星之高井幹麗譙之蕐而止於貯妓女藏歌舞為有道者之所不取若兹閣者得與緇衣杕杜之意竝傳之於無窮使千秋萬世而下皆知有好賢如張子者不亦休哉雖然張子之名美矣請進而求之於實則予與張子共有責焉夫謂之賢者未有無益於世而以浮沉取容而已也今世之好賢者或浮慕其名而不急其實汎汎然於身心之際將有過不加聞而有善不加進則雖有賢者日與之俱而不能效其尺寸之益彼賢者終不肯為無益之留也則有掉臂而去之耳今張子天性愷悌坦衷直腸使人人得進言於前而無所忌故雖以予之不敏而時得效其狂瞽焉今且别矣願更以三言益張子曰嗇以奉天㢲以合倫斷以制慾張子倘能用予之言而推之以鞭其所及而廣求益焉挾為善之資而加勤之以學問使賢者日益親而不肖者無所參於其間則予之為張子留豈有既哉作留蘅閣記劒蛻齋記劒蛻志夢也往余暱孺榖小史荃之情好方洽忽夢荃之過予袖中瑟瑟若有物出之一蛇蛻也其長盈丈捉而投於予榻余懼㧞劒擬之覺而占之曰蛻者化也劒者割也彼且為幻化而吾以慧鍔割之余與荃之之好其不終矣因顔其齋曰劒蛻以識之兼題東坡二語於壁曰事過始堪笑夢中今了無然余之暱荃之也愈甚衆皆笑之弗顧也亾何而荃之以瘵死孺穀亦暴亾一慟而悟夢始騐矣始孺榖以八分書齋額嵗久蠧壊今年小葺齋屋為重書之而叙其事以為記嗟乎所謂荃之者十年以來已不復入吾夢矣當時綢繆繾綣所為求致其情而不得者自今思之余亦自笑其癡而況於人乎方余之夢也固已知其為夢也知其為夢而不悟必至於死而始悟余之劒亦不利矣雖然豈無之死而不悟者乎夫今夢昨夢皆夢也余其悟而不復夢斯可以說夢也已余故記之以自儆并以告世之尋夢者虎邱重修浮圖天王殿記虎邱僧正元住持山中值浮圖天王殿先後告圮元慨然任之募材鳩工五年而功竣屬余為之記余曰上人之功偉哉夫浮圖天王殿兩者虎邱之表也虎邱高不二十仞由閶闔門邐迤而西騁望天末有矗然秀出於青林碧瓦之上者則浮圖為之表入山門裵回於生公講臺層樓複殿瞻矚未已而有翼然掩映於高柯修磴之間者則天王殿為之表二表墮則邱之觀撤矣今一朝而二廢舉上人之功偉哉於是元慼然曰余何敢為功余求免於咎而已余之為此舉也夫亦鑒前之覆轍而凜凜於因果錯謬之戒一錢之入不敢不注於籍也一人之施不敢不登於石也然而謗言狎至余唯是不克終事是懼而敢自為功乎余曰思深哉上人之不伐巳夫因果之說佛氏之觕者也然精而求之其灼然而不昧者盖寡今之剃染出家秉佛之敎者缾鉢粥飰皆非其出於巳者也而欲私之以為有偶舉一事焉又獵檀信之貲而乾没耗散之此所謂稗販如來罪之大者也若上人者其知免夫嗟乎凡今之任事者苟求免於咎而不妄為功則天下之事其亦可為也已矣元之言又曰浮圖高而易墮大約三十年一修天王殿五十年一修記之使往者有所鑒來者知所勸噫是不可無記也已是役也始於萬厯四十六年戊午成於天啓二年壬戌為材之費若干埏埴之費若干丹堊工匠之費若干損貲首倡及以文字為灋施者為廷尉毛公侍御凌公王公余友徐君仲容陳君古白五年乙丑元夕前三日記遊虎邱小記虎邱中秋遊者尤盛士女傾城而往笙歌笑語填山沸林終夜不絶遂使邱壑化為酒塲穢雜可恨予初十日到郡連夜遊虎邱月色甚美遊人尚稀風亭月榭間以紅粉笙歌一兩隊㸃綴亦復不惡然終不若山空人静獨往㑹心嘗秋夜與弱生坐釣月磯昬黑無往來時聞風鐸及佛燈隠現林杪而已又今年春中與無際舍姪偕訪仲和於此夜半月出無人相與趺坐石臺不復飲酒亦不復談以静意對之覺悠然欲與清景俱往也生平過虎邱纔兩度見虎邱本色耳友人徐聲逺詩云獨有嵗寒好偏宜夜半遊真知言哉遊石湖小記予往時三到石湖遊皆絶勝乙亥與方孺冒雨著屐登山巔亭子貰酒對飲狂歌絶呌見者争目攝之去年與孟陽弱生公虞尋梅到此徧歴治平僧舍已登郊臺至上方絶頂風日清美人意頗適九日復來登高以雨不果登放舟湖中見煙檣雨楫雜沓而來舉酒對之亦足樂也是日秋爽伯美舍弟輩俱有勝情由薇村至上方復從郊臺茶磨取徑而下路傍時有野花幽香童子采擷盈把落日泊舟湖心待月出方命酒孟陽魯生繼至方舟露坐劇飲至夜半而還盖十年無此樂矣遊虎山橋小記是夜至虎山月初出攜榼坐橋上小飲湖山寥廓風露浩然真異境也居人亦有來遊者三五成隊或在山椒或依水湄從月中相望錯落掩映歌呼笑語都疑人外予數過此愛其閒曠知與月夕為宜今始得果此緣因憶閑孟子薪無際彦逸皆貪遊好奇此行竟不得共閑孟以病挾子薪彦逸俱東無際雖倦遊意猶飛動以逐伴鞅鞅而去尤可念也清緣難得此㑹當與諸君共惜之遊玉山小記二十五日自京口飯後步銀山小憩玉山亭子遥見伯美自山麓施施而來遣童呼之亭下皆絶壁瞰江有巨石獨立江渚上夷而下罅涉而登可坐數人丁酉春留滯京口暇即來此或攤書獨坐竟日或與家兄輩載酒劇飲值驚風怒濤澎湃震蕩水激其下坎窽鏜鞳如東坡之所謂石鐘者江豚亂起帆檣絶迹飛流濺沫時落酒􅊦中亦一時快事也癸卯偕孺榖過白下登亭子小飲丙午復偕仲和至此皆值秋漲石没水中毎懐昔遊為之憮然不意今日得還舊觀與伯美盤礴石上不能去適有漁舟過絶壁下遂呼之汎至金山登紫霞樓坐眺久之而還遊焦山小記二十七日雨初霽與伯美約為焦山之遊孟陽魯生適自瓜洲來㑹亟呼小艇共載到山訪湛公於松寥山房不遇步至山後觀海門二石還登焦先嶺尋郭山人故居小憇山椒亭子與孟陽指㸃舊遊孟陽因誦湛公詩風篁一山滿潮水兩江多相與賞其標格尋繇小徑至别山雲深二菴徑路曲折竹樹交翳閴然非復人境有僧號見無與之談亦楚楚不俗相與啜茶而别尋瘞鶴銘於斷崕亂石間摩挲久之還飯於湛公房孟陽魯生遂留宿山中予以舟將渡江勢不可留怏怏而去孟陽魯生與山僧送余江邊徙倚柳下舟行相望良久而滅落日注射江山變幻頃刻萬狀與伯美拍舷呌絶不已因思焦山之勝閒曠深秀兼有諸美焦先嶺上一樹一石皆可徬徨追賞其風濤雲物盪胸極目之觀又當别論且其地時有高人道流如湛公之徒可與談禪賦詩逍遥物外觀其所居結構精雅庖湢位置都不乏致竹色映人江光入牖是何欲界有此淨居孟陽云吾嘗信宿兹山毎於夕陽登嶺眺望落景尚爛於西浦望舒已升于東溆琥珀琉璃和合成界熠燿恍惚不可名狀嗟乎苟有奇懐聞此語已那免飛動予自丁酉來遊未皇窮討人事參商忽忽數年始一續至又以覊紲俗緣卒卒便去如傳舍然不知此行定復何急良可浩歎自今以往日月不居一誤難再賦歸之後縱心獨往尚於兹山不能無情當擇春秋佳日買小艇襆被宿松寥閣上十日夕以償夙負滔滔江水實聞此言遊西山小記出西直門過高梁橋可十餘里至元君祠折而北有平堤十里夾道皆古柳參差掩映澄湖百頃一望𣺌然西山匌匒與波光上下逺見功徳古刹及玉泉亭榭朱門碧瓦青林翠嶂互相綴發湖中菰蒲零亂鷗鷺翩翻如在江南畫圖中予信宿金山及碧雲香山是日跨蹇而歸由青龍橋縱轡堤上晩風正清湖煙乍起嵐潤如滴柳嬌欲狂顧而樂之殆不能去先是約孟旋子將同遊皆不至予慨然獨行子將挾西湖為己有眼界則高矣顧穏踞七香城中傲予此行何也書寄孟陽諸兄之在西湖者一笑疏凡六首募造真聖堂石橋疏自嘉定城南達南翔二十餘里為橋而跨於横瀝者七曰古墅溝橋曰留光寺橋曰許家橋曰石岡門橋曰姚浜橋曰馬陸橋曰真聖堂橋橋惟馬陸以石餘皆以木而姚浜之易木而石則林上人募成之不數年耳墅溝石岡皆欲石之而不果惑於形家言也横瀝通南北舟船往來橋不得不高高而木易圮不三年而修不十年而易不如石之永利也然而民不可與慮始又有說以惑之功是以難也馬陸居道里之中自邑而之馬陸十里而五橋自馬陸而之南翔十里而獨聖堂一橋故聖堂之橋尤急其往來於橋者尤多則橋之圮尤易其易木以石也尤不可以已余嘗舟而過於橋下見行者摇摇焉震於厥衷飄風甚雨則東西隔絶而不敢渡輙仰而歎曰顧安得姚浜林上人者起而倡之乎無何有緇衣而踵門者曰吾將尋林上人之功乞子為之疏余曰子毋易言之也千金之費非易辦之緣也萬夫之工非易集之事也林上人父子相繼祝髪出家以從事於勸募而幸有成功子能發此勇猛心乎曰吾業已棄家而壊服矣則又問之曰林上人父子拮据十年中間沿門請乞之勞躬親畚築之苦與夫銖積寸纍早作夜息寒暑無間之勤渠子能辦此堅固心乎曰吾已矢之神明死生以之不再計矣余合掌而作曰有是哉以此聚緣何緣不集以此辦事何事不成余不云乎聖堂之橋急於姚浜則子之功易於林上人也決矣夫人之營福田利益也如建祠宇崇經像種種諸緣皆不急於百姓而以為能植後生之福故汲汲焉破慳囊而為之橋梁以通往來便行旅一境之所急其利在目前而福田善果又植之於無窮子倡之而人有不樂赴者乎子苐持吾言而告之遂書之以為疏重建五方賢聖殿疏五方賢聖者不知其為何神吳越之間廟而祀之者所在皆是而尤著於吾吳之楞伽山山去郡十里禱祀無虛日相傳以為石湖一片水為神所據舟行不敢遺穢濁湖中犯之者禍立至吳中祀神皆設聖母五侯五夫人位潔粢盛陳歌樂婆娑累日夕其讚神之詞敘置始末甚詳甚異不知何所本大要巫者傅㑹之耳以五月十八日為神之誕辰其期輙盛儀從皷樂以迎神謂之賽㑹而獨吾槎里為尤盛里中往時富賈輻輳競為珍異結束以相誇耀今且日就凋弊而此風猶相沿不絶毎㑹出旌旗隊仗輿服歌吹費以千計四方觀者舟車闐隘親朋高㑹酒食宴樂之費復以千計毎嵗節而省之可以為一境備荒之儲而愚民不可以慮逺予又不敢以不尊不信之言而戶說之徒有歎息而已古者謂先成民而後致力於神夫事神之禮固不可廢也要以無民而神何依則夫竭民以事神神亦何利焉且民之所以敬事神而不敢違也夫固謂神之聰明正直有靈於人者也今有疾痛寃抑而不得控於君上官長者則號呼鬼神而求其應此以神為何如者乎及其所以媚神而事之以非禮者乃即以其欺君上官長者施之豈今之為神者亦皆攬權勢作威福喜諂佞而不恤下民之私不凜上帝之鑒者乎則吾不得而知之也已去年廣濟胡侯來宰吾邑期月而政清鋤豪剔姧鄉閭懾息故事賽神主事者先期醵金既具而後舉事至是懼以淫祀靡民財干賢令君之神明相戒不敢動顧金業以醵亾何乃謀新神之祠宇而以不足者告之十方蘄共成之度其費止百金而可省千金之費興作在一時而可圖數十年安静之利所謂彼善於此者也主事者來乞疏於予予告之曰方今賢侯在上有鄴令投巫之明故能回一國之狂酲而使之敦本節儉豈徒人哉神亦聴之矣夫神道之禍淫福善固常在逺近之間不可以不畏也吾聞昔之賽神者科斂若干乾没若干今之新祠宇者科斂若干乾没若干盖有之矣吾且知之而況於神乎以為無神則已以為有神是媚神而干神之怒以自求禍也不如其已也請以此言質主事者并質之大衆重修香雪菴疏香雪居在彈山之麓西蜀中懐法師隠處也余往嵗過山中從顧山人問香雪披松覔境經邱歴壑已而茶煙起於樹間經聲逹於籬外頺垣矮屋僅可容膝蒲團鐘磬約畧麤具而軒窻几席居然絶塵是日恨不遇師然巳想見高致矣又明年余家居去山二百里師之高足忽過余而告曰香雪居且圮矣將新之若何余曰是宜新矣余數年前讀書彈山不聞有香雪之名是不數年耳而圮易圮哉雖然其圮之易也新之是不難矣環彈山三十里皆梅花時澷山照野腰輿而行憑高而矚如在兠羅綿世界中香雪所由名也如是何可無居況高人道流之居哉如是居何可無新諸檀越莫作功德想但為湖山㸃綴它日以看花到山中者遊屐既倦小憇柴扉松戶之閒與師清言啜茗亦一韻事也余往時買山西磧下將搆閣以居名之曰六浮未成輒棄去故余有登盤螭訪覺如上人詩曰六浮山閣今非主六浮居士居無處欲乞一單終餘年坐對青山叅活句今又將從香雪居中借一單矣山中篔洲居士聞修道人皆余友也試以此語之白鶴寺募建三元殿疏白鶴寺創建三元祠寺僧持疏來請余謂之曰三元道敎也以佛子奉祠何居僧曰吾聞之三元盖觀音大士化身也余曰此不經之言也不可以惑智者無已則有説焉夫佛所為真常妙淨之理不可以戶而説之也得其所為因果報應者使蚩蚩之民有所利而為善懼而不為惡如是而已可矣是故鬼神之事儒者常言之至佛氏而其理始著惟其因果報應之毫不可誣也三元注人死生禍福其道要於癉惡章善而已固佛事之外䕶而名敎之功臣也祠之誰曰不宜三元之跡冣顯於雲臺山千里之外重繭而至以瓣香告虔者絡繹不絶其人素有穢行或齋戒不謹往往神即殛之自暴其過於衆中衆無不齧指相戒如七月間事甚異今之議建祠者亦從衆意也雖然更有說焉夫今之建祠白鶴者皆嵗禱雲臺者也建祠之後將舍白鶴而之雲臺乎舍白鶴而之雲臺非建祠意也則將舍雲臺而就白鶴夫舍雲臺而就白鶴何也果以神無不之乎抑憚雲臺之靈爽而借以為寛假地乎夫借以為寛假地則祠與不祠何異焉必曰神無不之也其在白鶴猶其在雲臺也三元之威神實震叠於厥心則廟貌香火亦皆其跡也庶其去惡從善以母㤀七月之事三元其祐之哉寺僧曰善遂書之以告大衆僧可上人結菴徑山緣起不見雪嶠師五年矣僧可上人忽自雙徑持師書問至捧之欣然上人余邑産也出家六年而始得從師於雙徑師令叅無字話遂欲結菴相傍依師終身其志有足嘉者雪師嘗謂余言少時偶有所疑出家叅訪無所遇毎疑情一發寢食俱廢一日忽然有得大笑失足墮崕下遂損其鼻後住雙髻峰有詩云青山箇箇伸頭看看我菴中喫苦茶其風致如此上人還見雪師麽不然結菴且是第二義諸檀越還見上人麽不然且與結菴去他日菴成居士要來菴中同喫苦茶也陳忠菴募緣疏夏日臥疴檀園有扣門者云自雲棲來亟披衣迎之則一老宿也貌龎古而儀質雅望而知為雲棲法派矣乃與之語土音也怪而扣之知為鄉之人而叅學於雲棲者也曰今何居則已去雲棲而居於真如之里矣曰已去雲棲而何以來曰余所居之菴舊名陳忠湫隘不能致香火余將有所營也乞居士一言以告之十方余曰有是哉師不稱雲棲則已師稱雲棲則固已知雲棲之敎令矣昔先師之舉事也未嘗以方寸之牘聞於四方且平日戒其徒無以雲棲之名募凜然若以為非義而不可干然而金石土木之工不脛而集俄而為崇臺俄而為複閣俄而為虚堂俄而為曲室俄而為貝葉珠函莊嚴相好人力不勞而日新富有何也此豈非先師之徳感神歟今師將具先師之徳則募無庸也將守先師之戒則募又不可也又何以余之言為曰固也余不他適而適子以子固雲棲之弟子也夫能以雲棲之敎令先師之遺意牘而告於四方不賢於募乎若世之募者余固已知之矣上人名廣洪募建大士閣暨關聖帝君殿次第修舉視其力焉檀園集巻八
