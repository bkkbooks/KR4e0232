body:
  text: 檀園集巻一明李流芳撰五言古詩凡七十二首冬夜書懷懷人不能寐起行眎天末風高夜氣爽空庭貯寒月落木何蕭疎縱横影交列萬籟久逾靜中懐耿不滅憶我心所歡生平矢相結嬿婉能幾時一朝悲契濶前日送我行擥衣與我訣期我明月夜翩然履我闥將子無愆期指為三四屈筦簟既已安樽罍亦云設期逝子不來音塵望中絶川塗非渺邈江河多舟楫豈不顧前好或以事羈紲一心抱終始懷疑難自決團團天上月光輝有時缺藹藹庭中樹豈無辭柯葉新歡與故知恐或異凉熱引領還入房垂淚空咄咄隴上别青青隴上麥離離江邊樹此地曾别郎細雨濕歸路一解郎亦從此去儂亦從此辭感彼路傍人道儂相送時二解不忍與郎别又不隨郎去只是牽郎衣躊躇復不語三解斫枝斫連理折花折竝頭今日非昨日儂身那自由四解一花持伴儂一花持贈郎不比花顏色但比花參商五解儂如車脚泥棄置亦不安郎如失林翼孤栖亦不歡六解儂自目送郎請郎莫回顧恐郎為儂辛淚亦為郎茹七解譬如不相識相㑹自有期但願加餐飯不願長相思八解酒後為鄭閑孟畫扇戲題吾愛水上亭覆以栁如絲不獨水清淺春風故來吹水綠栁鬬青顧眄明鬚睂荒園二三畆新栽四五枝下有沮洳流上無黄草􅗔時亦偕吾友對此斟酌之適興聊復爾㸃綴亦何為將赴試白下走筆别荃之憶㫺婉孌時與子有成說悠悠路傍人使我意不徹齷齪不足論但念子羈紲人生非鹿豕豈難相訣絶不忍區區誠執手即嗚咽白門河畔栁句曲邸中月維舟復沽酒與子行相挈車塵十尺深關路百盤折奚囊共結束蹇衛爭蹩躠村醪解饑劬松柴憩煩熱十年諳客味夢到魂欲裂況復與子辭獨行何孑孑水行多風浪陸行畏炎魃車行虞臲卼馬行憂蹉跌世路皆如此吾生何屑屑白龍百畆山嘉木䕃成列朅來偕吾友掉頭意已決永懷向子期遂陋張生舌兹遊非本情聊以當一吷子如有兩意請與子長别題荃之畫蘭我昔學畫時意亦頗浩渺不求工形似但以寫懷抱十年弄筆研自顧尚草草子真有夙慧落筆那便好疎疎幾葉蘭此意亦難了墨肥苦無骨險瘦神亦槁縱筆傷婀娜取態失蒼老不獨煩位置兼亦貴風藻看子意有餘一往何振掉著花花離離著葉葉嫋嫋因風欲翩翻墮雨故天矯開箑颯生氣嫣然出物表始知畫有真俗工徒潦倒勉旃自珍重成名不足道因憶吾友言惜哉籠此鳥閑孟遺荃之詩嘗有此句燕中歸為閑孟畫煙林小景有感而作我行江北路轉愛江南趣雖有逺近山而無髙低樹山枯石欲死泉涸磵亦痼平生山水歡所遇頓非故朅來揚子邊望見江南霧霧中何突兀金焦與北固春山一何青春江一何素得非筆變化毋乃墨吞吐恍如逢故人此意不能喻吾家疁城東小築溪頭住春流正環門夏木將莽互嘗耽詩中色兼識畫中句遊好在所生毋為勤遠慕登慈雲嶺還訪嚴印持忍公無敕鄒孟陽聞子將於南山小築信宿為子將題畫作慈雲何盤盤崪嵂羅衆致白石如叠浪青林若簪髻落日冝遠山況與秋爽㑹憶昨湖上亭解后多意氣感君十年心發我千里思江山日待人突兀為我輩從來費夢寐到此煩應對竒懐鬱種種筆墨差遠寄披襟欲嗒然相與尋冥契苦雨行紀戊申五月事冬春苦不雨井竭水值錢入夏雨不休出門水接天咄哉造物功旱澇何其偏貧家少生事俯仰資薄田平陸成江湖一望令心酸二麥既已盡穉苗不得安歳功苟如此何以供粥饘阿母向我言汝憂長未殫且勿計歳功目前亦囏難斗米如斗珠束薪如束縑缾中蓄已罄㸑下寒無煙小婦謀夕舂大婦愁朝餐前日雨壓垣舍北泥盤盤昨夜雨穿屋帳底流潺潺籬落壞不理衣裳濕難乾黽勉慰阿母獨坐窮憂端海内方嗷嗷常苦征賦繁去年北大水三輔民騷然司農乏遠籌往往苛東南連年稍成稔額外不肯寛雖有卒歳儲傾囊輸上官吾觀閭左情豈堪一㓙年惜哉此長慮誰為叩帝閽傳聞四郡間告荒牘如山賢侯軫民瘼步禱良亦䖍庶幾回天心拯此魚鼈患褰裳出屋頭仰視雲根蟠水鳥立我傍鳴蛙跳我前礎石潤欲滴青燈光不炎晴占杳難期雨勢殊未厭翻思二三子裹足不到門何時一相呼訴此情纒綿且當冒雨出弄舟村東灣遠水正澹蕩樹色相新鮮濁酒尚可賖聊以開心顔送座師林先生被召北上男兒生世中所貴在心期區區文字間未足定相知蹇余好迂闊賦性不適時落魄十載餘一朝生光輝感彼國士恩耿耿懐在兹吾聞昔人言詘伸各有宜有懷不得伸何用相知為末俗文貌繁傴僂效尊卑相對少真味囁嚅恐見疑先生豁達人容我放言辭況兹分手路長當隔雲泥臨風效微忱蓄意紛如絲梁溪東南衝自昔稱劇邑先生脫儒冠吏治如夙習下車問疾苦豪右爭懾息秋霜比皎潔春風讓披拂嘖嘖道路間口碑豈漫滅當今服官者安坐耀朱芾吾聞先生勤六年如一日長官費送迎簿書苦敦迫戴星出視事日旰常不食永言秉此心豈但一稱職天子綜吏治徵書下南國異等推先生循良亦生色但聞朝署閒臺諫員半缺去年得俞㫖至今壅膏澤擢官仍空銜毋乃非名實感時歎多艱增我意抑塞去年西北饑今年東南水極目三呉間洪濤蕩千里田穉委陽侯魚鼈半赤子更聞邊儲空司農乏經理睠焉財賦區脂膏寧餘幾嗷嗷溝中瘠當復虞庚癸古人喻穫薪斯言亦有㫖帝閽遠難排父母幸孔邇借㓂已不再攀轅詎能已提攜滿道傍號呼擁行李惻愴慈母心行行且徙倚徙倚亦何為建白從此始簪筆入承明抗章上殿陛聖主容直言痛哭況時事上言天方難下言災可弭沛然發徳音寛卹暨東鄙道莩庶以甦菜色行當起先生𢎞此猷蒼生拭目竢春日過梁溪偕顧虞工秦圓昔呉巒穉劉彥和遊寳界信宿陳氏山莊翌日將泛湖至華藏寺阻風不果登黿頭渚而還即事有作梁溪足名勝春風美遊遨吾友好事人載酒呼輕舠出郭風日麗山水況相遭新栁正濯濯㸃綴舒夭桃晴光發野色遠近勻輕描言登寳界巔極目湖天遙臺榭已零落松風尚飂飂山中賢主人客至愛招邀牀頭酒如泉狂呌容吾曹明發恣幽討相與尋山椒山風忽振蕩湖水方怒呺華藏渺何許舟楫不敢操壯哉黿頭渚蜿蜒出驚濤砥柱豈有意神功一何勞下穿怪石藂濺沫聲嘈嘈奇狀洵不一閃倏心魂搖或如怒獸奔或如劒㦸交或側立若屏或嵌空若寮山奴亦不俗濟勝矜㨗趫往往輕險絶引我凌最高吾曹二三子瞠目但呌號落日下驥渚倒見金光漂獨山青蒙茸相望轉泬寥釃酒酹長風使我情一豪境清難久留歸路翻蕭騷平生愛奇賞兹遊惬久要勿言後期賒但鬬所得饒芙蓉花下獨飲戲柬里中兄弟愛此芙蓉花簇簇水之湄上有竹參差下有水漣漪水竹相暎發紅白交光輝自我牽物役三年不見兹前日呉門歸常恐後花期家人向我言花開尚未齊連朝登樓望風雨何凄其恐復花顦顇徙倚多嗟咨花神好䕶惜留此遲晴曦今日秋爽佳轉覺花多姿過雨著深淺因風故髙低既耀朝陽色更與落日宜一生愛花心輸寫當此時何以酬花神但有酒滿巵自從抱病來甘與麯蘖辭對此不快飲空負看花為但願十日晴兼謝塵鞅羈客至不出迎閉門客勿疑雖有愛花人不如我情癡我思古人言勝事空自知己酉春日以看梅到彈山信宿山閣讀壁間舊題如昨日耳而當時共事者徐孺穀張君實與小史荃之皆死矣退之有言人欲久不死而觀居此世者何也愴然興懷爰作此詩七載閣中人重來死亡半廵覽驚孤遊數往疑夢幻當年詩酒徒徐生意何悍小史最清發與我情婉孌張生實同調時亦偕汗漫一朝俱灰塵蕭條空里閈不見窻中山突兀猶在眼不見門前樹森疎好枝幹山花向我笑山鳥自相喚壁間舊題字墨跡未漫漶嗟我同遊人一逝不復返曉日充山舟夕月銅井院湖波綠欲皺楊梅紅始綻曳杖追流雲浮杯激飛淀此中樂事多此日歡情變低回閲身世生存靦顏面西州下悲淚黄壚發浩歎予懷不可道松風吹獨旦西磧看花宿六浮閣上走筆示閑孟兼呈同遊諸子去年梅花新愛殺錢家渚花光與水色映徹乃如許我欲作一詩緒多不能舉因之發浩想就此結茆宇西磧亦曠莽數畆足容與朅來尋舊遊況復多伴侣信足潭東西入眥浮四五山中有潭束潭西湖中有五浮花繁塞遠近徑折迷處所或疑雲浮空復道雪封塢吾徒好奇者遇境愛多取到此徒跌宕耳目不自主翻思去年人重來僅予汝程龔與髯朱何意守環堵清遊信難期汝乃以予鼓昨夜懷隂晴江頭過風雨入春多佳日造物豈予侮兹行偶得遂予歌汝可舞興䦨更秉燭相對寒閣語山風颯然清似勸手中醑買山已得計吾駕不可圉登銅井訪三乘上人盤礴銅井道舊遊記平樾褰衣出木杪坐覺耳目豁半嶺界湖光衆山爭出沒湖天西北寛山勢東南匝莫釐與縹緲相望何嶻嶪指顧烟雲間可以一葦截山頭石絫絫歴亂如積雪俯視千林花上下同一潔山僧出迎我問姓始相識誰言三度遊已作七年别當時同遊者眼中異存殁山川閲來往笑我老日月悠悠旦宅人何乃為化怛終當離有漏就此得真歇彈山左阜待月獨飲尋幽愛獨往發興因落日坐眺湖南山光影互吞蝕湖中與山外倒見兩輪赩暝色下村䲧十花發光澤澄波忽凝練新月皎然出初疑琥珀光俄作琉璃色依然此石上變態何恍惚風細來林香露涼減酒力仰觀快澄霽俯瞰畏深墨林端見遠火歸徑迷欲失山中喜張魯生至同尋熨斗柄坐湖邊竟日而還偶作貪遊不知止足力疲屢試起晚日當午偃曝聊自恣忽聞故人來發我湖上意出門何翩翩兩足殊快利嘗聞熨斗柄頗怪此名異昔年過其下髣髴已忘記今日天有風湖山想奇致相與歴西磧山窮見湖勢沿流正縈紆撫石得小憇飛湍擊噌吰穹壁立贔屭洗出如削成斗絶畏崩墜閃爍絢丹堊剝落疑文字傾厓側足過隂壑緣藤縋燕磯與黿渚生平快遊地遂儗兼勝概恍惚理夢寐髙歌遏水聲浩蕩入胸次吾欲乘長風悠然向天際惜哉多舟楫使我不得濟呉門舟中邂逅閑孟自白下歸出予畫巻索題時予方北上走筆見意我昔燕中歸為君作小景題詩見予懐遂儗息馳騁兹行復何為相對徒耿耿人生出處間一往貴勇猛媿予懷兩端疾走以避影見君風塵色使我意逾冷青山與白雲開巻發深省終當果此期無為歎萍梗閘河舟中戲效長慶體濟河五十閘閘水不濡軌十里置一閘蓄水如蓄髓一閘走一日守閘如守鬼下水顧其前上水還顧尾帆檣委若棄篙櫓靜如死京路三千餘日行十餘里迢迢春明門何時得到彼長安遠於日斯言亦有以人生天地閒所貴適志爾八極可横騖風雲屬鞭弭胡為動羈栖縮縮如行蟻舍彼廣莫鄉守此涓滴水哀哉世間人都為名利使韁鎻一著身事事不由已請君轉頭看即此有妙理觀彼名利人皇皇赴朝市當其守閘時靜􅏥皆如此知其無奈何安心勿妄儗豈無㨗徑路車馳與馬駛吾行寧倭遲君子進以禮宿東阿舊縣同張宗曉張伯美小飲村西梨樹下作搴帷見山色知是東阿路不忍驅車行願言得少住舊縣好村落下車日未暮青山遶村西桃梨亦無數花光與山氣似喜輕隂䕶嘗愛岑嘉州花缺春山句何意風塵中乃與賞心遇為我傾酒筒婆娑此芳樹辛苦十日餘博此少時趣三杯洗顏色陶然得吾故鄒縣道中日出鄒縣東風清嶧山下沙路軟於綿驢蹄滑如㵼花村一抹過山勢轉欲罅澹蕩客子心勞歌從可罷西湖泛舟走筆戲呈同游諸子自我别西湖且復經年矣譬如心念人一見真可喜故人知我癖置我浮家裏著意籌雲山恣情逐烟水昨夜泊湖心清月照瀰瀰今朝向南屏餘霞乍收綺城頭日欲上山腰霧未巳忽然飛雨至烟雲互迤邐遙山正一抹長林滌如洗坐覺雷峰失已詫臯亭紫咄嗟旦暮間變態紛如此山光與水氣相將弄奇詭平生愛山心對此即欲死覔句畏唐突作圖但形似不如澆以酒一笑鏟磈礧吾友五六人大半羈城市可憐兩聞子喀喀親藥餌三嚴皆好奇何為亦徙倚良㑹不再得參商限尺咫使我情悵然人事難具美舉觴屬同遊當共惜此晷和朱修能蕉雪詩蕉隂六月中風前颯蕭爽夜半孤夢回時作山雪想冬寒雪片深敲窻得清響庭空碧葉盡幽意猶惚恍亦知不相遭所貴在相賞達人觀世間真幻豈有兩雪中蕉正綠火裏蓮亦長獃僧崖此是獃僧崖昔有獃僧住石上松蕭疎草間虎來去香積飯一投衲衣酒常汙垢淨了無取何處得恐怖妙語衝口開懷哉不可遇贈别不了上人昔我叅夜臺十年懷一喝何來不了師灑然得衣鉢相逢杏花裏纒我問死活從來爛葛藤今朝儗一豁别我復何往江路春風闊為子將題夜遊巻去年别子時期以秋中至非我故愆期人事苦牽繫故人書頻來責我意良是非獨負故人兼亦負紅樹風寒臘盡時忽傳故人意訪我南郭門竟以不見去聞之心怦怦三夜不能寐已復連夢子執手且長跽彼此更相訴繼之以泣涕子嗔我不來我怨子不遇怪子何飄忽念子恐勞勩今朝果見子恍惚夢中事情多不能說示我夜遊記烟林與月嶂㸃綴有微致野航容兩人小􅊦慳一醉天寒湖水濶想見子興寄子應増遠懷我亦發畫思平生山水心所恨不同地頼此筆墨間拂拂出生氣我真說食飽子無獨享媿明朝復别子當以何日㑹題詩紀歳月二月壬子歳題畫再送王平仲我愛燕子磯怪石吞江勢昔與伯子偕蹇驢衝曉至出山月隱林到門松映寺陟巔攬蕭曠尋徑造幽袐崩巖訝天開飛閣疑鬼峙兹遊屢入夢蹉跎杳難繼猶憶風雨過江急布帆駛丹壁照眼來突兀使我醉推篷一絶呌咫尺不得濟君行到白門勝地誇此最磯下有洞天王李曾小憇相與歌蜀道江聲不敢沸君其往酬之為我通此意靈鷲看紅葉期沈無回不至同呉伯霖鄒孟陽方回嚴印持聞子與小飲冷泉亭解后邵古菴江邦申分韵得山字故人紅葉下頻期來此山經旬始載酒惆悵不同攀解后惬心賞歡焉開客顏寒巖愛晩氣移席臨溪灣泉光照酒白木葉上衣斑况接隱者論暫令人意閒過臯亭龍居灣宿永慶禪院同一濓澄心恒可諸上人步月歸裝出西湖間道向黄鸖黄鸖峰為臯亭最髙處屢愆桐塢期偶遂龍居諾桐塢為慧文法師結廬處在臯亭之西屢期予過彼竟不果輕舟凌晨風遙山滿晴郭丹林尚可數寒條紛無託披松指微徑聴水捫闇壑新構爭遠勢平臺攬搖落霜餘山容淺天清海氣薄蹔歇塵勞心始知寂滅樂每多方外遊見僧即如故燈明一龕下夜長惬深晤不知山月上千林已流素出門尋舊溪愛踏松影路氣和空宇澄寒魄如春露去寺不數武回矚驚莽互幽泉洗我心微鐘杳然度初至白嶽宿榔梅菴作十年夢白嶽今日始一至落日捫天門寒風起柟樹怪石摩空立崢嶸有落勢巨靈亦何意造物惡瑣碎闢此偉麗觀使我心魂悸白雲千山來遙空疑海氣當杯月在酒清景不可醉自齊雲乘筏至落石臺留宿五里十亭子下山忘險艱愛此溪山晴故作乘筏還寒沙束回湍下見文石斑旭日來暎之浮動水石間吾徒二三子坐穩興何閒方過藍渡橋復見落石灣落石勢已奇况此清流環松蘿挂絶壁古色照我顏前林正丹黄烟郭粘遠山我欲留此石一杯酬潺湲襆被叩上方待月同躋攀豐干寄懷戴天卿我昨過隆阜問子人不識見子因吾友執手便相得嗟我閱世多老眼太青白如子自不羣肝腸映顏色我從齊雲還留連愛落石僧廚㸑無烟溪邊學閉息須㬰千村素猶餘半巖黒絶呌清景中不禁酒喉亟飛書往報子犯夜旋相即豈無嚴城限况復路崎仄感子欣然來絫絫載觴炙使我獲一醉陶然共枕籍别子幾何時又見陽月易豐干與隆阜相望苦相憶東門李女郎頗不事妝飾迎門粲一笑此意可憐惜期子重來過樓頭新月直冬日同袁小修王幼度諸君集鍾伯敬邸舍即事苦寒長閉門旭日動春意忽聞故人期欣然先客至相知無新舊解后關情事楚客談支離呉儂亦顦顇百年一夕間燈深酒難醉出門限東西欲别有餘思且喜寒更長前街月未墜抱疴眞歇禪師塔院夜坐偶占連夜不成寐雨餘喜得月中宵起推窻圓魄凑林缺灑然濯煩抱涼意下天末風泉淆遠聴飛蛩一何聒是身本無常動念即成結遂令顛倒見坐臥分勝劣堂堂塔中人安閒是何訣禪師偈云老僧自有安閒法八苦交煎總不妨無隱上人庭中有枯樹根綴以襍花草蒙茸可愛因為冩生戲題一詩山中枯樹根偃蹇蝕風雨久與土氣親生意于焉聚隨手植花草蕃息如出土月下埀朱實春羅剪紅縷月下紅剪春羅皆山中草名或苔如錯繡或藤如結羽紛然燦成致位置疑有譜吾畫能冩生冩生不冩形此景良可惜吾手亦不輕以畫易此景請言平不平世人不貴真貴假貴其名吾畫能不朽此景有衰榮莫言常住物只許供山僧戲示山中僧侣山居不須華山居不須大所須在適意隨地得其概髙卑審燥濕涼燠視向背樓閣貴軒翥房廊冝暎帶或與風月通或與水木㑹臥令心神安坐令耳目快臯亭美林壑中塔亦稱最一樓負山立圭竇如向晦山僧請余住余性苦不耐勸令開八窻咄嗟變湫隘前楹布清隂後户攬蒼靄玲瓏稱人意蕭爽出塵界囅然謂山僧此中固有解往往住山人不知山好在我昨居新菴結構亦可怪居然仇涼風似欲杜靈籟古梅如老宿亭亭使人愛其下安竈突柯條半焦壞悲哉氷玉姿坐受熏灼害見之熱五内如身被桎械誰當共拯此移竈出樹外面南闢小扉日與香雪對區區一緡費功徳乃萬倍吾言不見用終為未了債三月十三夜同陸大無界待月虎丘得殿字清遊及佳辰載酒出芳甸日落風氣髙晴郊綠初徧入寺踏清隂登髙攬蔥蒨須㬰劒壑暝素月流紺殿林影散積雪石光搖匹練鼓罷揚清歌人開出素面此時人境空喧寂同一善低回洵可樂去留亦無戀吾儕區中人蹤跡轆轤轉今日與明日時乎㑹有變空懷買山期坐受塵網罥百年春幾逢一春月幾見春月此丘中契濶共談讌我唱子可和滌子端溪研無界有宋端研細潤宜墨可愛别友夏同孟陽無敕亦因修之君長過林女郎天素月下聽天素彈琴琵琶因索余詩走筆紀事西湖别譚子離緒不可理載酒覓一歡美人在湖涘美人閨中秀興㑹託山水筆墨出生氣坐覺山水死清音到絲竹所貴豈悅耳初為彈琵琶四絃萬緒起再為撫七絃幽懷歴妙指我攜三絃客嘈雜亦可喜新聲世所尚古調竝乃鄙都生閒止人琴理協靜女竟彈畢清夜月落燈未巳百年寡此歡終悲别譚子自皋亭至塘棲舟中寓目有作山雨驚客夢曉晴山亦喜山僧惜我行送我溪之涘輕舟如落葉穩坐宛在水波紋動雙趺遙山逐面徙前林霜葉熟風來散成綺丹黄積雨涯時與菱荇抵不知塘栖路沿山復幾里離憂付汗漫歸興亦容與送王屺生歸楚頃與譚子别輒作數日惡歸來不數日别酒為君酌老懷長寡歡歳晚厭離索況君胸懐人相對抉皮膜離言不敢深恐為衆所愕方今推楚材紛紛富述作吾尤愛譚子真意存澹漠此賢君所私冥契應有託清霜滿歸檣寒月照旅泊君其往及之江邊問青雀秋别黄溪不肯長白日易云暮分手只此時扁舟東西路送君不能逺況敢留君住别淚何可吞羅衣濕成故九日翏翏亭獨坐看花感懷有作去年桂花時對花懐吾友今年見花發所思人在否虚亭敞蕭瑟秋氣變林藪清暘喜連朝風物況重九西湖前月中花枝已盈手江鄉花發遲歸客幸不後前月賞花人今朝復何有悲來不成歡負此盈尊酒述夢亭亭縞衣人山頭坐涼月招手謂我來咫尺歩難越相憐意分明相望魂恍惚夢覺理何憑煩憂向明發訪秦心卿溪上懶園不遇有作溪上好園亭君家聞最勝經過已廿年今始識三徑翳然林水間愛此飛閣暎位置不在多貴與風物稱主人意疎豁事事得真性我來不相值維舟柳邊暝見戴自無須悠然發孤咏南歸詩天道有晝夜動息兩不爭喜晝而悲夜無乃非人情嗟余嬰此患何以處死生衾裯既已溫筦簟有餘清人皆樂睡鄉胡我獨惺惺自從出門來十臥九不寧夜則搖其精晝復勞其形常恐大命至奄忽道無成公卿是何物性命乃可輕學道三十年此心猶未安輾轉一夕間擾擾千萬端病以愛為本憂怖乃相干物生每狥性夙習不可刋順或忘其源逆則攖其湍心跡既以違調伏良亦難逝將放吾意俯仰得所歡真際未可期庶以澄内觀右不寐不眠苦夜永待旦情徬徨傳聞多警急羽書達明光前鋒已陷敵大將墮馬亡健卒三萬人一朝血沙場孤城若絫卵覆車且相望天子為動色羣議紛蜩螗司馬出守邊元戎將啟行當時畫戰守經撫何參商曾聞右戰者未戰已仆僵至今廟堂間莫知誰否臧嗟余孱書生隠憂豈敢忘十年䇿不售何由呌闔閶委贄未分明幸可商行藏一命亦致身將母或不遑促裝招吾友歸耕烟水鄉右聞警驅車出郭門行行憇逆旅童僕相為言有客馳馬去云追南行者昨已請嚴㫖聞之一驚歎我罪以何抵邊陲奄然喪謀國者誰子舍彼逋逃臣苛此章句士士固各有志進退綽然耳不聞盛明朝罪士以鞭箠吾觀長安中縱横曳朱紫雲臺逞髙議意氣一何侈但恃敵不來來亦竟無恃吾儕藜藿人敢云肉食鄙進既不求榮退則如脫屣㑹當翔冥鴻何乃嚇腐䑕右出都我本疎狂人不適于用世當其少壯時筋力尚可試摧頺廿年餘業已甘放廢黽勉作此來未免為貧計出門即不怡行止屢䟦㚄祿養或可圖世難偶相值未能為親歡遺之以大慮絶裾者何人殆或非吾類髙車易傾覆況復丁此季縱令為身謀亦豈徒泄泄寄謝金門友出處各有為同車既好我周道瞻如醉疇昔偕兹役維子暨汪子我從中道還子亦廢然止汪子行㷀㷀念之心欲死重來復同歸依然吾與爾汪子功名人微尚不在此去留皆灑然更覺歸可喜舉世急功名吾爾衆所訾曰此無遠圖區區效兒女兩人相眎笑吾乃狥譽毁古來耕釣徒亦各有其侣得子巳不孤悠悠何足齒我年未四十已懷退隱圖俯仰又十年何為尚躊躇經過怯往蹟魂魄識畏途去來廿年問道里三萬餘車裝敝屢更何況此微軀所以不自決豈徒為饑驅富貴亦復佳歳月待我乎婚嫁幸已畢余口亦易餬故山臯亭下桃李滿村墟深塢秀泉石近築靜者廬新梢想出籬疏泉行遶渠雙髽指天目一勺見西湖言之病已蘇況當長久居息黥補吾劓造物豈區區右途中示子將三首春光已彊半氷雪尚如此雲間寒日輝不肯照窮子喜無塵撲面又苦泥没趾車馬詰曲行五里當十里豈不憚修途歸途修亦邇右阜城道中北地行欲盡始覺春萌芽村栁色已新藹藹烟中斜渡河指齊郊河邊見歸槎淮徐行在眼吳㑹亦匪賒道路空苦辛分定勿復嗟生不愛京華不如早還家還家春未暮及見桃梨花右徳州道中曉起占天色青天無纎滓占者忌早晴蹔晴亦可喜曈曨日未舒同雲復瀰瀰須㬰宻雪布咫尺如萬里但見雲濤來茫然失涯涘去住無所憑始識汗漫理天公作此戲聊戲吾與汝右遇雪戲示子將日暮雪色深曠野絶行踪輿人惑四方東西視天風忽然見新月冉冉來雲中雪亦能照夜得月光始通度彼九曲坂頼此兩素容不知城郭近杳爾聞微鐘我從天末來已覺下界空右雪夜至恩縣作客舍東城隅西山眺望閒朝見積雪斑暮見落日殷平生愛山心對之了不闗今朝穀城下春水始一灣麥畦綠照眼上有青螺鬟忽如逢故人一笑開襟顏山水只如此值我歸興閒歸亦有何好試問此青山右東阿道中春光無次第雪後景已暄愛此沙路平青山壓晴原下車䇿蹇行竝轡相笑言遠峰翠欲滴近岫勢屢翻惜未及花時指㸃桃梨村悠然度溪橋下有碧潺湲投鞭一盥潄為我洗煩寃右鄒縣道中茲山表徐方經過屢登眺偶然尋舊遊䇿蹇偕所好荒亭何蕭瑟落日春風峭河山挾霸氣四顧雄懐抱嗟此古戰塲豈容隱者傲緬思放鶴人無乃非髙蹈不見山下湖清如眉眼照河勢欲吞山湖能益山貌此中豈有意河怒湖則笑右登雲龍山粤客自南來呉儂從北下解后黄河邊蹤跡兩相訝問我歸何遽問爾行何暇同是公車人不及公車罷此時長安客闐隘舉子舍豈知風波間有此閒晝夜於彼為桎械於我如放赦難進而易退聊用解嘲罵右黄河紀遇江淮十日晴似為歸人貺濁河亦霽顔平瀾容月漾今朝廣陵路春氣轉駘蕩䢴溝日已斜瓜州潮未漲滯舟江城邊朅來江城上櫻桃淡多姿楊栁綠無狀江水媚春曉開此好圖障恠我思江南請君試一望右𤓰州曉望十年渡揚子狎此如袵席今始識風波呼吸投不測舉世皆駭機避就本無益不死亦偶然餘生真可惜不然此春光遂與成永隔出險心已夷聊共子遊息望中指北固沿溪花的的言詣山之隂仰觀快奇壁偉哉鐵柱峰㟏岈疑斧劈傍有衲子居幽洞祕丹碧洞中少寒暑龕燈伴朝夕嗟余風波民何由得此適幸已脱魚腹復爾躭旦宅稽首禮大悲終然度苦厄右渡江遭風幾覆泊潤州閘口同子將步至北固山後禮觀音洞觀石壁北固行坦迤平岡若修塍江山出兩腋羣物無遁形顧盼收金焦迢遙控層城城中起炊烟山氣相與凝日色射遠江躍冶光晶熒天水上下同微波不能興翻思弄舟好失我向所驚下山尋花溪落日噴朱櫻花亦愛晚妝髙低衆態生穿花藉草坐歸路香冥冥右登北固下竝甘露港還舟夾港多櫻桃園吾愛陶彭澤出處皆草草動必求其全俗人自纒擾吾爾廿年交知子如余少愛子無俗情俗情亦自好口常說隱淪身復戀温飽蹉跎兩不遂此意各能了茲遊計百口日日同傾倒鼙皷聲動天風濤勢翻島寢食閒談諧賴以忘病惱不知分手路只此閶門道經過雖有期别懐亦悄悄子歸及桃花六橋踏清曉别業在龍泓泉石真可老我歸百無歡燒笋聽春鳥秋風從子遊松閣為我埽右呉門别子將伯兄性寡營生理日蕭條兩弟皆食貧汲汲度昬朝為農力不任課兒亦無聊餘潤或望余自顧無脂膏今當遂長徃念此中心焦勉謝諸兄弟此非人力邀吾宗自薄祜先達皆早彫從兄與仲氏當年踵登朝至今同籍人秉樞冠百僚逝者倘可留翩然亦雲霄大命既有制露電安可饕我雖老風塵壽命較已牢與其夭斧斤寧以樗散逃傷彼泉下人憫我道路勞兄弟更相慰烹蔬傾濁醪婆娑阿母旁此樂何陶陶富貴有此否何乃為我驕天倫豈世情菀枯同所遭但當崇令徳慎勿望門高右抵家龔廣文應民偕仲和見過分韻得蕭字前日故人來遺我酒一瓢開之氷雪香獨醉安敢饕扁舟繫門前好客不待招空庭多落葉秋老風蕭蕭缺月呼未出燭光青迢遙此時不快飲何能待來朝又得支字我本寂寞人幽憂不可支出門寡所歡不如守茒茨感子惠然來愜我心所期貧家雖乏供幸有酒盈巵形迹既已畧言笑兩不疑人生行胸懷不醉復何為壽龔翁行之龔翁古端士而尤愛氣類余昔穉且狂友之折行輩髙才不用世乃為後起賴翩翩三鳯毛出匣露光恠翁為古稀人我亦知非歳看翁尚矍鑠顧我已衰邁相與成老友頽景各自愛惜非山水鄉放脚若有礙節物有時佳詩酒亦堪在從翁杖屨游或作州閭㑹日月從此長黥劓何足悔送張子石北上衰栁不堪折烟霜留舊容毿毿揚子岸猶惹渡江風馬首初向北不知闗路重黄河氷連山金臺塵蔽空路難良可歎汗漫思無窮我昔事馳騁臨老萬事慵貴交久削迹一丘息微躬長安尺一書十年不復通當今誰愛士此道如盲聾知子徒有心致身竟何從子實慕風節非獨文采豐遇合亦尋常壯夫豈苟同去去勿復道行矣慎秋冬送張宗在偕其伯兄宗自之官晉安君家有仙吏栽花晉安縣十月發吳江千山樹如茜知子重友于兼亦愛遊翫相攜山水鄉壎箎何婉孌子於季孟間鼎足名夙擅晚成自有時涉歴乃益練賢兄豁達人剸割豈不慣操刀或躊躇旁觀子亦善熏風榕樹下秋氣芳蘭畔猩紅荔子盤雪白江瑤饌閉門但加飡勿使鄉心亂夜泊斜橋同王與游顧子貽諸君步至靈巖小飲而下胥江罷風雨隂晴攪游思落景靈巖下維舟識所詣入村山路近疎松表塔寺遂登山之椒選石得小憩已出青雲端攬彼遠湖勢呼酒敵北風新月排雲至溪橋横歸路似欲併幽趣尋山亦偶然造適焉取醉舟發斜橋至虎山喜晴一路看花作旭日在船窻睡起喜欲旋推篷望諸山山山如曳練我來政及時千林開已遍花亦愛客來天應為花眷先教雨洗妝復遣晴開面幽尋足未試一覽目先眩商量花近遠次第遊方便庶作十日留荅此花繾綣自青芝看花至茶山憩山頭石上感舊緣山數十里步步入香徑看花冝輿行神逸目始定茶山不數仞登覽撮其勝襟湖帶長岫髙下目無剩衆花爭獻態巻石似得柄大千觀掌現世界琉璃淨昔來我獨賞近乃游者競廿年懐卜築貧老苦奔迸媿此五浮丘後期猶可訂同與游諸君游𤣥墓余肩輿先至錢家坎感舊有作肩輿背同游興以懐舊發遙見坎上花髙低素屏列柔條愛紛披細路憐曲折花光自照耀況與湖天切瀲灔爭晴空皎如花得月隨山意未已戀樹心欲歇再游迷昨夢一往笑回轍百年真悠悠過眼何可掇夜攜榼至司徒廟古栢下已復篝火尋花劇飲花下看花晝不足尚擬乘夜遊花光冝月色林香應更幽輕雲亦有意遂我秉燭謀酒闌更攜尊選樹隨淹留愛此荒祠栢千年挺蒼虯黯黮迷園花懸燈照枝頭登木學巢飲歌放不可收笑語同游人尚有明日不題畫贈聞翁閏夏鬱殘暑園居如甑中却思好林泉無過舊龍泓深路入篁竹溪流潄松風葱翠日在眸清涼變塵容偶然弄筆墨意與泉石通如聞溪閣響似見林霏濃龍泓老神仙七十顏猶童往往攜我畫朅來登此峰我欲往祝之道遠不可從寄此侑千觴挂壁烟濛濛次韻荅子將見招平生事汗漫遊跡紛難紀臨老負春期戢足守窮理西湖二月天啼鴂喚人起六橋泫花露兩堤夾錦水有時山出雲墨花潑素紙篷艇盡日牽藜杖終朝倚愛山誰如予愛畫誰如子㑹當凌烟霄暫爾混塵市相期刷羽翰孰肯䕶瘡疻我老甘放廢雞肋如脫屣看子意崢嶸猶思角旗壘要之胸懷真掇皮終見髓古來功名人可憐浪生死悠悠風波中吾道有涯涘未敢妄呈身庶以懲刖趾寧為不材樗勿羨成蹊李子書前月來誇以湖山美子方務内觀老圃將竊比荷鋤登秋畦釋此當安徙壘石或栽花所謂聊復爾待子買山深相攜白雲裏西湖如沸羮豈以此易彼時方建魏璫祠于湖上正月晦日雨霽同歸文休張冲善少謙集顧子貽齋中聽祖印上人譚禪分韻得理字客愁殊未央春日去何駛樂彼幽人招快此風雨止移舟轉近郭着屐尋舊里鄰園梅蕭疎城上山迤邐伊蒲出香飯開士同法喜歸子平生歡契濶情具邇二張臭味人傾蓋可爾汝豈徒浪詩酒㑹欲了生死去年狂飲徒奄忽喪予美傷仲從也悠悠百年中刹那安可恃空華豈眼見標月非手指庶以目擊存窻風吹破紙送無際北上夜長不能寐念子當遠行吉夢為子來夢中占其祥如子韞文采其道當輝光晩達豈不佳服官猶壯强將子奮功名毋為歎參商昔我與子交發言即同趣讀書不恥貧固欲行其意及乎赴功名子前我輒㚄心知不能同豈復敢為異子今揚天庭我終守衡泌子將為其難我亦安為易出處各自量苟同竟何濟送子金閶道髙闕何嵯峨笑彼夸奢子髙危當奈何丈夫自有懐衆人鮮不波廟堂方鼎新一朝盪羣魔四海頌太平考槃亦寤歌況此詔公車彌天恢網羅束身事聖明豈不愛濯磨直言望吾子毋徒貴詞科檀園集巻一
