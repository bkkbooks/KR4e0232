body:
  text: 檀園集巻二明李流芳撰七言古詩凡三十一首春雪有懷龔三仲和兼訊劉長卿張荃之去歳以是日至武林大雪又嘗值冬雪偕長卿荃之汎舟至石岡阻氷步歸城南石岡仲和别業也去年此日西湖曲積素千山亂晴旭今年此日雪復驕排空匝野欺春條山樓四望何泬寥思君遙遙不可招城南一棹衝寒路水抱山圍石岡暮酒醒風歇凍不行著屐歸來賞君句只今春花半含綺掩映山椒復何似花開雪落不相待我愁君病徒為爾人生發興真偶然吁嗟張生與劉子重題荃之書蘭秋風蘭若長干客藂樹隂隂小窻碧千里間關遲子來殘燈細語為誰劇當時子畫我作詩今日開看已陳迹我昨送子寒城東荒草茫茫掩阡陌腸摧淚竭無奈何手澤相誇竟何益吁嗟乎人生不死空有情慚媿傍人知愛惜畫松石為翁吾鼎母夫人壽兼題長句翁君彳子何所適手持素縑長三尺屬余吮筆為作圖圖此青松與白石翁君有母孀居三十年青松比貞石比堅恩勤育子誠可憐感君使我情潸然男兒不能安輿列鼎為親歡雖有菽水徒迍邅白頭廚中苦辛者誇數聖善何有焉翁君翁君慎勿迂東西奔走將何須江寒木落嵗云徂倚門之望不可孤入門一笑慈顔舒春酒春盤次第敷髙堂素壁挂此圖君當亟歸勿踟躕吾聞君有仙人不死之術可以奉阿母何如此樂真良圖與仲和期潭西看花仲和云當至洞庭已聞滯虎丘走筆寄嘲我貪花月潭西住君愛烟波洞庭去還向潭西望洞庭指㸃雲峰是君處春晴山閣花無那十日尋花雙屐破輸君縹緲更軒豁歸應誇我峰頭坐張生曉發呉門來傳君猶滯生公臺千塲紅粉亦快意萬頃琉璃安在哉我昨期君訪舊遊掉頭别我神何遒知君未慣風波色且伴鸎花穩一丘過郎當嶺口占示汪無際去年汪生到雲棲相戒莫翻郎當嶺今年我與翻郎當始知此山實竒穎是日風雲氣變幻兼之巖壑勢雄猛雲移日影千山來風入泉聲百道冷愛此盤旋忘阻折足雖郎當意馳騁吾生浪跡詎可量太華終南有絶頂茲山郎當未足道誰為此名乃予儆汪生汪生幾誤君使我臨風發深省秋風行送張子崧之白下秋風水綠秦淮里香閣珠簾映淮水隔岸倡樓十萬家日日笙歌醉羅綺吾儕酒徒老亦狂不論文飲紅帬彊闈中就草日未落脫帽急走青樓倡曲頭小姬歌擅名雙鬟倚酣徐發聲風生月出夜將半掉頭曲罷鍾山青人生此樂豈常有送子江千重回首男兒冨貴自有時但遇風流莫相負燕臺漠漠塵紛紛天寒路長愁殺人我今别子且欲往為子先驅多苦辛南歸戲為長句自解人言債多能不愁我今真作隔夜憂天生吾舌尚可用況有薄技供遨遊但恐饑寒命所注縱有衣食非人求一家嗷嗷三十口老母弱子將焉謀我欲賣却百畆田不堪持作三年羞不然計且無復之請屏所愛不一留先賣几頭子石研不愛墨花繡澀春雲流次賣商尊父丁篆不愛寳色剝落䕫龍糺次賣西山梅花二十畆不愛春湖草閣臨青浮最後賣却山雨之飛樓不愛松風梧月芙蓉秋如此不足辦吾事天實為之吾何尤人年四十老將至譬如已死亦即休潘克家蔣韶賔邀遊善巻寺酒後偶成我生好遊天作縁昨日風雨今晴川泊舟遙愛松際寺入門稍覺風中泉恍然便與幽意惬何況突兀巖崖前咄哉兩洞大竒絶使我心神猶宕跌雲端仙掌殊可辨四壁烟霞互明滅石牀丹竈亦宛然鹽堆米積何纎屑却思造物有底意為此形模巧施設仙人已去山鬼來虎豹疾走蛟龍迴吾欲上下窮兩崖水深可泝闇可開褰裳濡足亦徒爾胡不久留但裴回君不見祝娘遺跡今荒臺當年讀書安在哉寺相傳為祝英臺讀書處今有臺尚存三生因果亦茫𣺌虚堂寂歴松風哀寺為唐丞相李蠙所創至宋李綱李遵伯復新之或以為一姓三生故寺有三生堂云嗟我何為墮塵趣十年不踏荆溪路張公玉女入夢頻聞誇善巻空復妬今日何日果此緣山僧地主欣相遇經時未豁塵土腸一朝欲向山靈訴洴浰蔣呉區潘蔣居洴浰潘居呉區皆近善巻寺二子知我我不謾百年易盡歡不足胡不買山偕盤桓子今有山不肯居我今無錢欲買難待我有錢知幾時蹉跎離墨與銅官壽方孟旋母鄭太夫人去年方子就我别荷風疎疎送餘熱執手欲話燕路長低頭倚閭心已折今年春風失意歸别子又見秋風飛遙知秉燭情相似欲寄壺觴伴綵衣俄聞介壽當兹辰願言持此稱千春山川悠悠隔吳越雖有懷抱無繇伸翻思燕市擊筑時與子心期豈爾為陶母廚中正辛苦區區升斗猶參差男兒變化未可料安能屈首甘常調由來菽水亦自歡朱門粱肉徒誇耀我懐此意私吐吞非子莫敢相為論亦知阿母自聖善不至河漢吾此言倚雲山頭卜築成千頭木奴遶宅生陽溪百仞清見底夾岸朱實丹霞明美哉風土神仙居阿母保之樂有餘爛柯日月長不老回看塵土將何如送程孟陽遊楚中我昨勸君為楚遊喜君翻然即掉頭今日置酒與君别見君行色我始愁平生心知兩莫逆人言君癡我亦癖村扉城郭嫌疎索那能别此長為客去年送我揚子湄焦山落日江逶迤豈意今年復送君楚雲湘水勞相思君家書閣秋山中千山萬山松入風我亦買山梅花裏誅茆卜鄰期子同惜哉此意不得遂連年飄泊徒西東人生萬事常相左饑來驅人欲誰那君今新得賢主人相將且拽寒江柁江月山花遠趂君詩囊畫本留貽我小築看荷花偶成白公堤畔烟湖空四月未盡荷花紅兩湖盪槳無一朶小築已見千花藂昨日梅雨天多風風翻雨打花龍鍾今朝日出方照曜半晴半隂態愈工君不見雷峰倚天似醉翁霧樹欲睡紛朦朧此花嫣然向我笑怯怯新妝出鏡中新妝美人正可喜笑而不來情何已且􅂸一斗酬醉翁此翁情澹如烟水蓴羮歌恠我生長居江東不識江東蓴菜美今年四月來西湖西湖蓴生滿湖水朝朝暮暮來采蓴西湖城中無一人西湖蓴菜蕭山賣千擔萬擔湘湖濵吾友數人偏好事時呼輕舠致此味柔花嫩葉出水新小摘輕淹雜生氣微施薑桂猶清真未下鹽豉已髙貴吾家平頭解烹煮間出新意殊可喜一朝能作千里羮頓使吾徒搖食指琉璃盌成碧玉光五味紛錯生馨香出盤四座已歎息舉筯不敢爭先嘗淺斟細嚼意未足指㸃杯盤戀餘馥但知脆滑利齒牙不覺清虚累口腹血肉腥臊草木苦此味超然離品目京師黄芽軟似酥家園燕笋白於玉差堪與汝為執友菁根杞苗皆臣僕君不見區區芋魁亦遭遇西湖蓴生人不顧季鷹之後有吾徒此物千年免沈錮君為我飲我作歌得此十斗不足多世人耳食不貴近更須逺挹湘湖波袁石公盛稱湘湖蓴菜美不知湘湖無蓴皆從西湖采去以湘湖水浸之耳蓴菜初摘後以水浸之經宿則愈肥凡泉水湖水皆可浸不必湘湖水也今人但知有湘湖之蓴又因石公言謂非湘湖水浸不佳皆耳食者耳西湖走筆贈雪嶠上人渡江尋雲門山雲門山𣺌何許送君行隔江渚十年雙髻今何如千山萬山同逆旅西湖殢人我亦留君胡不留掉頭去我嘗愛君機鋒如劒鋩君亦愛我筆墨如風雨多生與君數相見此日分攜何足數空山無人雲作主猿狐悲啼虎豹怒衲衣綻盡蒲團空何必樂邦乃我土泊百花洲寄孟山人於紫薇村百花洲上髯翁宅幾度維舟就君客城頭古臺横月明臺下胥江向城白落日曽迴曙塢船秋風屢挂横塘席喜君好事缾罍賖喜君幽居門巷僻一朝到門主已非池塘栁色空依依歎息此翁無住著十年九徙何時歸山中雲物知好在舊日酒徒應到稀自笑無家猶畏徙跼蹐里中徒忍饑不如放浪從君去愛殺村翁住紫薇婁江舟中題畫送王平仲遊南雍黄姑灣頭黄梅雨複岸重岡映村塢布帆遙為故人開一片離心寄江滸金陵悠悠隔烟樹故人指日金陵去男兒㑹當有知己三十成名未云暮桃葉渡頭小槳迎雞籠山下蹇蹄輕勝事因風向予說舊遊何處不關情贈鸖石翁十年不見鸖石翁舊日酒腸今在否當年名飲推吾徒豈意參商成白首我今且老何況君惜哉當年臂鷹手每憶君家壓手杯一飲千杯不停口酒後瀾翻說古今目睛煌煌爛如斗年來沉飲但閉門我來叩門亦不有却思結客少年時變滅白衣與蒼狗我嘗許君贈一言不覺蹉跎廿年後如君沉溟古所無我欲名君君不受常恐心期却負君喜君六十猶抖擻匡牀擁膝晚未起秋光熒熒照蓬牖壯士且復能飲乎酌以大斗祈黄耉嚴太夫人生日歌我愛西湖三嚴子生長西湖山水裏兄酬弟唱情性真詩腸酒徳堪驅使板輿時曳兩峰烟畫舫常浮三塔水天生兄弟皆好竒日奉慈幃多燕喜我生區區貴適志富貴不來來亦去羨君神仙不易得君猶對我嗟不遇自言髙堂常寡歡令我稱觴為大言我今落魄更可笑窮苦之言安足存憶昨東歸意偪側入門彊笑無顔色忍聞慈母慰遊子此意吞聲杳何極男兒逢世知己疎欲決不決何躊躇青鞋布襪掉頭得念此尸饔兼倚閭咄咄三嚴子與君相知數年矣豈不知子心中事人生免俗固難爾借子樽中酒上子阿母壽莫論富貴與窮愁過耳悠悠皆不有君不見雲棲古佛今導師說法平等無參差前年吾母往頂禮旋聞阿母同皈依團圞且說無生話捧檄聨翩自有時友人呉瑞生嘗患腹痛自言遇小不平輙發以酒澆之則止酒醒復然余聞而異之為作此歌不敢望枚生七發聊用廣瑞生意耳袁生嘗有言人不可無癖天下難醫是俗病往往奇人有竒疾吳郎灑落風流人何事捧腹常呻吟自言此中多磈礧遇事輒發誰能禁初如車輪轆轤攪繼乃干戈劒㦸擾但得一􅊦春融融無那酒醒愁𣺌𣺌余聞此言三歎息此症未許庸醫識余老世途屢折肱請為放言代草檄君不見此中空洞自本來何處﨑嶇得荆棘㑹當笥經巻五千兼可容卿輩數百有時五嶽起立江河奔有時青天萬里雲無迹紛紛氷炭徒滿懷摩挲祗供一笑劇勸君不用純灰三斛洗世間亦無中山千日醴酒不為功亦非祟但請皈心向慈氏為君剗却人我根到處常得輕安體戲贈呉鹿長去年逢子西湖曲新妝綺疏映湖淥一曲干杯笑不停燈下酡顔勝紅玉今來豐干子出迎訝子形骸太瘦生自言脾病連三月齋廚冷澹如枯僧吁嗟别子曾幾時昔時豪華今爾為呉郎吳郎我知子子病可療癖難醫自古鍾情在我輩僕本恨人諳此味風流老却夢已陳古劒悠悠猶有氣桃葉渡頭望眼賒秦淮月對白門斜朱絃罷弄烏絲濕我聞斷腸況子耶我嘗愛子胸懷真少許却勝多許人但恐君情猶未至情癡未足為君累縱令黑瘦來清虚不似肥癡擁渣滓況子貌枯神轉腴髙譚炯炯雙眼珠豈有此人為情死終看夢覺成栩蘧贈别呉正子華屏山頭月初上喜子能來共村醠河西橋外雪片飛愁子衝寒匹馬歸憶昨豐干初見子向我喃喃情不已欲扶風雅回波瀾不為區區念桑梓君不見豐溪村中十萬家朱門粱肉紛如麻呉生閉門守四壁百城萬巻徒相誇囊空不肯留一錢好客時時沽十千腰間湛盧脫手贈匣裏自保朱絲絃我今别子行復東扁舟直下隨飛鴻新安江清釣臺矗此時念子心忡忡吁嗟乎吾儕意氣豈輕擲一腔雖丹雙眼白君看世路皆悠悠别後頭顱好珍惜洞庭看梨花柬别王淑士與君期看盤螭花忽漫乘風洞庭去洞庭十萬梨花村村村花發當湖曙石公山西龍渚灣毛公壇下包山寺幽竒秀特天下無臨風絶呌何由寄生平小别無三月相思絫絫動盈札自從升沉隔雲泥江波𣺌𣺌吳天濶别君三年一見君簡書催君行復發君不見城東歳暮雨窻西兩度幽懷不能說白門洵佳麗何如故山好清遊尚難同況乃期汗浩知君買山懐逺志笑我干時戀小草他年出處兩茫茫長使青山看人老盤螭山訪覺如上人不遇三年十月盤螭路石脚紆回矮松樹誰開絶凹香茅宇四壁圍丹門漾素重來春濃山正午湖光欲曙花將暮兩度尋僧僧不遇小憩幽窻覺禪趣庭中殘桃自送迎湖面浮峰無去住君不見六浮山閣今非主六浮居士居無處欲乞一單終餘年坐對青山叅活句余買一小丘於鐵山下登陟不數十武而盡攬湖山之勝尤於看梅為宜蓋踞花之上千村萬落一望而收之久欲作一小閣名為六浮六浮之名遂滿人耳而閣竟不就友人鄒孟陽見余歎息每欲代為經營今日始引孟陽至其地亦復呌絶不能已余因為作六浮閣圖兼題一詩冀孟陽無忘此盟時丁巳八月十八日也十年山閣不得就却負青浮日夜浮故人一見豁雙眼何日三間銷百憂氷花琪樹亂檻外銀山雪屋排簷頭百年有錢作底用一朝卜築偕行休君家西湖我震澤往經冬夏來春秋十千到手即可辦非我求君君自謀虎山踏月行示同游鄒孟陽張魯生靈巖脚下斜橋路一路横拖山水去秋風秋月幾度來風月關心舊遊處穹窿欲盡湖山開落日閃閃青烟來虎山橋頭山色闇明月遲我猶徘徊凭橋東望遮山立明月正向遮山出遮山遮月不遮光陸離寳氣初離室須㬰山尖露半彎突兀捧出黄金盤四山蒼然一水白玉刻橋梁銀作欄吁嗟乎張生昔年與汝橋上行虎山十年月再明同游幾人復誰在鄉月照我空多情吁嗟乎鄒子子今真見虎山矣虎山烟月竟何似當年畫出虎山時橋上之人吾與汝子兮子兮奈此良夜何磯頭夜深風露多遊人欲歸殘酒醒試聽中流踏月歌西湖喜遇譚友夏賦贈誰言譚郎貌似我執手問人還似無寸心明白已如此區區形似終模糊我昔知子因子詩曉月殘雪風鳴枝境清音寥意飄忽虎井數篇猶可思呉江楚嶠兩遼闊期子不來空歳月西湖烟水我為鄉豈知此中有譚郎十年相求始相得停車下船各歎息歘然魂魄化為一異者衣裳與巾舄城中兄弟情好偏非我與子神不全兩山紅葉正相待子詩我畫交無嫌我家震澤梅花裏湖氣花光三十里留子共度梅花時且待春深上湘水風雨吟風風雨雨江頭路多少離人從此去欲將别泪寄黄溪昨日黄溪在何處歸帆一挂不可收西泠橋邊人倚樓獨酌孤眠不成夜又教風雨伴儂愁題畫贈潘子方孺吾聞泰山五大夫之松干雲礙日摩蒼穹廿年奔走燕齊道無由扣嶽攀虬龍考之所聞及傳記此松不復仍秦封松壽千年亦常耳況此神物間氣鍾帝王褒崇萬靈護不天斤斧誰能窮樹猶如此人則那長生久視安可逢吁嗟乎潘子與汝同庚吾先汝相看同是知非翁弱冠論文今老矣當年意氣凌雲霄不貴不去真可恥四十九年成一往百年彊半能餘幾儗將末後見先師莫漫隨流稱蕩子君不見此五松圖意長楮短可奈何干雲礙日空想像横柯接葉聊婆娑吾儕屈折亦如此歳寒自保應無他送汪君彥同項不損燕游兼呈不損汪生昨自欈李還忽然向我譚長安自言指日長安去及此春深花事闌嗟乎汪生何太迂少年不肯守牀幃因人遠役將何為我是長安舊游人三年一度長安春如今怕說長安道送子忽忽傷心魂長安城中有何好惟有十丈西風塵人畜糞土相和勻此物由來無世情貴人逢之亦入唇其味不減庖廚珍别有髙梁橋下水栁色一灣塵似洗從此沿流向玉泉湖山亦有江南意充君畫本差可耳君不聞京師畫工如布粟閩中呉彬推老宿前年供御不稱㫖褫衣受撻真𨽻畜此事下賤不可為君但自娯勿干祿吾友重瞳之孫氣食牛萬金散盡圖千秋一朝掉頭出門去為我問之何所求君應朝夕進苦口勉之閉門發䇿勿妄侈交游江南春次倪元鎮韵錦䙀簇簇東園笋宿雨初收池面靜栁條欲織畫簷絲花枝為冩疎簾影寒食風來山店冷轆轤聲杳臙脂井山前日暮鳥銜巾繡陌香泥闇麯塵鶯聲遲花信急裛露穿花羅袖濕常恐春歸歡不及飛紅盡處千林碧不見花洲舊呉邑洲上要離塜猶立楊花滿洲生綠萍百年易度胡營營天平山頭石如笋松隂落日游人靜射瀆千帆曳練光胥山萬水留寒影響屧廊空履痕冷館娃舊事沉宫井鴟夷歸來裹角巾吳臺越榭皆烟塵春水生春潮急西泠渡頭莎㟁濕我欲渡江潮已及對㟁千峰萬峰碧闔閭勾踐空城邑男兒功名幾時立眼看身世如漂萍驅車䇿馬將何營題葉熈時空香閣我昔名齋以六香其中空香亦居一香本着物非從空以空名香非其質曰空無相諸塵生謂空無香義亦失香塵之體本來空空中諸塵熾然出葉子構空閣獨愛聞空香豈徒屏除沉水與檀麝竒茶妙墨皆無當酒亦不能馨花亦不能芳凡彼有相皆有壊此香乃始名真常雖然更有說此義非究竟空香若為聞為復有聞性聞性若不空香塵豈能淨空無駐香體香不與空緣鼻非往空處空非來鼻邊空香閣中人謂此然不然檀園集巻二
