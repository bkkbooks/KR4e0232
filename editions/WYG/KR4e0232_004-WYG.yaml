body:
  text: 檀園集巻四明李流芳撰七言律詩凡九十首春江寓目西日欲墜江村涵淺汀深莎相映藍垂楊滾絮不戀地柔藤落花穩住潭白頭天涯自無主朱顔明鏡誰為憨思君不來春易老令人腸斷偏江南除夕乙巳壯心咄咄漸成灰前路茫茫轉欲催已斷葷腥過百日將抛麯蘖只三杯不愁歲向今宵盡且喜春從昨日回先一日立春聞道西山梅早發故人期我放忙來與仲和淑士有鄧尉看梅之約出都門答伯美見慰勞君為我費嗟吁不道逢時我自迂每愛偷閒銷歳月兼因多病惜身軀莫教枉却文章祟只合償他車馬逋生計漸貧親漸老行藏欲决更踟蹰東阿道中騰騰兀兀逐塵行忽似春山為解酲髙下故隨人意繞逶迤偏覺馬蹄輕誰教柳色毿毿暎不分梨花處處生愛殺穀城山下路風光況復是清明西湖答家兄茂初見寄辭家正是薔薇時又見薰風菡萏池慣别自輕千里道愛遊偏與五湖期緑勻隄樹朝烟歇紫入山樓莫塔垂可惜西湖好詩料弟酬兄唱各參差豐干得孟陽廣陵歸訊兼聞淑士從白下奉使南還率爾有作維揚歸客尺書來白下仙郎千騎回欲話吹簫明月夜還思落木雨花臺新詩㸃撿尊前出秘簡從容燭下開殘臘過君能幾日闗山留滯使人哀别鮑谿甫程公亮二子新安山水是吾鄉頭白歸來宅半荒乍見清溪如故舊每譚黄海欲飛揚未能共蠟登山屐忽漫思隨下水航臨别媿君情太厚衝寒徒步遠相將别汪伯昭别君長鋏不須彈作客方知行路難舊里豪華人競爽貧交風味自相歡嚴冬忽已十二月歸櫂其如三百灘總為黄山與君在掉頭時復憶新安訪慧法師於臯亭桐塢作不見臯亭慧法師每勤書札慰相思蹉跎又作三年别慚媿終無一往時忽憶虎溪成舊社且尋茅屋賦新詩闗門短櫂衝炎去黄鶴峰頭月上遲贈城南夏君君善種樹作小景盆盎中疎宻掩映頗有畫致每到城南訪隱淪一灣江㟁草鱗鱗比隣竹色當門緑傍檻荷香出水新貧向交遊誇好事巧於林壑見天真看君杯酒飛揚意結客塲中少此人雨中喜山僧摘楊梅至一望山坳紅紫堆臯亭五月熟楊梅家家火樹垂千纈日日氷盤薦百枚尚擬趂晴看飽去却憐和雨摘將來莫論風味如西磧齒輭還須嚼幾回余買山西磧其地産楊梅味甘遠勝武林諸山所產次韻答李九仙山中見寄從誇日帽與天梳獨享知君且媿予道力未能甘混俗野情終是愛幽居已諳世上悠悠態不學空中咄咄書早晩黄溪營五畆堂連梧竹水環蕖時九仙欲為予卜居黄溪村中次韻酬沈雨若見寄寥落花間一草堂喜看舟楫到江鄉春潮送客渾無信寒菊懐人尚有香十五松齋容嘯傲雨若園居有十五松三千塵路費商量時予將北上憑君莫問行藏意世事於今正渺茫錫山夜别閑孟子薪彥逸及從子宜之兒子杭之十日追隨意未傾一朝言别若為情秪憐對酒成髙㑹無那挑燈是送行家累闗心難共語功名垂老不堪評便應撥櫂從東下十畆閒閒尚可耕撩亂鄉愁一夕生燭殘酒醒奈深更隔船安穩歸人夢前路迢遙去客情江月又催征櫂發寒雞不待寺鐘鳴十年分手梁溪路但覺衰頽負此行除夕白門喜比玉攜榼至寓舍同子將無際升父無我守歲伯敬復遣人餉酒戊午經年不見意何如且喜他鄉共歲除久客便應為地主逺遊隨處即吾廬留人正惜春泥重得酒何愁夜燭虚此際慈幃最蕭瑟不禁歡罷一欷歔元旦枕上口占己未一夜無眠徹曉天不知今日是新年年因底事成添換情亦無端起變遷已是客中重作客何勞縁外彊除縁安心如此能安否愁病公然到枕邊元日偕子將無際過比玉居停主人費節卿為置酒竟日節卿好武時鼓掌說劒比玉有家藏端硯甚古至是始得觀客路愁聞節序來老懐還向故人開到門雨氣如相候入座春盤不待催頓覺雄心隨説劒且拚長日送深杯愛君匣裏端溪色更遣燒燈試墨回滁州道中見梅感賦春回忽忽到新年江北梅花也爛然野店一枝看欲絶家山千樹見何縁窺窻曽與人留别照水還將雪鬬妍抛却風流逐塵去空教心折馬蹄前辜負看花又一春百年彊半幾年身未能徇性難違性且復隨人苦畏人昨日明朝江北路千盤萬折隴頭塵如癡如醉還如夢漸覺騰騰欲任真旅宿滁州同子將無際歩屧至龍潭山憶丙午偕羽明孟陽來遊已一紀矣龍潭樹宻晩烟勻豐樂亭空野望新舊日經過餘十載重來朋好亦三人勝情老去渾無恙遺跡追思已半湮自是風塵易顦顇形神於此一相親濠梁道中别子將無際南歸可惜春光半滯霪青泥汨汨水涔涔途經千里歸猶近病覺三分治未深欲去尚看童僕面相留秪媿故人心驚魂怕問前頭路老馬驅馳已不禁同心難得復相攜不道中途有别時去路愁君初索莫病軀憐我獨支離當杯畜意渾無語上馬回頭各背馳未免有情那遣此元來不及有情癡日日思歸又戀君今朝決意與君分情懐和病如春雨踪跡無心似嶺雲好去烟霄須自致得歸麋鹿亦能羣繇來出處元同調俗耳悠悠未許聞出門各自抱深情豈為懐居與噉名我覺途窮應退步君知道廣即前程秪如白下來尋舊兼作濠梁遠送行去住隨心無不可莫因去住又心生春寒花事未蹉跎西磧西溪正好過自有閒人能作伴從教多病不成魔髙梁橋外千行柳淨業門前十頃波屈指長安行樂地其如無夢逐君何歴落嶔崎三十年寧教人笑不教憐一腔熱血猶堪灑半片寒氊也有縁貧賤已知安骨相功名端合讓才賢逺公蓮社還依舊且放心頭得悄然南歸途中述懐綻盡儒冠未肯離從今應草責頭詞摧頺漸少風雲氣落拓空慙市井兒貧自生來何足怪病從心起即難醫得休便覺真休矣豈待功成名遂時飢寒未必解相驅衣食天生定有無量腹虀鹽猶可辦遮形繒綺亦何須還思心累非貧賤却為身安長惰愚苦行家風窮活計大都節約是良圖獨有親恩欲報難人間簪帔亦榮觀尸饔已自長齋慣列鼎何如啜菽安每憶臨分増涕泪應憐歸到得團圞相依只說無生話名利真同糞土看登潤州玉山亭子感懐廿年江上玉山亭來往經心似送迎陡覺層欄増爽豁試臨落日尚崢嶸閒鷗逐浪仍東下鳴鴈隨㠶故北征自笑勞勞頭半白依然飄泊一書生元夕虎丘有懐閑孟子薪諸子隔年殘月虎丘看只記懽悰忘别顏共道翩翩日邉去那知冉冉月中還遙傳急皷千燈外獨立寒雲片石閒此夕此山無此況對君難說此登山南歸後六日偕閑孟子薪家茂初無垢集魯生園亭梅花下次家茂初韻頻年不到此花中喜見花枝壓路通近坐繁香如殢酒當盃落瓣尚禁風朝光已逐輕隂變晩氣遙隨積靄空贏得閒身共歡賞莫將開謝比飄蓬雨中泛舟南郊聽江君長絃歌次家茂初韻箜篌筝阮變新聲韻入三絃分外清遣病每思君一曲停盃偏覺我多情纏綿未敢施銀板掩抑還宜合鳯笙彈向舩窻亂風雨闇泉驚瀑一時鳴寳尊堂看杏花次從子宜之韻愁病經春未有涯除非對酒并看花疎枝乍見含烟吐獨樹偏憐傍屋斜不共梅妝矜似雪已分桃暈欲成霞婆娑古幹南村下尚擬新晴過陸家南村陸載道家有古杏花時常載酒往看婁塘過楊婁南故居感賦婁南為先君舊識有崑山巧石尚藏余家今其地已半屬他姓且别構園亭矣曽侍先人說舊遊漫尋遺蹟到林丘婆娑老樹猶堪䕃清淺迴塘已不流當日交情留片石誰家新構起飛樓百年興廢尋常事眼底傷心又白頭過積善庵悼雙林長老郭外輕隂爽氣多風光榖雨近清和新林遙指花宫出舊侣曽陪竹院過一路野芳紅似錦幾灣春水碧於羅到門啼鳥渾相識遺墨空房涕欲沱雨中集侯雍瞻東園無邊水木此城隈恰稱飛樓四面開雨㸃到池偏淅瀝烟絲著樹故徘徊泥深畏踏盤盤路酒渌難抛灔灔盃襥被未能辜秉燭且留髙興待重來重至西湖柬孟陽子將諸兄弟老見湖山尚欲狂舊游重憶使人傷曽穿鷲嶺丹楓路幾醉孤山落月航竹閣書題應澷漶雲棲原草欲荒涼浮家得似誅茅穩春塢桃花興不忘西湖寄懐閑孟子薪鄉書一把一欷歔見説秋風病未除酒􅊦可仍隨伴去花畦能復課人鋤貧年生事知何在老境交情忍向疎不肯離家來作客少愁少病得如余久客湖上家兄以詩見寄次韻答之歸裝欲理又徘徊三月思家只夢回滾滾湖頭人盡去剛剛秋半月將來能抛山色如眉淺忍放歌聲似玉哀藂桂料應難共把登髙猶及菊花開集魯生薖齋次比玉韻毎愛君家修竹林虚齋終日貯清音殘花欲盡猶堪齅嫩草初生正耐尋酒滿底須乘月去絃長時復應風吟微茫歸路黄昬後亂眼春條雪半岑送忍公都試白下廿年遊處憶長干送子秋風白露溥湖市荷風初動槳曲阿林月欲隨鞍爭先自信無餘子競爽人誇有二難此日飛鳴知巳後功名路窄子心寛送呉西音之楚吾衰已分老滄洲念子因人作逺遊吳墅鸎花三月賞楚江烟樹一帆愁髙情久欲參雲嶽浪跡何妨逐海鷗聞說買山將卜隱大都不用有心求送同年陳公虞司理被召北上徵書昨日下錢塘仙吏乘春指建章柳色西陵歸騎緑桃花婁水去帆香于公隂徳髙閥閲仲子昌言著廟廊獨有素心常不改世途炎熱自清涼送項不損之燕十年長路客心驚此日春風送子行汶上梨花飛雪盡濟濱楊柳著烟輕逢時豈必因楊意對䇿還應學賈生一往三年彈指過故人拭眼看飛鳴壽陳士逺七十麥風梅雨近端陽喜見晴曦麗草堂榆柳圍窻成翠幙葵榴照眼勝紅妝同歡荆樹三株老益壽蒲觴九節香鶴髮如霜顏似玉疑君肘後有丹方送張宗自之任晉安晉安文物表閩鄉試宰懸知治劇良馬首江郎千丈碧船頭黯澹百灘長床琴半入幽蘭韻家醖新添荔子香他日政成民不擾風流何必數河陽次韻招孟陽出郭看梅門外春風應候來扁舟還擬去尋梅山僧每訝多年别游侣方欣久客回草閣一枝先破蕚村園數樹已生苔余家山雨樓前一樹花開最早又西山梅花幹上皆生緑苔繡澁可愛此中無此種獨三老園數樹皆然只今步屧堪乘興新醖還期待子開海上和孟陽觀伎詩次韻但能取醉莫論文春色闌珊已十分海上楊花空作雪西陵松樹藹為雲出船素面如纎月倚檻紅芳學茜裙堪恨風流不同賞斬新詩句亦輸君時公路言其家牡丹方開共為酒賞之余滯海上不得與靈雨詩次公路韻占魚空復詠無羊其雨朝陽已映牆澤國霑濡行欲盡旻天仁覆故難量纔聞步禱過三市忽見甘霖沛四鄉一路農歌間漁唱練祁西望彩虹長郊原日夕下牛羊蓑笠經時不過牆蟻欲出封應有兆月將離畢可能量誰翻東海蛟龍窟復見西風禾黍鄉共道神明回造化歌功詠徳一無長窮簷久已歎牂羊次第焦枯到荔牆百畆如雲且休矣一牀涼雨可思量渰凄忽借風為陣霶霈仍教水作鄉秋至江湖催放棹蓼汀葭渚興何長何時得雨一相羊拄杖看雲自出牆銀竹光中森可數碧荷葉上瀉難量縈簾澹月迷鮫室敧枕涼風到蝶鄉賴有新詩撑倦眼底須何物引杯長夀金子魚八月四日午潮新漲月初生雲物髙秋望轉清好對庭蘭開酒􅊦更穿叢桂鬬棋枰經懐舊事惟供笑入耳新聞不受驚容我疎狂稱小友行藏亦擬似吾兄壽閔明卿八月十四日陵谷滄桑㑹有期人間涼熱不須疑百年交態君應見二老風流我亦宜對酒呼盧常咄咄當歌起舞尚僛僛桂黄月白秋如此若更言貧罰百巵九日泛舟次伯氏韻時方從公路飲歸有酒相呼定不違休論城闕與村扉佳人門外初停槳令節風前已授衣寒水荒灣秋澹蕩疎簾新月夜熹㣲猶嫌未盡登臨興良飲厭厭肯放歸贈謝明府生曰是口為九月十九日先一日立冬萊蕪塵滿訟庭空秪見公堂祝華封候轉昨朝冬已立節過旬日九還重千村稌黍彌寒望一路謳歌間夕舂籬菊正黄楓又紫百年初度幾人逢壽孫青城山人山人好蓄古器書畫扁舟往來吳越間梅疎竹瘦小庭妍擁絮朝陽殢酒眠留客茶烟常出屋乘春花氣漸迎船蜼文獸靣看如活鳥跡蟲書蠧欲穿動是商周與秦漢知君壽在羡門前四月二日同諸弟過夏華父水亭小飲四月二日天清和夏家亭子熏風多扁舟出郭興無限三盃草酌顏先酡向夜蛙聲閙深竹中池星影牽微波歌殘酒盡人不醉篷底獨眠愁奈何夏氏水亭次朱漢生韻池上茅亭似柳洲城南一過一來遊林疑無際隂常合水未生瀾屋已浮秪許老夫時曵杖敢邀嘉客共維舟别君知有秋期在應到西興舊渡頭呉門送徐令公攜家白下南州喜見後人賢文彩風流信有傳相送閶門斜日裏攜家淮水亂雲邊推篷梅雨新晴候挂席江風欲曙天若到清涼臺下寺老僧應解說當年題人新齋夷門别業在西郊新築髙齋對泬寥樹好牆隂常冉冉竹深簷籟日蕭蕭尋花路僻過橋去留客燈昬帶雨燒共愛幽棲真率意門前時見有停橈朱修能見訪聞予方葺檀園以詩枉訊次韻荅之時修能將至茸上七年不見喜重過共指生涯素髪多池上新庵仍署泡堦前舊壑已名蘿泡庵蘿壑皆在檀園中畏人小築猶難就對客髙吟豈易哦便欲相留同結夏扁舟峰泖奈君何送徐克勤試京兆玉韞珠藏出有期子今行矣復何疑文章價定無容論富貴時來不厭遲曉月正臨揚子渡晩風遙愛後湖湄天公也助人行色預遣涼颸掃赫曦送人遊南雍秦淮新月待君過婁水涼風送客多燕子濤聲秋澒洞繖山晴色曉嵯峨詩名入社髙珠玉樂事當筵艷綺羅桂白茰紅期又近巷無飲酒欲如何閔伯先過里中晩泊溪頭不肯叩門翌日以詩見投次韻奉酬柳濃溪漲可維舟人未能幽宅已幽但肯攜尊來見訪何妨秉燭與同遊題門有字君應識見戴無須我亦愁直待來朝方握手不知晩泊若為留伯先偕徐女揚諸君見過留飲檀園别後伯先以詩見寄次韻新知舊好兩相攜來看初蓮聽晩鸝池上熏風先客至林端缺月為誰稽酒懐爛熳猶輕敵詩興蕭疎已怯題不醉其如吟思苦因君亦遣白頭低寄韓孟郁國博不見韓兄六七年鬚眉磊落在吾前詩成只用三义手酒到先浮十滿船擬向崆峒倚長劒却來國子坐寒氊白門佳麗曽遊否何日緘題寄一篇秋日喜子魚孟陽君美仲和過檀園宿留即事長日郊居少送迎喜聞客至啟柴荆百年潦倒諳交態廿里過從見故情涼雨洗塵秋院靜飛蟲逺燭夜堂清休論舊事増惆悵醉起廵廊繞月行伯氏有作次韻再呈諸兄床頭甕滿不須賒池上秋涼尚有花數畆正當風檻綠三間新帶月廊斜清言吾輩還多味髙枕從來便是家莫怪相邀仍簡畧知君愛酒不嫌茶仲和次韻見投復用韻奉答兼訂後期秋入吾廬景物賒一簾新月半欄花風迴水葉翻翻白雨壓簷枝恰恰斜宅比柴桑多種柳門通苕霅可浮家客來隨分能供具掃籜煨鐺與試茶練祁南下水村賒一路秋風吉貝花到市鐘聲知寺近過橋柳色逐門斜貧能好事無如我老解求閒有幾家若肯重來留十日不辭淡飯與麤茶用前韻呈諸友少壯輕抛歳月賒老來那復戀空華逢塲已覺童心盡攬轡其如急景斜不向竿頭思進步何時浪子得歸家趙州底事勤行脚我欲扳他喫椀茶再次前韻柬孟陽仲和小庭風月近來賒更築陂陀種雜花日出梧隂搖几淨霜前柚實壓欄斜耽書漫學過難字愛畫終慚對作家老懶惟思閒伴侣齋廚自可辦𤓰茶種花用前韻為園數畆未言賒鑿沼疏泉手灌花花欲疎疎仍宻宻枝須整整復斜斜漸看節序皆芳候不放風光到别家最愛南榮冬日暖蠟梅一樹映山茶小葺檀園初成伯氏以詩落之次韻言懐短築牆垣僅及肩多穿澗壑注流泉放將蒼翠來窻裏收取清泠到枕邊世欲何求休汗漫我真可貴且周旋一龕尚擬追蓮社不用居山俗已捐用前韻呈諸道友破衲蒲團只一肩飢尋芋栗渴求泉的無長物為吾累豈有𤣥機在汝邊興到偶吟同梵唄狂來起舞快廻旋風光似較些些子任意拈來信手捐再用清字韻呈諸道友來去溪山似送迎捫崖越壑踐榛荆為參知識求心要豈愛幽閒助道情夜後溪聲連屋動曉來山氣捲簾清方知不用從師覓悔作盲人悵悵行秋日臥痾西音以詩枉訊次答秋來懐抱向誰開三徑雖成任草萊短髪欲梳因病廢新詩一笑為君回庭空始覺風生樹石潤偏憐雨上苔遲暮年光悲轉促漸看林葉變條枚一丘安穩且徘徊掩耳誰知蟻穴雷已覺嬾隨衰共至何妨閒與病俱來難抛舊習惟詩句可壓新愁是酒杯鷗鷺欲親鳩鷃笑行藏遮莫受人猜再次前韻東西音兼呈孟陽仲和柴扉寂寞枕江開久擬逃名學老萊白髪經秋看更短衰顔得酒怪能回為臺欲待生新月掃徑仍教䕶舊苔老覺耽詩終澷興故人才或似鄒枚懸車束馬路徘徊倒峽崩崖吼萬雷底事奔波衝險去何如抖擻出塵來籬邊秋老千花片溪上烟寒一酒杯抱甕真同灌畦叟更無機事可相猜贈沈公路髙齋夏木愛扶疎閣有懸花沼泛蕖窈窕一丘堪庾賦蕭閒十畆類潘居千秋鳥跡搜奇字四海蟲天播異書聞道尫羸多壽考已無渣滓礙清虚園林風物喜秋晴水檻山廊貯逺清詩思不因多病减道心應以得閒生婆娑老桂花將綻指㸃髙天月漸盈初度更逢佳節近百盃端擬為君傾再贈夏華甫幽居非郭亦非村獨木為橋槿作垣已構虚亭延夏爽又開曲室納冬暄栽花未長先成徑喂鶴防飢不出門囊底欲空尊自滿貧能似爾復何言送謝眀府入覲呉江木落月初圓仙吏衝寒到日邊天遠雲端看去舄春濃花裏望回船垂裳快見龍飛㑹肯構新瞻鳥革前明年為崇禎元年時三殿新成自媿無能偕奏計莫言中野有遺賢三年清節照冰霜百里謳吟徹帝傍治績自應推第一聖朝不次待循良御筵初醉宫花側天語親聞玉殿香可道留恂正辛苦攀車欲别復傍徨元夕雨邀里中諸君小飲檀園燈下次伯氏韻花邊樓閣月邊廊更愛繁燈照夜光雨氣無端先客到簷聲應為和歌長城頭結綺人俱散村裏迎神鼓不忙且盡一杯酬令節泥深門外亦何妨十六日諸君載酒重集寳尊堂次伯氏韻索笑簷梅日幾廵良辰樂事肯辭頻燈宵自是難兼月酒伴何須更覓人是夕主賓十人皆昨夕所集也時序百年真可惜懽娯一瞬已成陳眼看花發多風雨狼藉春園萬樹銀檀園集巻四
