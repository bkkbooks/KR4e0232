body:
  text: 檀園集巻七明李流芳撰序凡十六首夀汪母謝太夫人七十序予有同里閈之友三人曰羽王吳子方孺潘子叔達汪子叔達今字無際叔達於吾黨年最少交最後予既不及登堂拜其尊人而獨習其太夫人之賢盖予與叔達皆有母尸饔其讀書自喜落拓不屑世故大略與叔達同而叔達失怙更早太夫人偕其二姫相守十餘年家貧弱子幼女婚嫁未了朝夕拮据以須叔達之成太夫人之所處有獨難者吾是以知其賢過人逺也雖然太夫人今年七十春秋既高矣而叔達方偃蹇不逢文憎其命將圖所以奉太夫人之歡而不可得即二三子圖一言為太夫人夀而佐叔達以奉太夫人之歡亦且奈何夫士固唯所自命耳古人學書學劍不成輒棄去其傑然之意有必不可覊靮者今士非科舉之業不足以致身至於父母之所以敎子與子之所効於父母者終其身以名相籠而不既其實即至於自失而不悔余嘗以此戒二三子矣余往時以試事至都下與老母别三月老母念子往往成疾及失意而歸欣然秉燭相對恐其復去也嗟乎此亦為人父母之情矣然則太夫人之所期於叔達豈必如世所為高等秀才舉人進士者而後為樂哉吾以為自今以往之年有可以奉太夫人之歡者則叔達之所圖也盖余又嘗與二三子約矣天下事尚可為倘一發不售則盡徙其故業為農為商視其力之所至以奉老母為通邑大都高山深谷惟其鄉里族人之所不到而休焉使囊有錢廩有粟尊有酒几有肉陸有車馬水有舟舩奔走有僕妾如是終其身毁我譽我之言不入於吾耳得意失意之狀不交於吾目可喜可厭可疑可畏可悲可憤之事不亂於吾心當是之時太夫人樂乎請無言其逺者先是叔達以失偶為太夫人憂今復有其室家矣先太夫人生辰三日為叔達合􅈟之夕夫叔達且得與新婦捧觴太夫人之喜可知也麗麓汪翁偕金孺人六十雙夀序麗麓翁之商南翔也三十年於兹矣余從二十年前則巳識翁盖翁之寓舍與余比鄰而翁子伯昭隨翁讀書里中翁率伯昭拜先子因交於余兄弟當是時伯昭與其師祁門張子覺之偕張子能為新建之學伯昭暨其叔爾思弟仲升從祖元度皆師張子翩翩皆總角少年授經之餘歌詩習禮有儒者風余見而愛之時過從伯昭館中與張子談風清月白更長燭明麗麓翁輒為余設酒留連極歡而罷翁長大拳勇衷懐坦洞重然諾樂緩急人居市廛而不屑屑争什一之利以是貲漸落伯昭以文干有司輒不售去遊成均仲升棄書學賈亦往往多折閱翁遂與二弟廢箸居而向所張質庫里中者竟廢而業鹺又數年鹺之息微而翁累漸重益不支且棄南翔而歸盖二十年間升沉聚散予所目覩於翁者若此翁之行二三兄弟方謀所以祖翁者而是嵗十月翁與孺人偕老先後稱六十初度矣二三兄弟曰是又不可無一言以為翁及孺人夀當以屬李子李子曰夫余所為目覩翁之升沉聚散於二十年間者也余且以祖翁者而夀翁夫祖以言别夀以志祝别之㫖辛而祝之詞侈今且敘今昔感慨之情於稱觴舞綵之側其謂何哉雖然無傷也人世之升沉聚散憂喜悲樂此必不能相無者也達生者亦恃其中之不有而已矣吾固知翁之曠達視之猶一吷也如是即稱之何傷憶比嵗余還豐溪禮白岳訪翁於石砘之里為淹留彌月朝夕供具皆出金孺人手久而靡倦真有陶母之風而翁之族長老子弟在石砘者余皆習之每歎桑梓之間俗侈而浮與前輩所稱說不同似不可一朝居而獨石砘敦朴退讓猶有古風余盖低囘不能去云翁故善酒御杯引滿輒造酣暢家雖中落尚有負郭數十畝種秫釀泉可以一醉石砘當休歙之交土厚水清山夷野曠古城落石之勝皆在數里内可居可遊聚族而居嵗時伏臘子孫遶膝歡笑滿堂可以相樂伯昭之為人也澹而通坦而宻其孝友婣睦常拮据以佐翁之所不及翁可以無後慮余與伯昭交二十年驩如一日每見伯昭如對道民釋子不覺俗念都盡伯昭雖不遇乎使天果老其才而大發之其用於世必有不同者翁尚壯强可以待由此觀之目前之升沉聚散又何足以當翁之一吷哉翁行矣楓丹菊黄巵酒盈綠是翁與孺人燕喜之日也余雖不得從伯昭兄弟後登堂稱延年之觴然新安山水夢想見之他年尚欲以青鞋布襪隨翁杖屨於天都黄海之間尋軒轅廣成之蹤談逍遥無為之業人世修短苦樂真不足復計也於是二三兄弟觴而祖翁翁為滿釂而别而余序其言以為夀程翁震泉賢配朱孺人七十夀序新安予故土也予族黨散處休歙間而槐塘之李則與程竝著余往時過槐塘與諸程往還習知其俗其男子皆閉户讀書或經營四方女子勤績絍女紅里巷寂然無復膏飾而行於道者盖風俗之厚如此余每為故舊道之輒歎息不置槐塘之程在海陽者有震泉翁偕其配朱孺人竝享高夀稱古稀矣震泉商於疁又與予居止相近因得識其嗣冲虗甫冲虗恂恂退讓被服儒者余見而歎曰嘻此槐塘士人之風也巳又得朱孺人之生平於冲虗甫及孺人之倩吳君存禮稱孺人之賢孝於尊章順於夫子和恊於上下有雞鳴之勤樛木之仁小星之惠鳲鳩之平有椎髻之樸舉案之恭與夫丸熊之慈斷織之明截髪剉薦之慷慨則余又作而歎曰嘻此槐塘女士之風也余嘗觀於天人感應之際盖有渺茫而不可為據者然而君子則道其常焉耳彼夫勤生而侈匱惠吉而逆㓙仁夀而暴夭豈非理之斷然而不爽者哉今以孺人之夀考樂康合之孺人之生平孝敬儉勤而因以睹於天人之故其可以為世勸也已余所稱槐塘之程自宋迄今數百年繁衍貴盛蟬聯不絶豈非其俗之敦素節讓有以持之也乎今歙之鄉有男侈女遊動以豪貴綺靡相高不旋踵而覆敗在目前者合而觀之其可以為世戒也巳若是則孺人之得天而獲福也有不止於是者其又奚疑焉余既不文而又不能飾世俗之辭以為孺人夀唯是孺人之子若壻之意不可以已也請為歌以侑孺人延年之一觴歌曰陽月兮小春設帨兮兹辰月初生兮令方新菊黄花兮楓丹林解茰囊兮開酒尊招近屬兮呼比鄰清醑進兮雜俎陳祝阿母兮且加餐飲此醑兮無後艱顔欲酡兮日將曛今不樂兮復何言又歌曰古城嵯峨兮落石峥嶸岡巒常峙兮溪水常清阿母延年兮眉夀無傾鼓瑶瑟兮吹玉笙躋高堂兮稱兕觥舞婆娑兮綵服輕又歌曰齊雲之谿兮蒲可以俎松蘿之陽兮荈可以漿采九節兮烹旗槍益視聴兮和温涼阿母服之夀且康陋還丹兮笑休糧仲嫂沈夫人夀序是嵗二月二十九日為仲嫂沈夫人六十初度先是里人士列上夫人之節行請於縣大夫將聞之監司直指以奏之於朝縣大夫旌其廬曰貞夀四方之交於從子冝之者咸奮其詞藻揄揚聖善以佐夫人延年之觴於是某色然以喜已而􅋏然以思愀然而語冝之曰汝知而母夫人之得有今日乎當中秘之圽於官夫人抱四嵗孤扶櫬數千里而歸拊心搥膺呼天泣血欲絶者屢矣豈自意有今日乎夫人自稱未亾人以來含蘗茹荼三十餘年内撫藐孤外持門户皇皇拮据匪朝伊夕又豈易有今日乎汝終鮮兄弟夫人之命懸於一綫三十年中所謂顧汝復汝敎誨汝以玉汝於成微夫人得有今日乎夫人歸中秘時適先君家中落食貧者數年中秘驟貴而夭一時公私所費皆取諸債家不能盡償徵索者時時及門夫人與余兄弟廢箸居所分甌脫數十畝而已然廿年以來使汝不知有饑寒之憂至於娶婦嫁女奉師傅供賓客施於宗黨不敢告匱微夫人得有今日乎夫人與吾母陳太夫人竝出於崑家世親厚其事太夫人不啻所生而夫人至余家余方髫齡視夫人猶母也今日知年愛日之誠固當不後於汝又嘗奉中秘之遺言思一自奮於時以補中秘未竟之業既老而惰甘於無聞以没身而汝自少能讀父書推排人間二十許年冉冉踰壯尚不能博一第以慰藉夫人夫人少而操作以佐中秘肆力於文史竟不沾一命之榮其氷蘗之操旦晩當聞之於朝褒崇顯融顧余汝皆賤不能朝疏夕下猶將有待此余所以捧延年之觴而色然以喜復愀然以思也雖然余所以觴夫人則更有說於此莊生逍遥齊物之㫖大都不以有待者攖其無待夫冨貴福澤懸之於天此有待者也名節道義修之於人此無待者也立其人而置其天在豪傑之士猶或難之況於為女子從人者乎今夫人相夫而貴不以夫顯訓子而才不以子顯貞操苦節卓然自樹於宇宙之間此豈猶有所待者耶竊以為自今日以前其無待者夫人業有立矣自今日以往其有待者則後人之責也夫人曷與焉余鈍惰不才復以病屢罷公車有勸駕者輒援先中秘以自解以謂功名富貴如石火電光不堪把玩不若樗散之得逃斧斤而終天年夫人聞而韙之其智識明達如此吾知其不戚戚於有待也決矣夫人比長齋學佛將從太夫人於燈龕之下晨鐘夜梵共話無生則夫灋喜禪悅其樂無量又有出於逍遥齊物之外者矣敢以此為夫人夀徐思曠制義序丙午之秋始識思曠於白門去年在鹿城過思曠寓舍談良久頗洽知思曠非常人也往時見思曠之文輒心許之願與思曠交者十年于兹矣予於舉業之文無所喜而獨喜思曠有以知思曠之為此盖三變焉其始蕭條高寄有冷泉幽石之思既而為演漾緜邈則江海之觀而大林邱山之勝也稍縱矣已乃斂而為精微姸妙物色生態經營委至如縮萬里於盈尺而搆變化於毫端其巧極而工錯者乎才如思曠固有天縱顧十年揣摩以至於此思曠之心亦苦矣然吾聞思曠以此干世人或和或咻何也豈思曠之為此與吾所以知思曠者皆謬耶夫世所為富貴人之文吾與思曠亦略見之矣今思曠之文太工毋乃其實有致窮之具乎予嘗語吾黨兄弟曰吾之所好者未必世之所知也而世之所知者又非吾之所好吾將奚從如不可求從吾所好而已願思曠無惑焉適在山中花事爛漫彌望如雪從元晦得思曠之文映花而讀之每盡一篇舉一大白輒呌絶不能巳又念思曠侘傺不適逢世欷􅒣欲泣也古人有言勝事空自知予今日之賞且不能使思曠知之思曠之於世復何尤乎走筆報元晦其為我告思曠以為何如也己酉花朝前二日書於西磧之六浮閣從子緇仲庚辛草序年來多病習懶舊業荒廢每見新貴人行巻甲乙紛紜目眯心眩幾不可了自歎於此道漸逺絶口不敢復談而猶子輩時時以此相商予無以益之而又不能强其所不知者則以所嘗聞先輩之論告之猶子冝之性頗慧獨能知其解其近所為文且漸抑其少年自喜之習而就於灋予亟稱之然文至於灋而難工也已有意於灋而不能工則反不若鹵莽無顧忌者得以才力自見於世是故利鈍分焉夫文至於灋而其中之甘苦疾徐言之甚微非知者不能言而非操之熟者不能至也予盖知之而不能至者惟其不能至而言之故其言亦有所不能盡吾懼兒輩之執吾言而不能通於言之所未盡則予言適足以誤之也於是刻其近草若干篇以就正於四方之高明者是兒四嵗失怙幸漸成立能讀父書每自媿頺惰不能為率恐以此負亾兄於地下倘其文可敎凡吾同志其無靳焉王長史云吾家門戶所謂素族自可隨流平進不須苟求方今少年標榜成習至飾羔雁自媒干進災木不已固不願兒輩效此也辛亥冬日鄒方回清暉閣草序余往來西湖者數年得同調之友六七人鄒方回其一也方回為人文弱可愛坦衷直腸而遇事慨慷樂緩急人殆世之有心者焉客嵗孟陽館余於小築子將方回讀書澄懐閣輒移榻就余清暉閣商略藝文旁及歌咏書畫朝暾夕嵐山水氣變輒命觴相對酣暢而後罷有時載花月港拜石紫陽采蓴湖心結荷池上未嘗不與方回共之余性不喜舉業之文而時時代以書畫方回喜詩畫顧獨時時以舉業之文代之方回之文霞舉玉暎望之飄然瑩然每一萟成示余讀未竟輒呌絶不能巳如見陶韋詩米家山水余雖不喜舉業而不能不喜方回之文如方回不作詩畫而喜余詩畫盖兩人之所以自娛而相得者如此既别方回數月人事參商忽焉改嵗山中故人方責以愆紅葉之期而西溪梅信且復見報矣適方回近刻寄至展之什九皆清暉閣上所見也懐往道故不覺娓娓遂書貽方回綴之簡末使讀方回之文者知非獨其文而已也夫余之詩與余之畫皆在焉雖然此可使方回知之而已徐廷葵燕中草序余與廷葵稱同籍者十年虞山疁水相去二百里㑹晤頗疎丙辰之役同寓顯靈道院比隣往還無閒朝夕始習廷葵之人與其文廷葵外渾而中朗其文之清堅沉厚亦如其為人冬寒夜長時與廷葵擁罏篝火相對論文旁及身世之事刺刺不休或至申旦所居宫中有兩傑閣每雪後朝曦輒攜酒登眺攬西山之秀色及大内宫闕之壯麗偶有名酒必相呼對飲不醉無歸盖余得廷葵不覺身之在逺而廷葵亦謂比來幽憂之疾得余始為豁然遂能日進一斗斯言不虛也無何兩人俱被放廷葵先出都余棲遲邸中舊歡都盡每出見新貴人雜沓長安道中輒自念生平好尚迂濶於公車之業不肯細意入夢青山便當終以自保廷葵廿年苦心其人與文清堅沉厚皆合福徳相而作此寂寂人事無定豈復可論乎方今世人眼孔如豆附羶逐臭賢者不免友人方孟旋嘗與余相顧感憤今年孟旋既得雋且盡收氣類中下第者得數十人之文刻之都門而句曲張賓王每下第後輒定為元魁名家索新貴人文竿牘遍長安紙為增價兩人意致相反如此嗟乎余與廷葵之文欲以何向耶余不能定廷葵之文迴環再過但覺往時寒風宻雪擁罏高飲光景颯沓紙上是不可以無序遂序而歸之丙辰六月立秋日徐陵如制義序徐陵如海上異人也文章詞賦走馬擊劒無所不通居恒大言入金門上玉堂指揮貔貅建績疆場此鬚眉男子指顧間事安能作此寂寂然而骯􅗣不逢冉冉踰壯始得一薦又以常調見收陵如意弗屑也猶憶往嵗陵如訪余槎上支離顦顇不勝感憤欲棄家學道遊於方外余止之蕭寺久之氣平而去已試海上不利轉而試嘉定又為豪家所齮齕自暨陽失意歸余為置酒相對歎息意不自聊又欲棄書而學劒余慰之曰以子之才何憂不遇功名遲早得失㑹有命耳讀書談道君子亦盡其所可為者而已矣今子欲跳而之於世外則不能欲徙業而之他則安往而非命乎陵如頷之又三年而遊於庠五年而舉於京兆雖不能盡酬陵如之才然漸齒遇矣方今時事多艱乃國家需才之際此非伊吾向窻帖括干時者所能辦也陵如慷慨丈夫遇事感發鬚髯㦸張其志意不可一世又推排人間二十許年未嘗以困頓少自挫辱吾知其用世必有卓然自立而不妄從人者矣陵如之師徐元扈先生今之所謂經濟偉人也陵如學有本源而又其才氣足以配之久困積學足以鍊而老之吾是以慶陵如之遭而為之喜而不寐也若夫陵如之文余老且荒矣夫何足以定之甲子冬日題於檀園劒蛻齋沈雨若詩草序去年中秋待月於西湖因流連兩山間至紅葉落而還雨若後余至而先余去在湖上不數日又初病起扶杖䠥􅍷而行然兩高三竺諸名勝無幽不探無奇不咏日得詩數十篇余遊跡所至不能道一字僅題畫走筆數篇而已見雨若之詩畏其多而服其工不敢出而示之雨若乃欲余序其詩余又何敢哉猶憶與雨若看潮六和塔下酒後竝肩輿而行於虎跑山間相與論詩甚洽雨若似以余為知詩者雖然余不知詩而能知詩人之情夫詩人之情憂悲喜樂無異於俗而去俗甚逺何也俗人之於情固未有能及之者也雨若居然羸形兼有傲骨孤懐獨往耿耿向人常若不盡吾知雨若之於情深矣夫詩者無可奈何之物也長言之不足從而咏歌嗟歎之知其所之而不可既也故調御而出之而音節生焉若導之使言而實制之使不得盡言也非不欲盡不能盡也故曰無可奈何也然則人之於詩而必求其盡者亦非知詩者也余嘗愛昔人鍾情吾輩之語以為不及情之於忘情似之而非者也必極其情之所之窮而反焉而後可以至於忘則非不及情者能近之而唯鍾情者能近之也由此言之雨若其將有進於詩者乎請以此質之甲寅九日蔬齋詩序愚公蔬齋詩凡三刻矣余嘗為序其二集别二年而愚公之詩復滿篋中出以示予其格益工益能達其所欲言者余曰子之為此將以為名乎抑有不得已於是者乎杜子美云語不驚人死不休而白樂天詩成欲使老婢讀之皆能通其意兩人用心不同其於以求工一也然余嘗有疑焉以為詩之為道本於性情不得已而咏歌嗟歎以出之非以求喻於人也激而亢之而使人驚抑而平之而使人通豈復有性情乎曰非然也夫人之性情與人人之性情非有二也人人之所欲達而達之則必通人人之所欲達而不能達者而達之則必驚亦非有二也然則求工於詩者固求達其性情而已矣詩之傳也久而且多凡為詩者不求之性情而求諸紙上之詩掇拾餖飣而為之而詩之亡也久矣愚公有詩之性情者也生於山水之鄉有園廬僕妾舟車琴酒書畫玩好之具可以為樂而終日袖手而哦其樂之殆似有過於他好者此必以為性情之物不得已而出之而非徒求工以為名高者也其可以語於此乎愚公有所幸姬人好畫能詩愚公自序其集行之夫愚公又能以其所好者喻諸其人斯亦性情之效也已沈巨仲詩草序巨仲今字彥深今年夏與巨仲同舟至吳門往返者數日舟中無事朝夕相對當杯展巻各盡所懐盖與巨仲交十年來未嘗有此樂也㑹巨仲刻其懐閣詩草而屬余序之余見巨仲詩亦已十年于兹矣巨仲十年于詩何憂詩之不工哉雖然詩非能為工之為工也能為工而不必工之為工也今巨仲之詩具在令與世之詞人矜多而競靡佀未足也若夫興㑹所寄一往而深擊節扣舷摩挲自得則巨仲已有餘矣今天下人風雅而家騷壇吾不以巨仲易之也余往時情癡好為情語有無題詩數十篇嘗自命曰僕本恨人終為情死至取二語刻為印記佩之無何而自笑其癡今遂如昨夢不復省矣豈余之道力進耶亦世故耗之也巨仲浮沉十餘年風情不減讀其詩春風穆然使寒芽欲茁嗟乎何巨仲之多情也夫情者數變之物也巨仲之情十年而不變巨仲之天全矣余與巨仲交媿不能盡巨仲乃今始知之昔人有言以真率少許勝人多許巨仲之詩如其人哉如其人哉甲寅重九後二日謝明府入覲序天子皇極懋建元辰聿新太嵗行次於執徐寶厯初頒於太素迨夫開雲瑞節上日吉晨六服畢臻四海來假蘧車麕至互聴蒼璧之鳴除鄭履鸞鏘共矚香貂之拜衮曰惟課嵗詔彼稽功於是百里之侯九州之伯計㑹道里奔走京師水陸三千想燕吳之契濶寒暄九十閱往來於冬春次第選舟後先赴闕若夫教成而士習其化政善而民咏其休戶憶幃褰人思轎擁還切輿人之祝去邀才子之詩如明府謝父母者盖龔黄再蒞於東朝召杜復生於南國者矣明府徳精降祉河宿垂芒迹亞機雲文參屈宋攀安提萬家傳正始之音匹粲似雄學擅羲皇之譜是以鬱為時棟先此人英儗拖紫艾於天廷俄拂黄絁於海甸朗情微性仍兼治賦之才智刃神機豈擇撥煩之任明鏡弗疲於屢照惠風無憚於頻嘘手可移晴心能造福佩犢帶牛有禁桑枝麥穗成歌織罕嚬眉商無裹足臥惟單席膳減雙雞嘉績遂徹於皋扃睿奬欲通於巖夢更屬殷同之㑹因為報政之行然而士戀君師民依父母爭塗㤀逺同齎千里之糧瞻漢何高遥借二天之庇重以霜芬積嶺氷路在江野水隨㾗清音滿棹長謡極睇青緹偕紅蘂俱寒結鼻凝唇綠字與彩霞同散忍閣離前之筆空含别後之毫正雅等古舌無煙舊心有血質奇荃蕙文麗虹霓而明府䕃以白月之輝朂以丹霄之價是用封緘骨髓剪拭羽翰預思元度之清風競賦子荆之零雨某雕龍已倦藏豹非堅賤實無求貧唯可賀茹芝餐菊并不閑九穀之書履笋簪蒲幸不失四民之令䝉呼隠士甘作外臣庶幾冠冕巢由詎敢弟兄元愷廼從末客輒枉奇交穉榻獨懸栩牀每坐裁蟲書於約扇捐鶴奉於嬰居襲譽凝歡不止感一言之意氣連情奮藻每欲托千載之風期至於子媿琳琅姪慚蘭樹亦辱非倫之賞偏承似叔之褒恩等兼金報無累璧縱復濁醪蕐饌詎換離心大句狂言曷勝别緒且結楊溝之送如逢上洛之迎所悵者淮檣不留吳關漸邈囑雁倘緘北訊開魚莫寄南吁柳篋題箋未許彤騶之出禁松根署詔遥憐花綬之縈墀算月屢圓占星弗騐願以且千之頌聊紓借一之忱詩不宣衷敘以廣意云爾白嶽遊紀序友人徐聲逺詩云向平五嶽無一字其名亦自垂千秋予每讀而壯之舉以為遊者勸及遇山水佳處嗒然無言有知之而不能以告人者又自恨才不逮情則聊舉聲逺之言以自解乃今讀閑孟白嶽遊記而予殆有不能解者焉夫人之情與才固有兼之如閑孟者閑孟與余談不能勝予而予所不能言者閑孟之筆皆足以發之其才真有過我者矣往時與閑孟泊真州風濤際天噴薄萬里予低回留江口不去而閑孟顧欲入城一觀其土風民俗之盛盖閑孟之不能㤀情於世如此故其為紀遊之語不盡得之於山水而遇事輒發縱横古今其磈礧騷屑之意亦可以想見矣予嘗再遊武林無一語紀其勝白嶽吾故土先人墳墓在焉冉冉踰壯而不得一往閑孟乃能先之又其所著譔若此予甚妬且媿焉雖然吾聞黄山三十六峰挿青天而垂曠野其勝在白嶽之上閑孟遊齊雲而不能兼有黄山又至武林出没於靈隠天竺之間而不得一叅雲棲此皆閑孟未了公案閑孟倘有意乎予請執筆而從閑孟之後矣乙巳竹醉日閒家具序往時友谷老人駐錫槎上余屢得叅承辱師開示拳拳引為㤀言之契亾何師去而之泖上又去而之長水道風漸邈每用慨然壬子余北上師自長水操舟來送予提誨之言至今在耳今年春聞師示疾作書問訊方訂握手之期而師已化矣壬子一晤遂成永訣悲夫師化後數月其徒某某等及檀越麟水沈氏兩居士奉師遺骨塔於雲棲而以師生平所著述示予予得拜而讀之曰閒家具者師所自署也師於世間文字未嘗屑意乃衝口而出妙義熾然集中談禪談敎談淨土皆直下洞宗非世之影響勦說者其於詩歌偈頌本地風光逗漏不少至於警䇿開悟之語雜之從上祖師語錄中不復可辨此豈可以文字相求之而顧以為閒家具也哉師意度宏逺居恒韜晦外若悶然泛然而扣之小大立應此亦其一斑已余與師周旋三載茫無所得如遊江海莫測其淺深夫紙上之言又惡足以盡師所謂與其人俱往矣悲夫此師之所自署曰閒家具也夫侯氏世略序家譜之立盖以敎厚也遡其所生之自雖千百世而上杳渺惚恍而水源木本了然可知下而至於疏屬子姓親盡服絶而要之於所生則皆為一體如是即欲不厚不可得也譜之壊起於俗之貴貴而尚文夫欲顯其宗以有聞於世此亦仁人孝子之用心也而其流乃至於借蕐胄以為重又重而文之以矯誣世之耳目而宗法亂矣今之為譜者盖曰不貴不必譜也不文不能譜也傳者不必信而信者不必傳不知其文之而適以壊之也故譜者一家之書而非行世之書也世其職者取其足以記姓氏行第而已焉用文之吾讀侯氏世略而因之有感也吾邑僻在海濱其土瘠頑無山林陂澤之勝其人往往椎魯少文以務本力穡世其家其為士者讀書好古不嫺於干世之學以故科第之目獨遜於他邑以我所見仕宦而至三世者鮮矣夫固其風氣之薄而富貴者所為大都能舉其先世之澤而斵而䘮之以此望久長得乎侯氏之先有隨南渡至疁者目擊風俗漸偷戒其子孫力耕勿仕其高節逺識固卓然為古人之所難而要其所以貽之子孫者亦已厚矣今其耳孫之為此譜也以為富貴不足恃而欲託之於文以傳亦猶其祖之遺意乎雖然知輕富貴矣而不能無意於文夫文者名實之間不可以不慎者也侯氏之先世高節逺識至今令人追而慕之此其人豈無文采足以表見於後世而併其姓名不傳此非譜之失也有譜之而不得者也身與名俱隠矣而焉用文之也哉夫當時之榮與没世之稱其得失固未易較也是以達者兩去之吾觀於侯氏家世自農而賈自賈而儒固將大顯其宗舉其先世所醖釀者而發之不獨文之而已也所謂富貴者殆將逼焉則其子孫何以處之亦無失其厚者而已矣檀園集巻七
