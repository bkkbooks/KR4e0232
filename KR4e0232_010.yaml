body:
  text: 檀園集卷十明李流芳撰祭文凡十一首祭鄭彥逺文嗚呼彥遠竟至是耶彥逺與吾相從隔嵗耳而奄忽之間遂成千古耶自彥逺學於吾不三月而病病不數月而竟以不起今距彥逺之殁又已踰月矣何人世之促也嗚呼痛哉西隱竺林之間松風槐雨夜鐘晨唄與彥逺悠然相對如昨日也而今可得乎始吾未識彥逺而已與仲子間孟相習猶憶往嵗過仲子宿留五鼓酒醒聞書聲琅然訝而問之知為彥逺而仲子為余言彥逺讀書達旦以為常逮彥逺從吾遊已不勝羸矣豫每謂仲子勸彥逺讀書無過苦也而察彥逺之用心固有獨異於人者自共事三月以來而彥逺之為文逸才俊筆蓋無日不新吾方期以大就而詎至是耶悲夫彥逺孝友溫良出於天性而聞善孳孳常若不及其家之上下及與彥逺相識者無不稱為善人彥逺之歿而知與不知皆為嘆息蓋庶幾無間言者焉夫彥逺即不幸早夭乎亦何負於俯仰哉然而彥逺方少年信道而未篤其於情愛之際固有未能釋然者夫生死人所不免也而又不能相代為彥逺之父兄妻子者計無復之則其痛亦可以少衰矣噫吾惡知夫彥逺之不痛而無復之也吾年未三十而人世死生之感嘗之殆盡十年之間哭吾兄哭吾妹哭我良友又哭我父當其哀之所至且蘄死而不得不自意其復悍然以生悲夫吾惡知彥逺之蘄生不如吾之蘄死乎疇昔之夜夢彥逺與吾促膝而語顔甚澤而多笑似甚樂者而忘其死也噫吾惡知彥逺之不樂而忘其死乎吾賦性迂拙疏而多誤無能為人師而仲子過信豫強以彥逺相託彥逺又過信豫而事之如其師吾是以不獨悲彥逺又自愧也吾於西方之學不能行而稍知其大意每欲以此進彥逺而相與之日淺又不意奄忽至此不得盡吐其中之所懷而今已矣彥逺易簀前一日豫為書慰問還報無恙翌日而訃至欲一執手永訣而不可得噫吾悲已無益而愧又無能及矣而徒以其無聊之辭解彥逺與其父兄妻子之痛噫吾惡知彥逺之不復過信豫也祭張素君文嗚呼素君之殁空堂素幃十年於兹而今始得歸窀穸嗚呼素君何待耶素君不能待其遺孤之成立男不及婚女不及字而區區待其嫂與同穴煢然二稚誰忍復奪其恃嗚呼痛哉天乎抑素君亦有意乎否也自吾失素君以來風流日逺奇情勝境不得與素君共其賞清言妙義不得與素君共其玄人情世路﨑嶇犖確可悲可憤可歌可泣千容萬熊不得與素君共其感慨嗚呼素君何往乎猶憶與素君讀書山寺寒夜擁爐相對高詠劉玄德語曰日月如梭老將至矣功業不遂遂相顧欷􅒣袁九齡聞而訶之曰二君方年少何得便爾無何素君死素君死又十年而吾頭顱如故中間哀樂之所纒疾病之所摧疲形耗神舉向日飛揚踔厲之氣忽已化為寒氷死灰蓋吾真老矣嗚呼素君死者無可奈何後死者若此其相負何如也自素君殁後數見於夢相與談笑如平生又知素君鬼也往往談死後事而今已矣不復夢矣素君之神其舍我而去耶抑吾其衰也素君殁後相與自文饒弱生輩而外吾又得境內外之友數人又得同里閈之友曰潘子吳子汪子而吾素君獨何往乎嗚呼素君已矣百嵗之後歸於其居素君與嫂同穴之願畢矣吾鈍惰不才不能撫素君之家使嫂朝夕鬱紆以死男不及婚女不及字今葬素君者素君之父母也嗚呼痛哉吾負吾友夫復何言祭張君貺文不肖兄弟從髫齓時識君貺君貺蓋與先君遊豫覩君貺少年翩翩容止甚都又工為文翕然有聲於時先君數稱之為不肖等勸不肖等望而儀之以為軼才俊人唯恐其不得當也又數年而不肖等始得以藝文之役進而交於君貺時家茂材已成進士早去世而君貺猶浮沈諸生間每見數相咨歎自是交日益親相過從日益密朝花之春夕月之秋清言斗酒瓶罄未已繼以燭盡當是時不得君貺無以為樂君貺乃更折行輩稱兄弟相約為婚姻而執子弟之禮於先君蓋張李之交四世於兹未有如君貺於不肖兄弟之厚也而君貺今死矣嗚呼哀哉君貺少年負才名意不可一世謂當旦夕脫穎而老於青襟七上京兆而不得一遇故以秀才高等廪學宫者二十年行貢之天子升於國學而不能待以死噫何厄也士生而不見用於時則退而休於野以求其所以樂生而盡年君貺有田有廬有子岐嶷而慧其可以樂生者甚具每憶君貺郊居風物愛其緑疇當戶修竹映檻或新􅀈正冽舉網得鮮抱兒膝上稱詩説史客至咍然相對忘返君貺即不遇可以樂死而不得盡年以死死又以惡疾悲夫孔子所謂斯人之亡不得已而歸之於命者豈不然哉豈不然哉雖然君貺數年以來相纒於病苦之中痛癢迫於肌膚而寒熱并於方寸其於人世已無聊生矣而察其骯􅗣之意不衰吾固知君貺於去來之際有灑然者也嗚呼君貺平日談傾四座飲敵數人見事風生捉筆雲湧今安在哉將亦與君貺俱往耶吾不能為怛化而悲吾之無與樂此生也哀哉尚饗祭徐孺榖文人命朝露昔人所歎傷哉孺榖奄忽歸幻冬中授手言笑晏晏春歸哭君空堂不見真耶夢耶魂搖目眩況我及君情好如貫嵗在攝提於君斯館出同舟航入共筆研月涼之夕花眀之旦星沉漏盡酒闌客倦留髠密坐觴酌雜亂有懷如山有舌如漢或歌或泣我後子先時惟鄭生實同婉孌頺然相對氣何傲岸陋彼世氛神王弗善衆目攝之胥讒睊睊我思古人胡惡鄉原悠悠之口匪戒伊勸子安豫言亦不謂謾豫嘗語子百年強半富貴何期日月不延縱心而行無干世患嗟哉孺榖竟夭天年天乎人乎胡遽而然自我去子中常縣縣晤言不勤或繼以箋察子之情若哽若咽豫竊怪子其神不全世短意多殆不免焉嗟哉孺榖豈忘斯言命實為之我以誰寃所可歎悼交情中斷俯仰十年風流雲散蹇豫闊疏于世多憚觴咏之會賴子一粲豈無他人非子不慣嗚呼哀哉彈山之麓朝煙夕嵐偕子翺翔玄賞是耽時與興會遇酒輒酣張子和之相顧而三嵗月幾何死亡相兼人生忽忽誰其獨淹於呼哀哉富不如貧貴不如賤死何如生子今亦驗生既不樂死復何戀生平之歡將子無逺盡此一觴泉壤永判哀哉尚饗祭鄭母吳須兩孺人文嗚呼某之獲交於間孟二十年矣凡世人之所謂相親厚者吾兩人無不有而其所相期更有出於親厚之外非世人之所得而知也彥逺嘗師事某不幸而夭彥逸之視某也復在師友之間兩家兄弟嵗時過從歡然如一家憂悲愈喜無不共之間孟之違養吳夫人也甚早然其兄弟相攜數十年怡怡于于未嘗見有失恃之色吾嘗歎息以為間孟兄弟之能事須夫人也不獨彰後母之賢而益以慰吳太夫人於地下所以相成者蓋甚逺焉吳太夫人之殁已二十餘年而未葬間孟蓋將有所待以大顯榮其親顧以間孟之才尚浮沉未與時會逮須夫人殁而間孟之心愈痛曰吾且不能待矣悲夫間孟固灑落丈夫其於義命之際有確然不可奪者乃往與間孟共事每見其於摧頺失意之頃輒惘惘不自持或廢書而起中夜而歎察間孟之用心豈猶夫世之情炎鬬進者而已哉其有隱痛而不能自己也昔人有言孝子之心有待五鼎駟馬而不至者悲夫間孟之不能釋然固也若是則兩夫人將亦有不能釋然於冥冥之中者乎夫君子之事其親也修其身明其道盡其所可為者以無忝所生爾矣其所不可知者天也今吾與間孟所為相勉勵者亦盡其所可為以期不負太夫人之教而不敢為世俗之孝而已也其可乎始與間孟交方少年相矜意氣跅弛自喜十年以來相與發愆懴過以求斂其虗氣而之於道者靡敢不盡也頃且與間孟參雲棲受五戒將圖如釋氏之所為大報恩者焉夫名聞利養凡可以致之於親者固亦孝子之心而恐非冥𡨕之所期也間孟之報太夫人者或不出於此吾知太夫人之靈從此其可以大慰矣尚饗祭聞子與文萬厯四十六年嵗次戊午後四月十有五日癸酉歸西道人聞子與示寂於家越三月而其家以俗禮葬之雲棲之陽是為七月日其同參友人東吳李某為文以誄之曰嗚呼維我先師闡揚淨土攝此羣根如盲能覩衆生根劣耽逐諸苦掘井止渴終亦無補維子挺異夙植勝因篤生仁里與善識親早聞此事解行日新厭苦趨樂適反其真死生大矣擾擾萬端四大解散八苦交攢誰能似子泰然輕安端坐合掌去如脫丸子生卅年病居強半早嵗喪偶遂絶婚宦天實為之使解其絆棲遲俗中非子本願子有至性依依二人偕其弟昆于焉昏晨身雖在家以道相熏繩牀經卷翛然出塵嘗發宏誓屢求剃除往嵗之春剪髮而徂二人持之復反其廬見我不懌語多歎吁沉痾纒綿遂以不起子語賢兄吾命實爾每念出家或作或止病亦因之應念而徙示寂之前自知時至乃諗賢兄復申此誓延師祝髮就榻受具嗚呼壯哉人固有志覩子之貌衣若不勝當其敢決如劒發鉶一往不回物莫之攖道法是肩軀命可輕嗚呼惜哉摧此干城子之賦情遇物而深景風浩浩慮子不禁卒有資糧此欣厭心豈如世人若浮若沈方子病棘再眩而蘇末路難持恐子或渝七日之功羣魔克俘巍巍堂堂示我坦途吉夢先兆異香騰閭靈瑞熾然見聞則符子守本參無二無虞瞪目向西豈有見乎嗟余與子相知十年我往子來子憶吾憐南山之下水月林煙與子朝夕邈不可攀卯辰之嵗兩度就子扶疾送豫再至棲水落日蒼黃風雨不已子唱我酬今遂已矣嗚呼有生誰獨無情有情無生我夢子醒去年别子我涕欲零期我重來春暖花明我行後期子已遐征嗚呼歸西遲我不能子遺我書嵗久成帙我開篋笥見子手澤警䇿之語刺我胸臆比嵗以來龍蛇交厄淵匠傾逝高賢遁迹子復棄我失此三益匪我悼子自詒伊戚子如良馬見影疾馳哀此蹇駑鞭䇿為疲子如冥鴻戾天髙飛笑彼蚩蚩藪澤是窺雲棲之陽山林鬱蒼子有遺言奉子歸藏先師在焉鼓鐘喤喤安子之蛻亦子樂邦我陳生平送子攸行哀不及文以銘不忘祭孫翁文嗚呼維翁子季友而倩伯昭是兩君者蓋能以道義相砥去世俗之浮華而相安於淡泊之遭其交於吾輩匪夕伊朝俯仰三十年心期黯黯雖間阻而非遙其相與于無與而相為于無為淡焉如酌水而薰焉如飲醪殆非世之以酒肉招邀者也庶無愧于古人之久要余嘗適翁之里一再侍翁見其貌癯而骨堅意簡而神遼翛然如古松之臨澗壑野鶴之在雲霄意其可以長生度世碧落逍遙胡未躋乎上壽而遽有道山之遨嗚呼余少聞父老之言每歎桑梓之厚而厭吳俗之澆蹉跎暮年始得一歸掃先人之丘壠尋豐溪之舊郊因以攬其山川風俗而接里中之所謂賢豪雕盤饌玉鼓鐘伐鼛士嬉女遊貧諂富驕訝所聞之不然何斯世之滔滔比遊於翁子壻之間如登赫胥之廬而攀葛天之巢殘書半牀濁醑一瓢采瓠葉而為羮然松枝以代膏值九秋之蕭森騁四望於林皋低回留之其樂陶陶此余所以感舊里之繁華而想風味於貧交也眷焉仁里老成云雕漸典刑之悠邈傷古道之寥寥跽陳詞以逺將寄薄奠於溪毛庶九泉之來歆慰千里之牢騷尚饗祭鄭間孟文嗚呼間孟隔日之别遂成千秋疾候至此知其彌留我惑醫言猶冀子瘳是日過子暑退火流庶與病宜謂子無憂視子目睛神眀尚遒翌日而逝曽不我謀於乎哀哉此何時乎不及送子賴子勝因爰值開士為子津梁無迷所指生平之誼豫則愧矣方子病困慮有今日數為子言時勿可失去子房幃托處蕭寂言偕淨侣與子朝夕見子躊躇不忍子逆奄忽至此悔豫不力嗚呼哀哉自我交子垂三十年哀樂所同俯仰厯然耿耿于懷有辭莫宣丁酉之役偕子白門高談邸中聽者舌捫輕舟橫江風浪拍天子嘯吾歌失其煩寃嵗在壬寅西隱之偏與子讀書感彼二賢心迹偶符遂諧姻連我客孺榖惟子數來客既耽酒主復善詼每飲必歡倒載而回時或逃暑午飲喧豗棄瓿於庭訝何絫絫一日秋爽偶來三子時惟孟長然眀淑士孟長酒徒豪者所舉子欲壓之代巵以簋一吸五器孟懾而徙孺榖云亡興會蕭索年運以往忽忽不樂子於杯中猶深寄托側辨婆娑似已非昨豫每戒子麴糵為害子醉而罵或醒而悔我或觴子必為夙戒候子酣適索酒勿對子知豫衷往往自廢嗟乎間孟竟以此敗嬰疾以來遇酒如憝昔之所欣今復何在哀哉哀哉三載之前豫偕孟陽坐子書閣開尊相羊睹子忽忽驚其不祥憂能傷人將子無忘逺道之客念之倣徨豈謂此别死生參商於乎哀哉我之生平以友為命恃子以生奪子何橫西城之隅已無子居槎水之舠已無子遨我有竒文待子而賞子今何往我有旨酒待子而開子今不來子遺我書嵗久盈箱遊戲謔浪皆成文章我欲理之兩泪其滂我嘗客燕子遺我詩凌韓軼蘇離衆出竒我欲展之淚已承眵子之制義神鬼蛟螭病手一編屬我品題我欲序之今以示誰昔之歡資今為愁具昔以解頥今為引涕嗚呼哀哉西隱之盟兒女甫孩漸看成人抱子於懷呼我為翁與子俱衰死固常爾何足怪哉未能忘情聊以告哀子之瀕行用意灑然言不及私叩我以禪我書數行屬子賢季子讀欣然了佛大意中有偈言持之弗替竟以此殉袖之而去凡今之人諂曲嫉妬是非人我鬬諍堅固子之坦易與物無忤剛腸疾惡一往成故見人一長忘其所挾急人之難不愛膚髮人留其餘為家與身子惟不留至死而貧嗟如此人復有何業三塗八難豈為子設子之神明定復何蹈在天在人宜以見告生平之知無俾眊眊於乎哀哉尚饗祭沈無回文嗚呼無回詎至是耶兄文章可以名世學術可以經世風節可以持世胸懷氣量可以容蓋一世頎然玉立軒然霞舉望而知為福德壽考之相乃一第不酬其才一官未究其用而奄忽至是耶吾兩人之交自庚戌傾蓋燕中中間吳越相望聚散不常良晤之期草年有幾而今遂成隔世耶猶憶受之之言曰近識沈無回酒杯流行意態俯仰絶似長蘅比索無回於邸中相視而笑求其相似者而不得也而今遂使我為中郎虎賁不逾痛耶吾兩人相聚每以忽忽不盡意為歎公車之賦屢約同之壬子兄以內艱罷乙卯弟以附舟先發未戌弟皆以病歸夙昔之約未及一踐而今遂無合併之日矣可不痛耶丙辰被放同羇留寓舍東西相去十餘里隔日必一相聞三日必一相見弟先出都門就兄言别篝燈置酒執手汍瀾别之難如此而今竟成永訣耶兄官黃巖三年己未之冬兄以假歸而弟適至西湖始得一握手是夜月明同飲於湧金舟中酒闌慷慨察兄之意有甚不能釋然者竊怪其不達夫世之所為巍科膴仕者其人已略見之矣而區區欲與噲等為伍乎嗟乎無回吾知兄蓋欲有所用于世而非苟然者也兄性狷潔居恆不妄名一錢而胸懷廓落或不恤傾筐倒庋以緩急人今至以貧仕為祿養非兄意也然則兄之不釋然於中者非一日矣而竟以此天其天年耶弟迂疏懶拙於兄不能為役而兄中心好之又嘗愛弟之畫而弟泛然酬應不能悉其能事以事兄兄晚而遊戲此道每祕惜不肯示人偶一見之氣韻妍妙遂入唐宋諸人之室輒爽然自失欲為輟筆而今已矣不及見兄之所止矣嗚呼兄即不得大用於世而小草一出他日宦成優遊林下弟亦將買山卜鄰相攜終老子圖我書子歌我和以酬宿昔之諾豈不樂乎而兄竟舍我而逝弟將誰與為質耶嗚呼無回以兄之眀達其於死生之際超然不惑無待言矣生而為世聞人沒而祝于鄉先生之列亦可以愧夫泯泯以生沒沒以死者矣況兩賢嗣翩翩競爽將繼兄之業而代兄色養之所不逮兄其可以瞑耶雖然亦可悲也巳言敘生平以佐一觴填胸塞膺不知所次無回無回其知之耶尚饗祭張子薪文天啓四年甲子二月日張子子薪卒於家友人某時客武林淹留至八月而歸始得臨其喪以蔬果致奠而為文以哭之曰里閈之友昔惟三人最後得子久而益親汪子邑居吳耕逺郊潘為經師雖邇而遙惟子相求無間時日一日不見忽忽若失一味之甘一花之開飛書相報我往子來子病郊居不能逺涉我數就子時勤舟楫屯橋之畔村童里媪指豫而言知與子好嗚呼哀哉自失間孟望城悲噎子之􅉨矣屯橋路絶嗚呼哀哉我遊西湖子來别余見子健噉尚謂無虞豈知生平盡此須臾子病數年屢仆而起恃子善病病不能死於戲痛哉今真死矣别子閲月子遺我書期我來歸竟不能須知有此事我必不出子行我送非我誰責呼天撫膺吁嗟何及哀哉哀哉凡今之人噂沓反側子之直腸如矢注的一言非義頭面發赤凡今之人隕穫充詘子之介性百錬剛鐵簞瓢屢空嗟來弗屑嗟乎子薪子真道器尚有餘習未能度世遊玩之物高眀所寄子往而深賢於勢利天假之年觀其所際於乎哀哉凡今之人求多於天富貴壽考子孫衍蕃諸福之中子無一焉人為子悲我則不然貧士之常況子能守金髙於山營營可醜子屋三間為園數畝千花對榻一編在手貧者樂乎富貴何有人我之場健者爭先因病得間乃近於禪藥爐經卷晏坐翛然病之於子良藥福田我躬不閲遑計後世千年之謀達者所棄子之無營以子無纍去來自如夭壽何二知子曠懷數年於道此言粳粃子能自了我嘗語子子神太清舉世混濁擾擾以生厭而薄之殆將與攖嗟乎子薪匪命之窮世濁子清誰能子容楞嚴了義白蓋真言一詞半句可以通玄子能讀之掩卷瀾翻持以正宗凌雲粲然嗟乎子薪生死藝藝如子之死千萬一人我猶悍然視息人間眼中無子誰樂餘年我留西湖滔滔不歸豈不思家哭子後時巷無居人鄉夢已非西湖之上水月林煙念子嘗遊寓目無歡百頃風荷千章巖桂念子癖花看花欲淚子癖我畫如子癖花我腕欲脫子壑無涯長箋大軸釘壁攤几每一咨嗟子病若洗嗟乎子薪我手尚在援毫自廢賞音不再從子書來道子所藏隨子而盡飛去何鄉豫畫無靈人琴併亡於乎哀哉我雖好廣中實狷狹喙長三尺非子莫發子不苟同實我畏友今我失子孰攻其咎我於名場每懷退志子之所知我已早計桃花流水一往千春子今舍我誰與卜鄰於乎哀哉天不憖遺奪我鄭子又失子薪誰能戀此逝將去之適彼樂郊麋鹿魚蝦我將與交凡今之人不可以明惟子知我敢告幽冥嗚呼哀哉祭朱元伯文丙午之役吾邑同薦者三人公顯與余同甲子而元伯少於余四嵗當是時元伯方少年翩翩自喜而公顯則魁岸頎碩偉然丈夫獨余長齋枯寂尫然如病僧自顧福德不逮兩君時時欲引分而止無何公顯成進士不數年而死元伯連舉不第乞恩就教職者五六年方擢為國子學録不及之官而病遂以不起兩君者皆不滿五十位既不顯而復促其年悲哉余雖頽惰自廢于世無所短長然視息人間業已浮兩君之算始望殆不及此而數年以來既哭公顯又哭吾元伯三人之中煢然獨存感念疇昔復有何樂今年春元伯將之宮廷和以使事適越余偕無際觴而餞之越月而廷和訃至又越月而元伯病歸一席之間奄喪二賢自元伯廷和而外又喪吾起東半嵗之間而吾邑亡三鄉先生又皆余所親厚昌黎有言人欲久不死而觀居此世者何也悲哉元伯為人孝友兹讓坦衷直腸居恆閉户蕭然不干外事其掌教宿遷也勤於其職撫其諸生如親子弟有事則委曲覆護之郡大夫高元伯之行總淮人士而屬之課督一時靡然向風元伯之歸淮人士相率為歌詩文詞以頌之攜榼而餞者填於路操舟而送者塞於河夫元伯雖局促冷氊無所建豎而其自處不苟且翕然孚於上下者若此使顯而用之將必有可觀者而竟止於是悲哉人生修短升沈達者等之夢幻元伯體素高亮俯仰無怍去來翛然當復何憾吾所不能釋然者與元伯生同時居同里薦同籍而生平識面始於丙午過從謔浪多在長安其餘州里之會經嵗不繼逺宦以來書問寥濶又嘗期過郊居數年不遂竟不得以杯酒流連信宿談笑吾所欲進之於元伯者尚懷而未吐也而元伯已逝矣悲哉授手無及一觴徒盈鑒此情言為我舉之尚饗檀園集卷十
