body:
  text: 檀園集卷九明李流芳撰行狀凡一首許母陸孺人行狀中書君許元祐之葬其母陸孺人也病不勝喪且懼一旦溘然不克身襄大事力疾營窀穸四方之㑹葬者麇至中書君哭泣拜稽一勉於禮病遂不起嗚呼中書君其無愧於古之死孝者矣中書君且死惓惓為其母孺人不朽計手次孺人之生平屬其諸子將乞銘於當世之文章巨公而其子文學君某等踵而告余乞為之狀曰此先君之志也余既自少習中書君而從子宜之與中書君故親串往還甚密孺人之賢在耳目間者且數十年其言雖不文而庶可以徵也孺人陸氏崑山之北新瀆人父應鴻母顧孺人生而婉淑嫺於姆訓父母絶愛憐之將笄歸於許為郡幕公二室郡幕公元配沈孺人生子自學而夭於是郡幕公年且艾矣沈孺人重以繼嗣為念為公擇良家子為二得孺人沈孺人察孺人賢而能其家喜可知也無何生中書君沈孺人則愈喜抱而子之日以卵翼乳哺為事而捐管籥以授孺人孺人身親拮据早作夜息出納啓閉代沈孺人之成而不敢專蓋沈孺人忘其有家而孺人忘其有子已中書君稍長就外傅延名經師訓督之沈孺人憐中書君嫗喣不忍傷而孺人獨以嚈濟之為簡其出入稽其倦勤所以䇿勵之者備至嘗曰玉不琢不成器孺子其樂寬而憚嚴矣吾憚其佚也庶以吾之嚴成夫人之寬異日者且得藉此以報夫人乎人於是服孺人之深識逺慮為不可及巳中書君學成遊成均試京兆聲譽鵲起所交遊皆當世名士屨常滿戶外孺人闈而觀之心竊自喜漿酒脯􅀈為供具不倦人以為有陶母之風焉先是郡幕公偕沈孺人以心計起家而孺人復以攻苦約嗇佐之自是業日起以資雄里中而郡幕公顧獨好行其德嘗急其弟之困撫其遺孤子女至沒身不衰邑有大繇輒挺身任之凶年平榖價以糶又為粥以餔餓者而槥死者其宗黨居恆待以舉火者若而家當是時郡邑大夫爭高郡幕公之義以為弦高卜式復生列上其狀賜爵一等復以恩例授官而中書君官京朝亦以親老馳傳歸而拜慶綵衣象服焜耀里閭人皆榮之中書雖以資為郎雅非意所屑獨好奇文異書手自讐較懸之國門暇則闢圃通池樹藝花竹水廊山榭窈窕幽靚不減輞川平泉而又製為歌曲傳奇令小隊習之竹肉之音時與山水映發其諸郎君則翩翩競爽耽書下帷足不窺户登其堂歌鐘饌玉履舄交錯豪華之氣熏然灼人如遊金張之庭而披其帷則圖書盈架丹鉛雜陳哦諷之聲不絶於耳又如入董夏之室自郡幕公起家至中書君不再世而衣冠文物蔚為令族無問素封即奕葉鼎貴之家或不逮焉揆厥所自則兩孺人內助之功居多已焦太史表沈孺人以為富家之吉在順正位交相愛㫖哉言乎蓋沈孺人終其身娣姒視孺人而孺人亦終其身母事沈孺人上不嫌逼下不虞妬左縈右拂以宜其家和氣致祥許氏之興實繇於此若夫繩繩蟄蟄詩書禮義之澤方來未艾則發祥尤在孺人矣中書君之言曰自吾母歸先君子兩周嵗而稱母又十八嵗而稱王母數年以來曾行又滿前矣他人處此或稍自發舒乃孺人之事沈太孺人也益謹未嘗敢以德色見也沈太孺人春秋高喜怒稍過當家人或有後言孺人亟拄其口且為反覆曉喻令心折而後已沈太孺人閒聞之徵其狀則謬其㫖以對不實告以傷其心沈太孺人病且亟孺人手調湯藥與子婦諸孫侍立臥榻跬步不移殁而哭之一慟幾絶拊自昌背曰爾尚有母而吾母安在乎旦暮澡滌帣鞲上飲食恪謹如生前思沈太孺人所嗜得輒跽進之嗚呼世之事嫡有死生不忘其共如孺人者乎孺人治家嚴而又能推誠接物人人得其歡婢僕輩自少至老未嘗一逢其怒子婦諸孫晨朝起居孺人必裝飾端坐以待服御無鮮華所衣疏繒或數浣不易每飯粗糲輒甘之曰此吾家故物也蓋安貞簡素其天性然已昔者中書君之圖不朽沈孺人也乞傳於屠儀部朱太史隱君王先生殁而乞狀於陳徵君乞銘於董學士乞表於焦太史貞珉琬琰將與女宗高行傳之無窮矣逮孺人殁而中書君適病篤其所次第孺人之生平以為不足以盡聖善之萬一而又不克躬自造請於大人先生之門以此賫志而殁吁可悲也已唯是立言君子哀中書君之志而賜之銘豈惟許氏子孫世世嘉賴之余亦得藉手以報中書君於地下與有榮施矣孺人生於嘉靖戊午五月十八日殁於天啓癸亥四月十三日享年六十有六中書君以某年月日啓郡幕公之藏合葬焉子一即中書君諱自昌娶諸氏贈璽丞諸公夀賢所撫其弟上舍舜臣公女女一適文學徐公應時子永思孫男七人元溥邑庠生娶郡守王公臨亨女元恭太學生娶太常王公世懋子藩幕公士騋女元禮庠生娶孝亷王公騰程女元方邑庠生娶憲副顧公自悅女元毅娶别駕胡公寧臣女元超聘大參徐公鏌子文學君浤女孫女二一適藩幕公陸允中子世鈁一未字曾孫男六人定泰聘封儀部劉公雋子文學君錫夀女定升聘孝亷朱公日爃女俱元溥出定國聘邑令陳公允堅子文學君禮錫女定祚未聘俱元禮出定震元方出定豫元毅出俱未聘曾孫女五元溥出者三元恭出者一元禮出者一俱未字墓志凡一首明高士沈愚公墓志銘嗚呼此吾友錢塘高士沈愚公之墓也愚公諱太洽愚公其字晚而欲逃名乃更名逸友人嚴忍公字之曰不異今稱愚公從其著者也愚公家世吳興始祖天一公者以避揚寇徙杭四傳而至夢仙翁以奇方起死人得賜爵子明山先生有文不達抑鬱而死其嗣玉田公遂棄儒而修夢仙翁之術仲子銀江公是生愚公愚公生而岐嶷六嵗就外傅十五試童子科輒占高等十六遘銀江公之變家日落讀書不能療貧常慷慨不自得㑹玉田公子文學君夭愚公當後玉田公沈氏之業儒者自明山先生而下皆不達而無年而夢仙翁以醫起家世之者竝享素封或以為儒之效不逮醫勸愚公徙業焉愚公從之遂復修玉田公之術亡何術大售戶外屨滿脂車而迎者無虛日然愚公意不屑也跳而之山水閒以詩歌琴酒自娛其别業之在湖曲者曰蔬齊在法華山中者曰萬竹廬在清平之麓者曰梅花屋法華山梅花環二十里愚公居恆愛之置壙梅花泉畔期與花同死生因自號梅癡又置讀書舫於西湖清夜蕩漿湖中焚香誦經或花時月夕攜樽嘯咏達曙不倦所跨蹇曰蒼雪山童曰秋清攜笻自隨烏巾鹿裘望之若神仙如是往來相羊於兩堤南北山之間者三十年性樂易與人無忤得錢即買古書畫尊彞奇玩不治生産或施貧乏旋亦忘之樂善愛才津津常不去口足不越三吳而四方賢豪之至者無不與交嘗學淨土於雲棲先師學止觀於百八雲萊翁有出世之想生平所流連詩酒花月聲色玩好之具亦僅寓意而已愚公病瘵五年余嘗三至湖上愚公猶力疾載酒與余徘徊堤上至月午而罷今年過愚公病已殆詣榻前握手言笑如常出所畫小像屬題琅然讀之中有漏字摘以示余其神簡不亂如此易簀前一日呼其子文學君佺與煮新茗燒笋而食曰黃鸝已至乎櫻桃已綻乎已而奮然欲起曰不能至山中逺閣㑹須一登耳逺閣愚公所搆以眺望者也噫亦暇矣愚公有所幸姬人常侍左右彌留之際輒麾之不使前曰吾身已外矣安能復作嗚嗚兒女態耶臨終念佛拱手向西而逝嗚呼人以愚公學道為名高耳觀於生死之際其何如者哉愚公生平多貴遊凡藩司牧伯之在杭者慕愛其人或適館授粲以下交愚公愚公泛然應之亦不為屈也嘗辭中丞甘公及大學士沈公之辟而於沈公往復尤苦人皆高之其自贊曰醉鄉禪苑於焉憩止利藪名場褎如充耳噫可想其風致已西湖自孤山處士而後傳隱逸者指不易屈而余所習乃有兩人其一為邵虎菴先生其一則愚公虎菴先生居呼猿洞口跨溪為閣讀書其中不入城市者四十餘年荆扉晝扃叩輒不應或遭罵而去愚公翺翔人中居處服御皆同於俗和光剷采不設町畦而翛然自得常在勢利之外余以為虎菴先生隱而貞者也愚公隱而通者也兩人皆無愧高士云愚公生於萬厯癸酉三月十三日卒於天啓甲子二月二十三日享年五十有二元配王繼張子一即文學君佺張孺人出娶太學顧公仲逺女孫男一孝通文學君嘗從余受業篤行有文能為沈氏收儒效者也愚公所著蔬齊詩集先後若干卷清乘二卷生生直指八卷居山法一卷行於世余嘗兩序愚公詩又為贊其像題其旌兹隧道之石復以屬余余雖不文而愚公永訣之言不敢忘也銘曰儒而窮醫而通𤣥無功以禪終愚為宗異乃同介而容高可風山列墉水環宫花繚空蛻其中保厥封像贊凡五首俞不同像贊道人耶劒客耶滑稽之雄而文章之伯耶吾昔覯子美哉少年别子九年于思連蜷子貌雄特稱此虬髯高巖大澤深林鬱然暈眉目之雲霞生頷領之風煙豈獨三毛之加是亦阿堵之間噫嘻不同神已傳矣余將乞而藏焉出而相對飲食笑言又何必渡錢塘扣禹穴而覔子于若耶之濱雲門之巔乎張魯生像贊泛然悶然似無所取頽然嗒然似無所起比久與之處而始知其趣郁然其興悠然殆將取於衆之所棄而起於衆之所廢猗嗟斯人斯吾黨之所謂不讀書而有翰墨氣不學道而有煙霞氣終日相對無所發明而彌覺其有味者耶汪杲叔像贊以偃蹇不可一世者存於胸而以傴僂不敢輕一物者為其容吾常苦其執禮之太恭而人以為使酒罵坐者此翁噫嘻夫既不與俗同兮何不放之寂寞無人之墟撫泉石而呼松風如披此圖人景相得其樂融融此真杲叔之所從也而豈為是栖栖于先生大人之前角技雕蟲者哉張子薪像贊其骨清而堅其氣弱而恬其神悴而全夫是以貧而賢病而妍夫能外子之身與家而觀之而貧與病復何有焉此非子之禪歟自題小像此何人斯或以為山澤之儀煙霞之侣胡栖栖於此世其胸懷浩浩落落乃若遠而若邇兮其友或知之而不免見怪於妻子嗟咨兮既不能為冥冥之飛兮夫奚嗤乎藪澤之視矣檀園集卷九
