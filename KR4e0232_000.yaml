body:
  text: 檀園集别集類五明提要臣等謹案檀園集十二卷明李流芳撰流芳字長蘅嘉定人萬厯丙午舉人三上公車不第因魏忠賢亂政遂絶意進取築檀園讀書其中明史文苑傳附見唐時升傳中是編凡古今體詩六卷雜文四卷題畫跋二卷雖才地稍弱不能與其鄉歸有光等抗衡而當天啓崇禎之時竟陵之盛氣方新厯下之餘波未絶流芳容與其間獨恪守先正之典型步步趨趨詞歸雅潔三百年中斯亦晚秀矣謝三賓刻嘉定四先生集時流芳尚存三賔詣視其疾索所作因盡出平生詩文手自芟纂以成斯集三賓為作序文亦感慨悽動三賓字象三鄞縣人天啓乙丑進士後官巡按御史守萊州頗著勞績掖縣毛霦平叛記載之最詳云乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀檀園集序豫為嘉定之三年始謀刻四家文集於時長蘅已病臥檀園豫躬致藥餌登牀握手長蘅為強起盡出所著作手自芟纂得詩六卷序記雜文四卷畫册題跋二卷合十二卷題曰檀園集授其姪宜之以應豫之請遂刻自檀園集始明年正月長蘅沒豫哭其家為經紀其喪欷歔不能去已而刻成因為之序長蘅纍世簪纓科名草載文章書畫絢爛海內其徒盜竊名姓及摸勒衒售者猶足以奉父母活妻子而長蘅身沒之日園亭水石圖書彞鼎之外籯無一金廩無釡粟髙賢靜士之風流其大略亦可覩已為人慷慨遇不平事無問朝野輒義形於色然慈惠樂易其素性也喜接後輩周貧交尤喜成人之美未嘗有所怨忌時或發詞偏宕或詩文感憤類於罵譏嘲謔者有之然言者無罪聞者足戒正所謂深於風者矣惜其窮老不遇徒放浪於吳山越水盱衡奮袂以自鳴其不平故僅存兹集以傳世使得待詔金馬延登玉堂拜稽揚厲以上繼臯陶史克之作令鄙人小夫帖耳咋舌於文章之有用從此不敢侮易文墨士不亦偉歟而竟優遊林壑以沒此豫之歎息痛閔於長蘅也嗟乎長蘅之所流傳未知雞林等國何如凡我公卿學士下至賈豎野老以及道人劍客無不知敬慕若古人然長蘅亦榮矣然大率珍其畫與書耳能得其詩文之意之所在者已不可多得而况其為人之大概乎昔王逸少在東晉時其精識深慮高標偉節識者信為蔡謨溫嶠之流而為書名所掩至今耳食者但曉宗其翰墨此又豫之反覆婉折於兹序也崇禎二年秋七月友人謝三賔序
