  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0232_WYG_003-1a, image: WYG1295/WYG1295-0323a.png}
body:
  text: 檀園集卷三明李流芳撰五言律詩凡四十六首病中柬徐孺穀將有白下之役疏疏庭欲雨花落暗髙梧月氣昏三伏天涼無一娛病將愁共到人與夢俱徂心怯丹陽道知君好去無除夕癸卯除夕人猶病挑燈思惘然夢魂驚隔歲雨㸃入新年笑為小兒劇酒因慈母顛生涯兼世路只有且隨緣石岡園池同仲和泛舟作共道春園好偏宜泛一尊輕隂低竹塢落日駐花源水動魚迎棹人歸鶴候門相看無限意愁殺近黃昏除夕甲辰愁事殊不了如何已歲除千門宵鼓後半榻佛燈初性癖甘從笑交貧或易疏隨緣吾未得世路正躊躇三十等閒過行藏定若何年華隨樂盡風雨逐愁多小妹初離閣故人仍抱痾關懷今夕事不獨歎蹉跎村酒不復醉殘燈影漸移家無終歲計人有隔年期骯髒知難遇浮沉意已衰笑憐兒繞膝黽勉慰家慈忽憶去年夜苦吟猶病中但令身健在且莫怨途窮野蕚今將發清尊幸不空只愁難免俗明發又匆匆春盡同仲和泛舟溪山堂雨晴春又盡忽忽信舟輕松嶺雲不定栁塘風易生出波雙浴鶴隔竹一啼鶯何意林芳歇幽懷得共傾讀書仲和郊居寄懷孺穀相對忽相憶春山不見君飛花何太急啼鳥故成羣癖似嵇生懶知慚鮑叔勤昔年題壁處寥落隔松雲贈􅝞上人未識􅝞師面新詩已競傳竹間開卷帙屋外迥江天山雨一相見風塵意豁然欲隨師卜築瀟灑共安禪白門七夕感懷舊日維舟處懸情獨栁條秋風又京國客思正江潮長路有時到歡期難再邀裴徊望牛女愁絶向中宵贈别洞庭葛實甫我懷洞庭月欲醉莫釐峯幽意久不愜髙人今乍逢新詩正堪把歸櫂阻相從却羡秋山下丹黃已萬重九日風雨泛舟石湖客思逢重九來尋雨外山未能凌絶頂聊共泊西灣茶磨風烟白薇村木葉斑誰言落帽㑹不醉復空還送龔三仲和就試白下送子白門去因之感舊遊挂帆江月曉問寺竹風秋藜杖臺前路紅妝水面樓風流知好在逺想日悠悠最愛清涼寺朱門緑樹開晚風齊䇿蹇落日每登臺雨外江光白城邊石勢隤􅝞公禪室近還與共裴回同病憐羇旅山風想對牀相看愁去住豈敢問行藏鹵莽吾猶遇飛騰子詎量烟寒郭臺畔貰酒正相望清河道中柬同行宋上木漠漠黃河岸荒荒落日風鄉關鴈影外客路水聲中吾道只如此心期偶得同寂寥佳節近忍負菊花藂黃河九日寄懷家中兄弟去年重九日風雨石湖中屈指登髙處三年無一同亦知懷遠道且復信飄蓬阿母秋園裏應憐茰酒紅江路寒仍晚重陽候未回遙知新酒熟不待菊花開郊北秋宜眺村東客好來河流向天際難覓一登臺黃河夜泊明月黃河夜寒沙似戰場奔流聒池響平野到天荒吳㑹日以遠燕臺路正長男兒久為客不辨是他鄉舟中雜興辭家兩見月兀兀閘河邊長路難計日逆流如上天扶攜幸相得宴坐亦翛然始識浮家意伸鉤擬釣船推篷殘卷後秋爽正相宜飯燥香粳鉢羮勻玉糝匙飽餐無一事翻憶在家時多少風塵子天涯長苦飢任城舟中得家報述懷聞道家鄉水秋來又殺禾正愁生計少其奈薦飢何阿母廚中意賢兄柱下歌天涯一回首不敢畏風波自笑逢時懶兹行亦偶然為貧無不可患得敢爭先溝壑吾生事簞瓢可送年寥寥故人意三復贈行篇游任城南池塵土經時面南池一豁然城孤朱閣外亭小緑荷前望迥蒹葭水秋髙楊栁天猶傳杜陵句幽意至今憐太白樓斯人不可作秋望轉蒼蒼濟水東流直梁山北去荒千年同客路一􅊦即吾鄉尚想登臨處當時號酒狂荆門舟中見菊偶成江路重陽月荒城菊未花一枝今始見小摘向人誇研水添生意鄉心對物華遙憐開爛漫濁酒過鄰家清淵逢鄉人南還君整南歸棹豫隨北上船他鄉一相見故里色依然只覺還家好都忘失意憐平安仗傳語早晚下江天移舟入荷池同孟陽方回小泛風池弄小艇偃仰芰荷藂葉與遠山碧花將落照紅衣裳散香澤樓閣擬虛空漸覺離塵世來游淨土中為楊䜟西題斷橋小景十里西湖意都來在斷橋寒生梅蕚小春入栁絲嬌乍見應疑夢重來不待招故人知我否吟望正蕭條新安江中有懷𤣥度伯昭諸子對酒半輪月隨舟兩岸山碧潭寒見底怪石巧當灣自覺勝情愜誰言客路艱别歸臨歲晏秪愴故人顔西湖小築次韻答子與不是我頻到安知君病多如君好神氣且莫厭沉痾山潤經時雨樓香四面荷還應思小築稍健即來過疊前韻重寄子與嵐氣不出户南山朝雨多烹茶玩水色持此滌煩痾有客衝林靄維舟傍芰荷隔溪欲相喚或恐是君過次韻答西生上人見寄小閣溪風夜至今來夢中近聞添結構坐臥在空濛多病成豫懶新詩見子工遙看翠微路幽意若為通戲柬湯吾狂于靈隱精舍靈隱蓬峰下飛泉六月涼相望隔烟雨欲往復傍偟晚霽紅半閣蕉隂緑一牀愁聞湖上鳥終夜呌吾狂湖上有鳥其聲曰吾狂徹夜不已雨中喜蓮壑自朗至朝爽在羣木焚香對南山颯然飛雨至靄爾翠微閒孤詠無所寄林僧來叩關不知蓮壑裏髙興幾時攀西湖寄沈無回於黃巖台蕩古名勝但言心已馳一氊難穩坐雙屐好相隨去郭聞尚遠出遊知幾時因風須示我妙畫與新詩長安攜手日去住各踟蹰念子胸懷濶如豫生計疏不知山縣裏風物竟何如但願少人事還能讀我書靈隱次穎法師韻往來白雲社坐臥丹楓林齊飯經未罷應門僧屢尋出寺不覺遠向山情轉深前溪正落日去住亦無心殘臘殘臘尚幾日新晴暄氣來遙知早梅意欲傍歲朝開十載青芝路千山白雪堆扁舟繫門栁獨往興悠哉寄胡仁常民部春明一回首動隔十年期楚水日東下燕雲常北馳夫君美無度畏壘有遺思國士終何報悠悠愧所知懷抱偶然合何云出處間雲霄既已遠丘壑豈徒閒海國餘黎在飢年賦額慳回天竟誰力凋瘵一時還二月五日自虞山還文休遲豫於鹿城同張冲善少謙顧子貽幼疏步屧山間因過幼疏夜飲限韻得村字故人遲我至一笑玉山原有酒便須酌忘形豈待言花疏能照夜月細已橫村莫怪常深坐應非戀一樽次日同文休子嵩靜之子貽幼疏集冲善齊中限韻得燈字書齊梅未落過雨態猶勝㑹以花時數詩因客興增濕雲晴不去春氣酒能淩醉覺衝泥怯船窗迥一燈夏華甫水亭邂逅甬東朱漢生已載酒重過與漢生集别作合此亭中忘機愛野翁無多成水石隨意得房櫳雨氣先梅到風光隔竹通重來興方洽尊酒莫匆匆題半塘陸仲子新居其兄伯子所居鄰比兄弟皆善絃歌好是幽人宅偏於水木便天然松障子宛在竹窗前晚照留僧閣茶香到客船塤篪方比舍曲罷又聞絃五言排律三首臯亭送張爾完東歸爾完從慧法師聽講彌陀疏鈔初受五戒相近不識面相逢恰稱心亦知文筆妙不謂道情深得共蓮花社遠來祗樹林飛泉初雨後落日復松隂幽賞正未已𤣥言殊可尋别君何草草歸路慎浮沉寄無際於㑹稽兼訊張使君宗曉夢中與無際同游賦詩有樓亦生霞思之句因為續之故人前月去言訪雲門蹤此地美林壑為懷況秋冬碧淙雲外細丹葉霧邊濃樓亦生霞思山尤愛雪容蘭亭蹟已謝剡曲舟靡從張緒如相見知豫老更慵春笋詩春園風物好二月笋生時愛此錦䙀子參他玉版師嫩休論菜甲滑可比蓴脂酒辣偏相稱茶清更不疑味存甘苦外質與剛柔宜上番看何意平安報有期此君真不俗少具出塵姿檀園集卷三
