body:
  text: 檀園集卷十二明李流芳撰題跋凡二十五首題畫卷與子薪三月十八日余自吳門還翌日與子薪相聞且招之子薪報云彥逸亦在此質眀當與偕來是日輕陰風氣蕭爽集伯氏從子輩于寶尊堂既酣子薪彥逸遂留宿山雨樓頭晨起登樓看雨焚香啜茗頗適飯罷兩君便欲别去豫曰家釀頗冽尚堪小飲當為稍淹已維舟於門矣既飲酒白于玉芳於桂甘于泉新緑映檻雨潤欲滴門外屐聲不至鼎足而談或笑或歌或泣皆生平懷而不盡者遂不能去肴既盡佐以笋䔩重滌酒器出所藏哥窑舊玉二杯陳案上呼五木得異采者飲一杯童子時時摘花來供蕙既芳薔薇視人而笑虎茨數樹著花如雪掩映齊壁子薪往往呌絶因相牽入慎娛室索墨汁屬豫畫且畫且談竟盡此卷欲題一詩已醉不能聊紀此以資它日談柄相知如間孟孟陽者可一示之勿以示俗人也己未三月草二日泡菴道人題題畫冊慎娛居士有幽憂之疾夜苦不寐寒冬漏長獨酌易盡久讀傷神又無觀力不耐枯坐唯賴筆墨可以自遣心手有託形神暫調意適而忘與夢俱至此冊自冬徂春經三月而成為山水林木者草幀為雜花折枝者十幀為古德機語真行書十幀蓋皆可以自娛而不可以傳者其真慎娛居士之詩畫也歟為與游題畫冊與游以此冊屬畫藏笥中二年苦無興會未敢落筆今年十月過虞山看楓葉于吾谷因登維摩下至興福清遊甚樂翌日入郡待月於虎丘舟中無事簡得冊子連畫八幀歸家碌碌治裝北行又置之笥中將至鹿城念當與與游别復畫得二幀宿逋頓了為之一快余畫無師承又不喜臨摹古人如此册於荆關董巨二米兩趙無所不效然求其似了不可得夫學古人者固非求其似之謂也子久仲圭學董巨元鎮學荆關彥敬學二米然亦成其為元鎮子久仲圭彥敬而已何必如今之臨摹古人者哉余不能畫而知其大意如此願與與游參之時天啓元年辛酉十一月十九日婁東舟中題畫余近喜畫小冊時有好事者往往致此乞畫此冊亦為友人所乞攜之虞山是日風日清美與子嵩尋吾谷盤礴楓林下丹黃如繡飯後呼兜輿至維摩興福兩蘭若歸而落日映湖圓月出嶺矣因出此冊示子嵩便欲攘去子嵩愛豫畫十年所畜皆落盜手遂欲以攘補之知攘效矣顧余手在患子嵩不好爾何必爾耶因題而歸之并發一笑余嘗畫柳贈西湖張女郎題云斷橋堤外栁如絲愁殺春風煙雨時見說美人能愛畫的應將此鬬腰肢女郎珍重此畫數持以示人由是湖上之人無不知余能畫柳者乃至緇流道民亦以見乞一日法相寺小師乞余畫輒依前韵題云西湖煙栁斷腸絲只合將來鬭翠睂料得禪心應不染也教和墨寫風枝後又為靈隱蘧沙彌題扇云愛栁終何意秋風君始知青青雖畫得不是動搖時為六如畫此便面已數年紙墨剝落猶為裝池成軸可以見其癖好不減女郎小師也題畫為子薪去年以髙麗繭裝成三冊子一以遺淑士一遺子薪其一留篋中七月新涼子薪窗前紅葉茉莉爛漫異常余連詣之酒酣興發輒倚案取冊子弄筆作畫畫盡十幀尚未題字今年子薪病中致此索書暑月揮汗懶近筆研置架上一日索之已亡去矣念子薪愛畫入骨又病中藉以遣興不敢以告之大索十日不得簡篋中素冊尚在連夜篝燈畫此償之前在子薪齊中乘興走筆多草草不愜意此册仿諸家雖不盡得形模然筆墨氣韻差不大謬于古人豈獨煥然復還舊觀直可謂後來居上矣若畫能療疾子薪當霍然而起為余置酒紅茉莉下開東軒一賞之壬戌七月十一日題畫册戊午夏寫經臯亭真歇禪師塔院平頭從城中裝一小册置笥中六月出山舟中熱甚不堪近筆研開而復卷八月重至湖上復攜此冊而往舟中無事畫得五幀意倦輒止歸而匆匆治裝北行途中病還數月以來不見湖山無從發畫思九月乃復來錢塘買舟西湖留連十日飽看兩山紅葉而歸則此冊又在几頭矣舟次吳江風雨如晦燈下飲數杯輒畫三紙眀日抵葑門晤淑士小飲而别泊金閶城下與君長復命酒對飲君長飲戶太窄不三酌已醉雨過月出天水如洗徙倚船頭聽君長吹簫度曲彈三絃遂不能寐篝燈試墨又畫得四紙前後共十二幀竟滿冊矣又眀日舟過維亭出此展玩復為寫舊作題畫之句兼記嵗月己未十月二十日也題白雲青嶂圖昔年有僧乞畫余為題一詩云白屋半間茆破碎青林一帶雨淋漓寶池行樹無人愛却愛人間小景兒蓋為此僧不信淨土而作也偶仿董北苑筆意作白雲青嶂圖憶此併書之似道友子薪一笑子薪酷愛畫又專修淨土其以此詩為何如也天唘癸亥初春題畫冊去嵗八月過吳門晤王淑士兄弟宿留虎丘秋熱甚酷舟還至鹿城稍有涼意同舟夏華甫攜得宋箋冊子愛其光潤宜墨輒作小景兩日間遂盡此冊自謂稍存筆墨之性不復寄人籬壁但當世耳食者多識真者少聊借千載上諸君子之名以恐喝之效顰學步非豫本懷令摹古者見之當為一笑然後世有知此道者亦或相賞形似之外耳天唘癸亥八月十二日題於檀園蘿壑題林巒積雪圖癸亥逼除連日大雪閉門獨飲小酣輒弄筆墨偶得舊楚紙喜其澀滑得中為破墨作林巒積雪圖古人畫雪以淡墨作樹石凡水天空處則用粉填之以此為竒豫意此與墨填者皆求其形似者耳下筆颯然有飄瞥掩映于紙上者乃真雪也願與知者參之草八日薄暝映雪題於劒蛻齊中題畫冊辛酉臘月北行意思蕭索到吳門聞子將將來遲之同行因暫住虎丘之鐵佛僧舍時送余者為子薪魯生舍弟無垢舍姪宜之兒子杭之武林都修之時時抱琴來作數弄比玉還白下與豫一路同來樂酒晨夕古白同寓舍間日一相對楚中李宗文居停亦相近女冠王修微數以扁舟往來山中差不寂寞然夜闌客散輒苦無緒或終夜不寐無可自遣燈下索墨汁作書及畫同居者皆得飽所欲而去以此為笑樂兒子不好學而偏嗜畫每欲裁之不欲身為作俑然興酣輒忘之此冊數幀于酬客之暇乘興㸃染不知為兒子所乞也書畫本髙人之事非讀書萬卷胸中筆下無半㸃塵俗者不能工兒輩患不好畫耳未有好畫而不肯讀書者昔人云我常自教兒此非解嘲語不然亦當如淵眀詩云天命苟如此且進杯中物耳無以為别書此一笑十二月三日燈下題題間孟詩册五言古詩至少陵而一變流而為退之樂天至於東坡而變已極矣然皆不出于少陵而能各成其一家者也間孟跅弛之才不為律縛獨古詩時一作之有韓之奧有白之達有蘇之縱橫而吐納風流率其胸懷韻致獨絶則前後五百年詩人中所無也間孟不喜以詩人自居世無知其詩者獨余與孟陽時稱之今其遺詩不及百篇傳之其人豈無復有揚子雲者以子之言為不妄乎往嵗庚戌在都下間孟寄豫病起諸什余與淑士負暄簷際開卷讀之時時叫絶乃間孟篋中所留有一二為余所未見其中有見懷之什而都未及見寄不知間孟何意也間孟往往自怯其書其寄豫詩卷倩友人書之豫每以為恨間孟書雖不工固間孟之書也手澤在焉嗚呼間孟己矣此真間孟之手澤也悲夫天啓壬戌七月彥逸致此卷索題拭淚書此題畫為子薪余友張子薪愛遊而善病愛友而寡交一病數年足跡不能出户交遊既絶獨以卧遊為樂故其愛獨鍾於豫又獨鍾于豫之畫余閒日必一遣問十日五日一自往子薪必具楮素飭筆研以待卷軸縱橫筐篋盈溢而徴索不己每一畫成倣徨歎賞若可終身於是者凡見人一紙一素又恨不能奄有之以是數求多于余其癖如此秋月余將過武林子薪又以素冊投之曰子遊西湖徘徊於六橋兩山之間我不能遊而又失子庶得子畫以代我遊日以代子談何如余聞而悲其意不忍拒也余之歸子薪又將有辭以屬余曰出子之所遊而得者以示豫豫復何辭以拒焉余知余之所以應子薪者非腕脫不能止也書此一笑天啓癸亥中秋題畫冊為同年陳維立維立兄以素綾小幀索畫且戒之曰為我結想世外勿作常景余思世外之境則如三島十洲雪山鷲嶺之類不獨目所未經亦意所不設也其何能施筆墨竊以為景在人中而人所不能有之者多矣前人之所有而後之人不得而有之者多矣夫人所不得而有之即謂世外之景其可乎俯仰古今思其人因及其地或目之所經而意之所可設是可以畫畫凡十幀如淵眀之柴桑無功之東臯六逸之竹溪賀監之鑑湖摩詰之輞川次山之浯溪樂天之廬山子瞻之雪堂君復之孤山所謂今之人不得而有之者也如漁父之桃源則所謂人亦不得而有之者也畫成偶有所觸因各賦一詩不咏其地而咏其人以為地非人不能奇如三島十洲雪山鷲嶺非仙佛亦不能奇也然仙蹤佛跡不在世外如桃源之類往往有之非其人自不遇耳余所詠諸賢亦有不能終保丘壑者或老於丘壑而文采風流不足以傳并山川之奇湮沒而不彰者可勝道哉如是則古人之所不能盡有者又將待其人以有之其人伊何將求之世外乎求之世間乎請以此扣之維立題畫冊後為李郡守鸖汀徐田仲以素綾冊子屬畫曰將以貽同官之長鸖汀李公余聞公政事之暇留心書畫精於鑒裁余自顧畫無師承且伏處海隅無山川之竒足以發其志意遊跡所厯不越數千里五嶽名山未嘗得一遊獨好觀古人之跡如荆關董巨及勝國諸名家時一效顰又嘗見史傳所載昔人遊居名勝之處輒為神往足雖不至而思其人及其地謂可以髣佛貌之不獨卧遊山水兼以晤對古人蓋皆欲以自娛而不可呈之賞鍳者之前也公治杭未三年而政成人和廢墜修舉比者清湖之役不避豪右斷而行之使空眀瀲灔還其舊觀泳游詬沫皆荷眀德論者以為白蘇復生而余亦謂公之風流節概未可以今人中求之也上下千餘年西湖為白蘇兩人所有後之人安得而有之今則又當屬之公矣如余所畫庾公南樓謝公東山及其他名勝之地未有不因其人以傳者也余他日更請為公圖西湖之勝以繼古人之後可乎余畫雖不工固將附青雲之末以傳之無窮也已題雲山圖甲子嘉平月九日大雪泊舟閶門作此圖憶往嵗在西湖遇雪雪後兩山出雲上下一白不辨其為雲為雪也余畫時目中有雪而意中有雲觀者指為雲山圖不知乃畫雪山耳放筆一笑跋摹書帖學書貴得其用筆之意不專以臨摹形似為工然不臨摹則與古人不親用筆結體終不能去其本色摹書然後知古人難到尺尺寸寸而規之求其肖而愈不可得故學者患苦之然以為某書某書則不肖去自書則逺矣故多摹古帖而不苦其難自漸去本色以造入古人堂奧也庚申新正十日試筆題於劔蛻齊中題畫冊從舍弟無垢得宋紙十六幀裝成一册子去年在湖上畫得八幀分寄張㑹稽宗曉半留篋中寒夜酒闌篝燈無睡輒弄筆遣興意不在畫然以示同志輒謂得勝國諸人氣韻西湖友人聞子將鄒方回皆欲奪之而不得時時開看以自娛樂非豫所甚好不與易也天啓元年辛酉午日檀園薄醉題此此為侒沙彌所藏將死歸于我篋而藏之不忍看也亡何張伯英過我請觀之且曰此余嘗購之沙彌而不得者也余癖子之畫不減沙彌其藏於我猶藏于子也夫出于子之手而無窮子何祕焉余曰余悲夫沙彌之意也昔人喻書畫之好如煙雲過眼不復足留意夫人已往矣而何有於區區之好乎雖然復壁而藏據舷而乞其癖固為後世所笑而其名亦且附書畫以不朽吾以為猶異于營營之俗人也豫之畫不能如古人蓋將借好者之癖以不朽矣子其無忘沙彌之意哉張子曰唯唯遂題而授之沙彌俗姓胡十嵗事余相隨二十餘年北走燕齊南走越又嘗入雲棲參蓮禪師師名之曰智侒今年病瘵死死之前十日從覺空禪師落髮受沙彌十戒念佛合掌向西而逝故稱侒沙彌云天啓癸亥十月題於留光舟次題畫為吕公原余友西音吳子數為余言吕公原先生其人冲恬有道君子也神交二十年前嵗壬戌始于都下一晤旋以交臂别去每用為恨是嵗先生奉使𣙜關荆楚瀕行吳子以素册屬畫為贈余曰先生方用世青山白雲只可自怡豈堪持贈乎吳子曰否否公原丘壑之姿故當𤣥對山水且愛子之畫恨不能致此固公原意也余老且貧將從公原乞買山錢以隱又借子之畫以為余作合子無靳焉余笑曰有是哉余賣山以活而子買山以隱恐子之有待不如余之無待也請遂質之公原先生為一剖之甲子冬日題畫為徐田仲錢塘襟江帶湖山水映發昏旦百變出郭數武耳目豁然扁舟草履隨地得勝天下佳山水可居可遊可以飲食寢興其中而朝夕不厭者無過西湖矣余二十年來無嵗不至湖上或一嵗再至朝花夕月煙林雨嶂徘徊吟賞饜足而後歸湖上友人愛余畫甚於愛山水舍其真而求其似余嘗笑之然余畫無本大都得之西湖山水為多筆墨氣韻間或肖之但不能名之為某山某寺某溪某洞耳今年在湖上為李郡伯陳司李畫二册適同年徐使君田仲見而愛之心欲之而不言余窺其意歸而作錢塘十圖以遺之大都常遊之境恍惚在目執筆追之則己逝矣强而名之曰某山某寺某溪某洞亦取其意可耳似與不似當置之勿論也使君佐郡五年西湖之人戴之若慈母今旦晚內召去矣不獨畏壘深去後之思而使君亦何能無桐鄉之戀試披此冊使湖山常在几案間余畫又能為西湖與使君結再來緣矣題畫冊與從子今年在西湖六七月日以書畫為役手腕幾脫秋中言歸遂絶意此事數月以來牽於塵鞅間有酬應非其所樂臘月自吳門還連日陰翳門無剝啄頗有紙窗竹屋之致偶簡得從子緇仲所乞髙麗繭冊連畫得十二幀或挑燈酒闌雜以夢境或映簷呵凍盥櫛都忘人生閒適之味不可多得至于筆墨適意尤難吾不知此畫方之作者工拙若何然其胸懷所寄不受促逼或亦不當以工拙目之矣天啓甲子嘉平月慎娛居士題為鄒方回題畫此冊為亡友張子薪物辛酉秋日過子薪花癖齊看紅茉莉酒後作之重過賞桂花始得卒業壬戌夏寄此屬題武林鄒方回來從架上見之遂竊去大索不得復置一冊償子薪畫跡殆過于前而此冊終不知何往比至湖上聞子有為余言之鄰父之疑一笑而解眀年子薪死又二年而方回始持此見示余曰暴哉客乎已有據矣子幸主者之死而可逭於論乎顧余畫不逮虎頭子之暴則可以空厨矣推而極之何所不至焉雖然子薪死而所藏余畫皆不知屬之何人并所償之冊亦破廚而飛矣夫何惡于子遂一笑書之以歸方回為武林鄒氏所藏之物此冊前四紙作於庚申迹細而拘後六紙作於甲子迹放而野似出兩手余亦不復識認方回云甲子春偕往臯亭携此冊屬余竟之醉後篝火潑墨半雜夢寐余且見而笑之況它人乎亟屬方回毁之而方回不可曰此亦余兩人一時事也興㑹所在豈復論畫哉余頷之蓋余之無意於名也久矣天唘丙寅七月五日陰城湖畔同方回幼輿放舟乘涼題此題畫冊四年前夏華甫致此冊乞畫苦其太多置笥中經嵗始得卒業未及題署便以還之久不復省憶矣今日忽從他處得見又見孟陽比玉兩兄所題近體詩便如故物與舊交俱自逺歸歡然合併一堂之中也但不知此冊既離舊主終當屬阿誰他日相逢恐未復可期耳書畫何必古人吾輩閲歷嵗月俯仰之際今昔已多真不能無感於斯也天啓丙寅三月穀雨題檀園集卷十二
