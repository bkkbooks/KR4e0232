body:
  text: 檀園集巻十一明李流芳撰西湖卧遊冊䟦語凡二十二首紫陽洞南山自南髙峯邐迤而至城中之吳山石皆奇秀一色如龍井煙霞南屏萬松慈雲勝果紫陽一巖一壁皆可作累日盤桓而紫陽精巧頫仰位置一一如人意中尤奇也余己亥嵗與淑士同遊後數至湖上以畏入城市多放浪兩山間獨與紫陽隔濶辛亥偕方回訪友雲居乃復一至葢不見十餘年所往來於胸中者竟失之矣山水勝絶處每恍惚不自持彊欲捉之縱之旋去此味不可與不知痛痒者道也余畫紫陽時又失紫陽矣豈獨紫陽哉凡山水皆不可畫然皆不可不畫也存其恍惚者而已矣書之以發孟陽一笑雲居寺武林城中招提之勝當以雲居為冣繞山門前後皆長松叅天蔽日相傳以為中峰手植嵗久浸淫為寺僧剪伐什不存一見之輒有老成凋謝之感殆不欲多至其地去年五月偕方回泛小舟自小築至清波訪張懋良寺中落日坐長廊沽酒小飲已裵回城上望鳯凰南屏諸山沿月踏歌而歸翌日遂為孟陽畫此殊可思也壬子十二月鹿城舟中題西泠橋余嘗為孟陽題扇云多寳峰頭石欲摧西泠橋邊樹不開輕煙薄霧斜陽下曾泛扁舟小築來西泠樹色真使人可念橋亦自有古色近聞且改築當無復舊觀矣對此悵然兩峰罷霧圖三橋龍王堂望湖西諸山頗盡其勝煙林霧嶂映帶層叠淡描濃抺頃刻百態非董巨妙筆不足以發其氣韻余在小築時呼小漿至堤上縱步看山領略最多然動筆便不佀甚矣氣韻之難言也予友程孟陽湖上題畫詩云風堤霧塔欲分眀閣雨縈陰兩未成我試畫君團扇上舩窓含墨信風行此景此時此人此畫俱屬可想癸丑八月清暉閣題法相寺山亭圖去年在法相有送友人詩云十年法相松間寺此日淹留却共君忽忽送君無長物半間亭子一溪雲時與方回孟陽避暑竹閣連夜風雨泉聲轟轟不絶又有題扇頭小景一詩云夜半溪閣響不知風雨歇起眎杳靄間悠然見微月一時會心都不知作何語今日展此亦自可思也壬子十月大佛寺倚醉樓燈下題勝果寺月巖圖勝果巖石奇秀甲於兩山而月巖尤為奇勝不知何物人樹一綽楔以障之又於崖上鑿字作道學語可笑石大無靈見汚傖父予此畫雖不能傳神亦足為洗垢矣壬子臘月十三日書於金閶舟中時孟陽以送予北上攜此冊至同觀者為方孟旋徐元晦金爾珍翁子逺鄭子野張伯美舎弟無垢從子緇仲六和曉騎圖燕子磯上臺龍潭驛口路㫺時竝馬行夢中亦同趣後来五雲山遥對西興渡絶壁瞰江立恍與此境遇人生能㡬何江山幸如故重來復相攜此樂不可喻置身畫圖中那復言歸去行當尋雲棲雲深渺何處此予甲辰與王淑士平仲叅雲棲舟中為題畫詩今日展余所畫六和曉騎圖此境恍然重為題此壬子十月六日定香橋舟中永興蘭若壬子正月晦日同仲錫子與自雲棲翻白沙嶺至西溪夾路修篁行兩山間凡十里至永興寺永興山水夷曠平疇逺村幽泉老樹㸃綴各各成致自永興至岳廟又十里梅花綿亘村落彌望如雪一似余家西磧山中是日飰永興登樓嘯咏夜還湖上小築同孟陽印持子將輩痛飲翌日出冊子畫此癸丑十月烏鎮舟中題冷泉紅樹余中秋看月於湖上者三皆不及待紅葉而歸湖上故人屢以相嘲予亦屢與故人期而連嵗不果每用悵然前日舟過塘棲時見數樹丹黃可愛躍然思靈隠蓮峰之約今日始得一踐及至湖上霜氣未遍雲居山頭千樹楓桕尚未有酣意豈余與紅葉縁尚慳耶因憶往嵗忍公有代紅葉招余詩余亦率爾有答聊記扵此二十日西湖領略猶未了一朝别子歸使我意悄悄當我欲别時千山秋已老㪅得少日留霜酣變林杪子嘗為我言靈隱楓葉好千紅與萬紫亂挿向晴昊爛然列錦繡森然建旂旐一生未得見何異說食飽至今追㫺遊懊殺歸來早豈意今復爾萬事有魔嬈相牽可奈何是身如籠鳥歸来十日餘昨日試閒眺村邊小紅樹向人亦嫋嫋轉憶故人言西湖攪懐抱開緘讀素書因風為子道斷橋春望圖往時至湖上從斷橋一望便魂銷欲死還謂所知湖之㶑灔熹微大約如晨光之著樹眀月之入廬葢山水相映發他處即有澄波巨浸不及也壬子正月以訪舊重至湖上輒獨往斷橋裵回終日翌日為楊讖西題扇云十里西湖意都來在斷橋寒生梅蕚小春入栁絲嬌乍見應疑夢重来不待招故人知我否吟望正蕭條又眀日作此圖小春四日同孟陽子與夜話偶題南屏山寺往嵗甲寅同淑士平仲過南屏居然亭看石壁叫絶以後數至湖上或到南屏看友人輒别去徘徊兩山欲一至居然亭而不果矣見余畫始恍然如夢中也雷峰暝色圖吾友子將嘗言湖上兩浮屠雷峰如老衲寳石如美人予極賞之辛亥在小築與方回池上看荷花輒作一詩中有云雷峰倚天如醉翁印持見之躍然曰子將老衲不如子醉翁尤得其情態也盖予在湖上山樓朝夕與雷峰相對而暮山紫氣此翁頹然其間尤為醉心然予詩落句云此翁情淡如煙水則未嘗不以子將老衲之言為宗耳癸丑十月醉後題紫雲洞己酉三月偕閑孟無際子薪舎弟無垢從子緇仲登烏石峰尋紫雲洞洞石甚奇而惜少南山秀潤之色然境特幽絶遊人所罕至也後三年在小築燈下酒酣弄筆作水墨山水覺舊遊歴厯都在目前遂題云紫雲洞圖竟不知洞果如是畫否當以問嘗遊者余畫大都如此亦可笑也澗中第一橋己酉始至十八澗與孟陽閑孟無際子薪舎弟無垢舎姪緇仲俱至徐村第一橋飯于橋上溪流淙然山勢廻合坐久之不能去予有詩云溪九澗十八到處流活活我来三月中春山雨初歇奔雷與飛耳目兩奇絶悠然向溪坐況對山嵯嵲我欲叅雲棲此中解說法善哉汪子言閒心隨水滅無際亦有和余詩忘之矣雲棲曉霧圖壬子正月晦日與仲錫子與出雲棲慧法師季龢居士送予輩至三聚亭下是日大霧山林模糊已而霽至西溪還小築明日孟陽持冊子索畫遂追圖此意今又二年矣烏鎮舟中子將子與孟陽夜話偶題癸丑十月孟陽及子將兄弟與余同舟至吴門夜泊烏鎮酒後題字距壬子一年耳兹稱二年此時真大醉耶猶記出雲棲時霧初合四望皆空時見天末一㾗皆山頂也日出氤氲竹樹如影在水中有寒柯離簁挺出空濛間猶帶紅葉分明可愛余畫中冣得此意題時草草故所未及當遊時畫時題字時子與皆在今已作故人永隔言笑真可痛也己未六月重題煙霞春洞從煙霞寺山門下眺林壑窈窕非復人境李花時尤奇真瓊林瑶島也猶記與閑孟無際自法相至煙霞洞小憩亭子渇甚無從得酒見兩傖父攜榼至閑孟口流涎遽從乞飲傖父不顧予輩大怪偶見梁間惡詩書一板上乃抉而擲之傖父踉蹌而走念此輒噴飯不已也江干積雪圖余春夏秋嘗在西湖但未見寒山而歸甲辰同二王叅雲棲時已二月大雪盈尺出赤山步一路瓊枝玉榦披拂照燿望江南諸山皚皚雲端尤可愛也庚戌秋與白民看月兩堤余既歸白民獨留遲雪至臘盡是嵗竟無雪怏怏而返世間事各有縁固不可以意求也癸丑陽月題甲寅臘月自新安還孟陽觴余湖上大雪襆被與李大白孟陽方回宿舟中時已廹嵗子將强挽余欲脫不得晨起濳呼一小舠而遁雪已霽白雲出山與雪一色上下光耀應接不暇儗作一詩以歸思卒卒不果終是一欠事也己未夏日虎丘精舎重題岣嶁雲澗今年無回在靈鷲余在小築無回書來屢約余看紅葉云且掃岣嶁山閣以待余予躍然欲赴㑹體中小極不果比同孟陽至靈鷲則無回復以事歸矣為之悵然是日至岣嶁樹菴上人方禁足清音閣上皋亭大慧長老亦在焉相與啜茗而去展此圖憶岣嶁山水清逺深恨不得少留踐無回之約遂題之以訂後期孤山夜月圖曽與印持諸兄弟醉後泛小艇從西泠而歸時月初上新堤栁枝皆倒影湖中空眀摩盪如鏡中復如畫中久懐此胸臆壬子在小築忽為孟陽冩出真是畫中矣三潭采蓴圖辛亥四月在西湖值蓴菜方盛時以采擷作羮飽噉有蓴羮歌長不能載大意謂西湖蓴菜自吾友數人而外無能知其味者袁石公盛稱湘湖蓴羮不知湘湖無蓴皆從西湖采去又謂非湘湖水浸不佳不知蓴初摘時必浸之經宿乃愈肥凡泉水湖水皆可不必湘湖也然西湖人竟無知之者圖中人舟縱横皆蕭山賣菜翁也可與吾歌竝存以發好事者一笑癸丑十月吳江舟中篝燈題江南卧遊冊題詞凡四首横塘去胥門九里有村曰横塘山夷水曠溪橋映帶村落間頗不乏致予每過此覺城市漸逺湖山可親意思豁然風日亦為清朗即同遊者未喻此樂也横塘之上為横山往時曽與潘方孺阻風扵此尋徑至山下有美松竹小桃方花恍若異境因相與攀躋至絶頂風怒甚㡬欲吹墮二十年事也丁巳中秋後三日畫于孟陽閶門寓舎九月復同孟陽至武林夜雨泊舟朱家角補題石湖石湖在楞伽山下寺於山之巔者曰上方逶迤而東岡巒漸夷而上下起伏者曰郊臺曰茶磨寺於郊臺之下者曰治平跨湖而橋者曰行春跨溪而橋達於酒城者曰越來湖去郭不十里而近故遊者易至然獨盛於登髙之會傾城士女皆集焉戊申九日余與孟髯同遊值風雨遊人寥落山水如洗著屐至治平寺抵暮而還有詩云客思逢重九來尋雨外山未能凌絶頂聊共泊西灣茶磨風煙白薇村木葉斑誰言落帽會不醉復空還山下有紫薇村髯嘗居扵此今已作故人矣可歎虎丘虎丘宜月宜雪宜雨宜煙宜春曉宜夏宜秋爽宜落木宜夕陽無所不宜而獨不宜於遊人雜沓之時葢不幸與城市宻邇遊者皆以附羶逐臭而來非知登覽之趣者也今年八月孟陽過吳門余拏舟往會中秋夜無月十六日晚霽偕遊虎丘穢雜不可近掩鼻而去今日為孟陽畫此不覺放出山林本色矣丁巳九月六日清溪道中題靈巖余往來西山數過靈巖山下戊申秋日始得與起東及其二子梁瞻雍瞻一登餘皆從舟中遥望其林石之秀而已靈巖為館娃舊趾響屧廊采香逕琴臺皆在其上石上有陷痕如履相傳以為西施履跡殆不可信少時夢與友人至此僧舎作詩醒時記有松風水月皆能說之句辛亥同家弟看梅西磧過靈巖詩云靈巖山下雨綿綿香逕琴臺雲接連憶得秋山黃葉路松風水月夢中禪葢謂此也丁巳九月七日西塘舟中題題溪山秋意巻去年殘臘屏居檀園嵗暮窮愁百感交集酒杯書巻皆為愁具篝燈無睡間以筆墨自遣或一木一石期於引睡而止偶拈此卷嫌其太長初欲縱筆盡之倦而棄去後遂稍斂凡經十宿而成前後疎宻筆皆不應置之篋中久未題字偶過吴門出示松圓道人至武林示宋比玉皆以為可余視之亦復煥然轉自矜惜矣湖上友人鄒孟陽愛畫入骨藏余畫獨多見此又欲乞之余告以不能滿志孟陽不信盖過信兩君之言也夫余亦信两君況孟陽哉如孟陽之愛畫藏之篋中與余無别不然十宿引睡之功三月窮愁無聊之感當終身與余作伴不忍輕擲與人也丁巳六月十一日題於西湖小築題怪石巻孟陽乞余畫石因買英石數十頭為余潤筆以余有石癖也燈下潑墨題一詩云不費一錢買割此三十峰何如海嶽叟袖裏出玲瓏孟陽笑曰以真易假余真折閱矣舎姪緇仲從旁解之曰且未可判價須俟五百年後人知言哉丁巳十一月慎娱居士題題燈上人竹卷往嵗己酉北上舟過蓮涇訪雙林上人於積善菴出所畫竹巻屬余題字以後每經吳門數欲過菴中而不果盖不見上人者六年矣幽窓浄几薫茗相對今日如復理夢中也上人屋後有美竹千竿淨緑如拭今遂化為烏有而上人筆墨乃益進新枝古榦披展森然如見真竹豈此君神氣都為上人攝盡無復生理耶囅然一笑遂題其後甲寅清和月又少時見余友髯朱畫竹喜而效之度不能勝輒棄去為林木山水以自娱大都竹扵長巻位置尤難寒梢萬尺雖不乏煙雲變化而詰曲髙下坡陀掩映往往不能遂其聳然干霄之勢古人以竹巻傳者予亦未覩奇絶也嘗以此語友人潘與歸休皆以為然二子皆専工畫竹已卓然成家而獨以位置長巻為怯其它可知已今日觀雙林上人巻惜不令二子見之一瞠目叫絶且知筆墨蹊徑不可以律方外天遊之人也甲寅四月浴佛日雨初霽風日清和同江子士衡舎弟無垢泛舟桐涇自雲隠菴步至積善精舎與上人坐窓下啜茶試墨信筆題此題畫冊甲寅九月埽墓新安過吳門别季弟無垢扵寓舍持素冊授余曰遇新安山水佳處當作數筆歸以相示可當卧遊頷之而别自禹航從陸至豐于一路溪山紅樹掩映曲折或曠或奥皆在畫中行歸自屯溪買舟沿溪而下清流見底奇峰怪石叅錯溪中兩巖束之上限雲日所謂舟行若窮忽又無際者昔人稱新安江之勝今始見之每欲下一筆逡廵不敢歸與無垢言之但相對一笑而已然此冊猶在余箧中每開視之猶作新安山水想乙卯北上乃復攜之而行京師塵埃蔽天筆凍欲死畫意益不得發丙辰落魄而南長夏閒居思理筆硏簡得此冊則曩時新安山水又付之子虚烏有矣因隨意弄筆以解煩熱數日而冊滿尚欲題字識此一段因縁鄒仲錫一見便奪去固索不得好畫如仲錫便脫手相贈不足復惜但此冊未畫時已走新安往返二千里京師八千里中間遊覽之樂車馬風塵菀枯氷炭之感歴厯皆影現扵此不可不惜也因題而歸之丁巳五月二十四日䟦盆蘭巻己未春余北上至濠梁病還夜輒苦不寐獨處惘惘非對友生流連花酒即無以遣日二月二日與子薪韞父爾凝家伯季從子泛舟南郊聽江君長絃歌值雨子薪偕爾凝君長宿余家盆蘭正開出以共賞子薪故有花癖燒燭照之嘖嘖不已花雖數莖然叅差掩映變態頗具其葩或黃或紫或碧或素其狀或含或吐或離或合或髙或下或正或攲或俯而如瞰或仰而如承或平而如揖或斜而如睨或來而如就或往而如奔或相顧而如笑或相背而如嗔或掩抑而如羞或偃蹇而如傲或挺而如莊或倚而如困或羣向而如語或獨立而如思盖子薪為余言如此非有詩腸畫筆者不能得此形容也余既以病不能作一詩記之欲作數筆冩生而亦復不果然是夜與子薪對花劇談甚歡胸中落落一無所有伏枕便酣睡至曉從此病頓減此花與愛花人皆我良藥不可忘也今日子薪邀過花癖齋看鶯粟花花既爛漫映帶新緑時雨驟至物色韶潤小窓對飲情境清適迴思春夜賞花之樂皆百年所未易有子薪出素巻相屬因髣髴為冩盆花并追紀其語於後四月朔日也檀園集巻十一
