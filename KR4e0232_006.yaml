body:
  text: 檀園集巻六明李流芳撰七言絶句凡一百首無際遊句餘將便道叅雲棲走筆送之六和墖前潮水渾西興渡頭山色昬歸來且莫翻天竺一路沿江到梵村為宋比玉題畫盤螭山外太湖明萬頃堆銀五㸃青我卜新居開小閣松風梅雨愛君聽君畫蒼蒼帶雨松我圖冉冉出雲峰他時相憶還開看雲樹平添幾萬重曉發鄒縣城邊沙路淨無塵殘月穿林欲趂人似向江南何處見春光曉色一時新滕縣道中山欲開雲柳乍風杜梨花白小桃紅三年三月官橋路䇿蹇經過似夢中雲龍山雲龍山頭石皚皚遙接孤城戲馬臺春風一􅊦有何限不見黄河天際來寳應道中來時楊柳尚依依歸去青青又滿枝可憐寳應湖中水照見行人來去時雨中看梅西磧即事記得橋邊石路廻春風初發小山梅柴門老樹渾如昨落日寒隂客又來湖畔泥深屐齒稀春蘿寂寂亞山扉人來犬吠梅花下坐久經聲出翠微虎山橋邊急雨横虎山橋外春湖平兩度梅花一宵月每將清景憶平生灔灔湖光澹澹山宻雲疎雨梅花斑扁舟欲向花源去遙指人家楊柳灣山頭白雲自往來山腰白雲團不開共道山腰雲更白不知却是梅花堆溪頭一夜雨喧豗添得泉聲萬壑哀花事摧殘君莫問只如元為聴泉來雨打風吹可奈何眼看花事漸蹉跎人今欲去花還好偏道花時風雨多村園門巷逐花低藤蔓桑條咫尺迷花底泉聲認歸路沿流直到石橋西屐痕處處穿花入不惜衣沾惜花濕彊欲别花且逺看虎山橋頭帶雨立靈巖山下雨綿綿香逕琴臺雲接連忽憶秋山黄葉路松風水月夢中禪題畫定香橋畔青烟路落日故人從此來和墨寄君山雨後為儂遙傍冷泉開送汪伯昭遊白門伯昭將自京口至棲霞寺因憶舊遊走筆得四絶句欵段橋邊路欲岐龍潭驛口日將西揮鞭遙指山如繖一路江帆亂馬蹄棲霞寺在攝山又名繖山紫藤峰下麓公房松戸隂隂嶺月涼若到都門宜曉騎姚坊廿里稻花香余嘗居棲霞兩月有蒼麓上人山房最勝雞籠山閣舊居停曲檻迴廊幾度經最是城隂秋望好覆舟遙接蔣山青覆舟山在雞籠之前皷樓岡下路髙低處處蘿牆映竹畦記得清涼留宿夜香燈貝葉雨窻西丙午余與仲和寓清涼寺時伯昭自雞籠䇿蹇相訪值雨宿留同子將渡江題扇頭小景怕向江南渡江北還從江北望江南潤州城外春風滿一㸃金山水蔚藍徐州雪後題畫贈李生長題黄河曲裏又新年指㸃京華欲到天喜君眉目如春雪忘却彭城是客邊燕中為李𤣥問題畫著處春風縱馬蹄客心愁見柳如絲芒鞵斗笠溪橋路記得江南二月時寄答呉巽之兼訊沙宛在張冷然二女郎湖頭風雨夜回舩細語如絲水拍天不信别來春又暮花期酒約兩茫然聞道蕭娘病欲蘇畫舩日日傍西湖南屏一路春隂緑只少當年舊酒徒西湖有長年小許每以小舠載予往來湖中臨行乞畫戲題常在西湖烟水邊愛呼小艇破湖天今朝畫出西泠路乞與長年作酒錢自新安江至錢塘舟行絶句纔過草市溪邊舍復轉岑山月下礲維舟直傍灘聲宿要使鄉心一夜空峰廻灘轉石􅌑瓏傍楫隨篙詰曲通正是貪奇心不定輕舟直下去如風待邀山色樽前住不放灘聲枕上過看山聽水推篷坐其奈寒天霜月何水面奇峰雲作幃波心文石錦成堆篙師下瀨莫容易遲我停橈飽看回猿虎無聲鳥不棲千峰迴合夜灘低正愁深黒迷前路忽見峰頭月照溪喜看沙鳥迎人立怕見山猿連臂來聞道三聲催客淚此中客淚不須催五里潭連七里潭下灘舩壓上灘舩米灘險急三灣隘飛渡危崖亂石顛界口東來水勢寛山夷水逺到淳安溪船泊處鄉音改愁聽敲篷夜雨寒曉發嚴州七里瀧萬山雲霧一溪風釣臺直上三千尺何處江潭有釣翁桐廬山下吕公亭古井猶傳仙酒名若得逡廵沽一􅊦不愁帆底凍雲生薄雲寒日澹山暉連夜東風作雪飛臘意匆匆歸棹懶富春江上客帆稀富陽天豁一江明江上青山縱復横早晩隨潮下三折六橋寒樹遠含情任城舟中題畫過却風波兩月程又拚車馬逐塵行無端試寫秋山看勾引閒心一夕生折盡長安禿馬鞭不知塵外有何天今朝一向春風笑柳色髙梁似舊年湖上題畫次比玉韻閣雨牽雲湖不流遙憐琴酒在山樓客中亦有閒愁思但見湖山便不愁朝看雨脚暮看晴山半昬沉湖半明昨日風光今又變眼中譜熟手中生泛舟湖市為孟陽題畫城隅小艇入荷花桑樹隂隂殿角遮一路香風吹到市落星巖上石頭斜題畫贈人梧桐樹下見秋還風葉穿籬滿地斑折得黄花杯在手不知世上幾人閒為子與題畫郭外湖山似畫中楓林䇿䇿葉將紅亦知病骨因秋瘦不礙湖山月與風初宿法相夢與雲棲先師劇譚枕上作一詩紀之一到山房夢亦清空林殘月話分明曉鐘未動窻櫺白聽得風敲橡子聲玉岑閒行口占玉岑山脚水瀠洄寒日暉暉下稻堆穿過松岡尋法相滿空黄葉打頭來十月十五夜同印持子將諸兄弟自靈隱步月至上天竺口占冷泉亭畔樹初明百道寒光水面生松月似留人住住溪聲却喚我行行王與游新廊夜飲題壁小築回廊傍桂花玉山燈火暮烟遮廵廊題罷人初醉時有琴聲雜煑茶次慧法師山居詩韻同忭中上人李九仙張爾完賦松栝為門石作林飛泉百道磴千尋雲中雞犬無遺響獨有頻伽演法音溪光嵐翠故相媚細草疎花只自幽上方月出鐘初動乞食僧歸鳥下投寒潭捲石一泓深䇿杖時時試一臨愛聽潺湲隨水去不知落日在松林一龕無暑亦無寒樹下溪邊任意安忽捲蘆簾見山色不知忘却舊疑團不眈塵俗戀烟霞誰道山僧别有家春色十分將八九杏花開盡又桃花題畫送無際不到長干巳十年風流遙憶使人憐闌干明月秦淮上夜半歌聲過酒船塘棲道中題畫將寄九仙東來步步逆風行蹔借東風半席輕明月見君成一笑兩峰晴色早相迎為子將題畫千重萬疊澗中山山翠林霏空色間怪得燈前誇潑墨徐村昨日看山還徐村遇潮千帆影裏練光開白玉城摧動地雷故傍淺沙鞭馬去却驚飛沫濺衣回小築清暉閣晩眺林岫生烟水起風湖山一抹隱雷峰呉歌四面漁燈亂坐到南屏罷晩鐘同西生上人泛舟兩隄題畫不向蘇隄即白隄輕舠隨意六橋西秋林欲畫無人愛邀得山僧共品題茶熟香微冷竹鑪芙蓉的的向人孤誰能蘸筆西湖裏貌出孤山寳石圖扇頭見林天素詩畫因次其韻沙邊柳色已知秋多少琳宫在上頭曾向金陵門外望莫愁湖水不勝愁雨中獨坐翏翏亭看桂花得張子崧書問兼懐孟陽雖無千樹小山藂愛著繁花水榭東十日花時連日雨眼看狼藉欲隨風門外泥深客到稀花開不肯待晴曦烟籠霧鎻疑増態況復香風不㫁吹張家亭子玉山隈毬子花開錦作堆試問摧殘縁底事風吹雨打未為災故人萬里不歸家我亦三年不見花帶雨獨看應有意欲題髙興寄天涯六月十九日雨後風氣蕭爽聞宗曉自山隂來將訪之呉山下呼兠輿自錢王祠入清波門下上呉山歴十廟而下遙見江光如銀在冶江上越山翠色欲滴還登瑞石穿紫陽繞雲居則湖光如匹練來撲人眼率爾口占湖白江紅一望間江山晩翠勝湖山兠輿便作江湖主買得山頭亦等閒無題白隄涼雨打荷花妾未回船郎到家郎醉不如儂醉劇憐儂濕透絳裙紗閣上彈琴江上聽松風江月若為情酒闌重向溪橋坐怪鳥驚啼虎欲行風入溪流月在橋低回難負此良宵樓頭夢醒江聲發喚起開門看夜潮相期百遍總能過一日愆期可奈何妾自尋郎郎不見段家橋外畫舩多郎意匆匆妾意長贈郎微物亦思量金花梨子能消渴怕道生離不敢將題畫送鄭彥逸之西湖湖光只在斷橋頭雨髻烟鬟一望收我是當年舊遊客試慿楊柳說風流西湖邂逅山隂俞不仝連日歡飲席上口占九年不見此髯公十日西湖九日同待縮九年為九日君歸何事苦匆匆輕寒微靄養花天十里桃隄似錦纏花事未闌君且住酒船今在六橋邊百年節序喜清明不負花時有幾人雜板新腔歌百遍深桮臘酒飲千廵千巖萬壑不曽看一水悠悠欲渡難與子相期仍未定不如且盡眼前歡甲子元日試筆作畫兼題二絶句示家弟無垢是歲予五十將攜家至武林有别業在臯亭桃花塢中山水佳處也買得桃花一塢深清泉白石久盟心今朝便是知非日一往仙源何處尋黄村橋頭樹色深遙憐入竹向山心能添草閣山腰裏李徑桃蹊不用尋為孫山人題畫每愛疎林平逺山倪迂筆墨落人間幽人近卜城南住寫出春風水一灣閶門即事江上涼風已似秋客中歌吹亦生愁金閶門外冶遊子燈火回船不自由題畫虞山紅樹昔遊時每到秋冬入夢思今日巴城又同櫂畫中霜氣最先知題畫送平仲老去詩腸喚不譍分無麗句壯君行江頭日日黄梅雨為寫烟波柳外城有僧欲禮清涼而未決來索予詩戲書四絶句楖栗横肩衲掛身芒鞵踏遍萬山雲若逢婆子山前問驀直從來不誤君聞道邊風最苦寒風頭起處欲行難中臺積雪深無路處處封門不出看我昔曽叅老夜臺氷寒鐵瘦石生苔捨身入海聞還出君到清涼試問來文殊何必住清涼大地何曽不放光自是凡夫心執著登山涉水費資糧送徐陵如朱爾凝北上黄河木落見征帆莫道風寒去路難一曲琵琶刁酒辣西山迎馬雪中看獻歲趨朝玉殿開垂裳親見聖人來懷中三䇿無因獻直待臨軒對御裁相如詞賦自凌雲狗監誰言可致身聖世只今無忌諱上書流涕是何人時崔魏二逆尚未有處分江左才人冀北羣一朝顧盼重風雲知君别欲傳衣鉢聊借光輝燭我軍二月風光在柳條髙梁流水石欄橋杏園宴罷春游徧叱撥銀鞍一路驕隨地流泉萬斛多棘圍春暖墨生波㑹須力挽江河勢莫負飛龍第一科臚傳唱徹九霄清三殿雲髙五色明此日承恩多氣象玉堦先曳錦袍行每將齷齪陋前人得意休誇浩蕩春期子功名上鐘鼎看余丘壑亦天眞題畫似雪嶠師千山頂上只通雲一水人家别有邨直到前山蘭若路清鐘落日不逢君遠公一别又三年寒雨俄停霅上船尚有當年餘習在從師參取畫中禪檀園集巻六
